    function selectGooglePlace(placeId) {
        if (!gPlaces) return;
        gPlaces.getDetails({ placeId: placeId, fields: ['geometry', 'name', 'formatted_address'], sessionToken: gToken, language: 'ja' }, function (place, status) {
            gToken = new google.maps.places.AutocompleteSessionToken();
            if (status !== google.maps.places.PlacesServiceStatus.OK || !place || !place.geometry) return;
            const lat = place.geometry.location.lat(), lng = place.geometry.location.lng();
            let addr = (place.formatted_address || '').replace(/^日本[、,]\s*/, '').replace(/〒?\s*\d{3}-?\d{4}\s*/, '').trim();
            const name = place.name ? (place.name + (addr ? ' ' + addr : '')) : addr;
            selectAddress(lat, lng, name);
        });

    // 検索ディスパッチャ：Photon(OSM・無料・キー不要・施設名/部分入力に強くオートコンプリート可)を主
    //  → GSI(国土地理院・日本の住所に正確) → Nominatim の順に自動フォールバック。Google Placesは未有効化のため不使用。
    function searchAddress(query) {
        if (USE_GOOGLE_SEARCH && gReady && gAuto) { gSearch(query); return; } // Google Places（最良）→ 失敗時はphoton/GSI/Nominatim
        photonSearch(query);
    }
    function photonLabel(p){
        const name=p.name||'';
        const adr=[p.state,p.city,p.district,p.street,p.housenumber].filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
        if(name&&adr) return name+'（'+adr+'）';
        return name||adr||'(名称不明)';
    }
    // Photon: ホテル名・施設名・部分入力に強い（札幌中心にバイアス）。日本(JP)結果のみ表示。
    async function photonSearch(query){
        const box=document.getElementById('addressSuggestions');
        if(!box)return;
        try{
            const res=await fetch('https://photon.komoot.io/api/?q='+encodeURIComponent(query)+'&lat='+DEFAULT_LAT+'&lon='+DEFAULT_LNG+'&limit=8');
            const d=await res.json();
            const feats=((d&&d.features)||[]).filter(f=>{const p=(f&&f.properties)||{};return (!p.countrycode||p.countrycode==='JP')&&f.geometry&&f.geometry.coordinates;});
            if(!feats.length){gsiSearch(query);return;}
            const html=feats.slice(0,7).map(f=>{
                const p=f.properties||{},c=f.geometry.coordinates;
                const label=photonLabel(p);
                return '<div style="padding:10px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:12px;transition:background .2s;" onmouseover="this.style.background=\'#f5f8ff\'" onmouseout="this.style.background=\'white\'" onclick="selectAddress('+c[1]+', '+c[0]+', \''+label.replace(/\\/g,"\\\\").replace(/'/g,"\\'")+'\')">📍 '+label+'</div>';
            }).join('');
            if(!html){gsiSearch(query);return;}
            _markEngine('photon');
            box.innerHTML=html; box.style.display='block';
        }catch(e){ gsiSearch(query); }
    }
    // 国土地理院 住所検索（無料・キー不要・日本の住所に強い）
    async function gsiSearch(query) {
        const box = document.getElementById('addressSuggestions');
        if (!box) return;
        try {
            const res = await fetch('https://msearch.gsi.go.jp/address-search/AddressSearch?q=' + encodeURIComponent(query));
            const arr = await res.json();
            if (!Array.isArray(arr) || !arr.length) { nominatimSearch(query); return; }
            const html = arr.slice(0, 6).map(r => {
                const c = r.geometry && r.geometry.coordinates; // [lng, lat]
                const title = (r.properties && r.properties.title) || '';
                if (!c || !title) return '';
                return `<div style="padding:10px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:12px;transition:background .2s;"
                     onmouseover="this.style.background='#f5f8ff'" onmouseout="this.style.background='white'"
                     onclick="selectAddress(${c[1]}, ${c[0]}, '${title.replace(/'/g, "\\'")}')">📍 ${title}</div>`;
            }).join('');
            if (!html) { nominatimSearch(query); return; }
            _markEngine('gsi');
            box.innerHTML = html;
            box.style.display = 'block';
        } catch (e) { nominatimSearch(query); }
    }
    async function nominatimSearch(query) {
        const box = document.getElementById('addressSuggestions');
        if (!box) return;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ' ' + KD_GEO_HINT())}&format=json&limit=5&accept-language=ja&countrycodes=jp`);
            const results = await res.json();
            if (!results.length) {
                box.innerHTML = '<div style="padding:10px;font-size:12px;color:#999;">該当する住所が見つかりません</div>';
                box.style.display = 'block';
                return;
            }
            _markEngine('nominatim');
            box.innerHTML = results.map(r => `
                <div style="padding:10px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:12px;transition:background .2s;"
                     onmouseover="this.style.background='#f5f8ff'"
                     onmouseout="this.style.background='white'"
                     onclick="selectAddress(${r.lat}, ${r.lon}, '${r.display_name.replace(/'/g, "\\'")}')">
                    📍 ${r.display_name.split(',').slice(0, 3).join(', ')}
                </div>
            `).join('');
            box.style.display = 'block';
        } catch (e) {
            box.style.display = 'none';
        }
    }

        if (!container) return;
        if (!window.Square) { // SDK読込待ち
            if (_sqInitTries++ < 20) { setTimeout(initSquareCard, 300); }
            else { container.innerHTML = '<div style="font-size:12px;color:#dc2626;padding:8px;">決済フォームの読込に失敗しました。再読み込みしてください。</div>'; }
            return;
        }
        _sqInitTries = 0;
        try {
            if (sqCard) { try { await sqCard.destroy(); } catch (e) {} sqCard = null; }
            container.innerHTML = '';
            if (!sqPayments) sqPayments = window.Square.payments(SQUARE_APP_ID, SQUARE_LOCATION_ID);
            sqCard = await sqPayments.card();
            await sqCard.attach('#card-container');
        } catch (e) { console.error('square card init', e); }
    }
    async function payWithCard() {
        const btn = document.getElementById('payBtn');
        const errEl = document.getElementById('cardError');
        const reEnable = () => { if (btn) { btn.disabled = false; btn.textContent = '¥' + (state._payTotal || 0).toLocaleString() + ' を支払う'; } };
        if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
        if (!sqCard) { if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'カードフォームを準備中です。数秒お待ちください。'; } initSquareCard(); return; }
        if (btn) { btn.disabled = true; btn.textContent = t('procProcessing'); }
        let token;
        try {
            const result = await sqCard.tokenize();
            if (result.status !== 'OK') {
                const m = (result.errors && result.errors[0] && result.errors[0].message) || 'カード情報をご確認ください';
                if (errEl) { errEl.style.display = 'block'; errEl.textContent = m; }
                reEnable(); return;
            }
            token = result.token;
        } catch (e) { if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'カード情報の処理に失敗しました'; } reEnable(); return; }

        try {
            const v = state.selectedVehicle;
            const cls = state.selectedClassType || (v && v.type);
            const payload = {
                token: token,
                store: KD_API_STORE(), // 店舗振り分け（'spk'|'nha'）
                vehicleClass: cls, vehicleModel: v ? v.name : '',
                lend_date: state.datetime.startDate, return_date: state.datetime.endDate,
                lend_time: state.datetime.startTime, return_time: state.datetime.endTime,
                name: (state.formData && state.formData.name) || '',
                mail: (state.formData && state.formData.email) || '',
                tel: (state.formData && state.formData.phone) || '',
                people: 1,
                insuranceType: state.cdw || 'none',
                childSeat: (state.options && state.options.childSeat) || 0,
                juniorSeat: (state.options && state.options.juniorSeat) || 0,
                del_place: state.deliveryAddr || '',
                col_place: state.collectionAddr || state.deliveryAddr || '',
                del_place_full: state.deliveryAddrFull || state.deliveryAddr || '',
                col_place_full: state.collectionAddrFull || state.collectionAddr || state.deliveryAddrFull || state.deliveryAddr || '',
                del_lat: state.deliveryLat, del_lng: state.deliveryLng,
                col_lat: (state.collectionLat != null ? state.collectionLat : state.deliveryLat),
                col_lng: (state.collectionLng != null ? state.collectionLng : state.deliveryLng),
            };
            const res = await fetch(`${SUPABASE_URL}/functions/v1/keydrop-pay`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data.ok) {
                if (errEl) { errEl.style.display = 'block'; errEl.textContent = (data && data.error) || '決済に失敗しました'; }
                reEnable(); return;
            }
            state._lastResId = data.reservationId;
            state._lastMail = (state.formData && state.formData.email) || '';
            saveReservationToLocal(data.reservationId);
            state.screen = 'complete';
            render();
        } catch (e) {
            if (errEl) { errEl.style.display = 'block'; errEl.textContent = '通信に失敗しました。時間をおいてお試しください。'; }
            reEnable();
        }
    }

    async function processPayment() {
        if (!state.paymentMethod) return;
        const btn = document.querySelector('.payment-screen .btn-primary');
        if (btn) { btn.disabled = true; btn.textContent = t('procProcessing'); }
        try {
            // 札幌DBに予約成立（pending_payment・在庫確保）→ Square決済リンクへ遷移
            const data = await createBookingOnServer();
            const resId = data.reservationId;
            state._lastResId = resId;
            saveReservationToLocal(resId);

            if (data.payUrl) {
                // GA4コンバージョン用：決済リダイレクト前に金額/エリア/クラスを保存（戻りで発火）
                try {
                    localStorage.setItem('kd_conv', JSON.stringify({
                        id: resId,
                        amount: Number(data.amount) || 0,
                        store: (typeof KD_STORE !== 'undefined' ? KD_STORE : 'spk'),
                        cls: (state.selectedVehicle && (state.selectedVehicle.type || state.selectedVehicle.class)) || ''
                    }));
                } catch (e) {}
                // Square Checkout へリダイレクト（決済完了でwebhookが confirmed 化）
                window.location.href = data.payUrl;
                return; // 遷移するのでrenderしない
            }
            // payUrl無し（Square未設定/発行失敗）＝決済に進めない。LINE案内付き完了画面へ
            // ※pending_paymentは30分でTTL自動解放されるため、必ず手動フォローが要る
            alert('決済ページに接続できませんでした。お手数ですが公式LINEよりお支払い手続きをお願いいたします。');
            state.screen = 'complete';
            render();
        } catch (e) {
            alert(e.message || '予約に失敗しました。時間をおいて再度お試しください。');
            render(); // 決済ボタンを元の文言・活性状態に戻す
        }
    }

    function renderBookingProgress(currentStep) {
        // currentStep: 1=confirm, 2=options, 3=form, 4=terms, 5=payment
        const steps = ['確認','オプション','情報入力','規約','決済'];
        return `<div class="booking-progress">${steps.map((s, i) => {
            const num = i + 1;
            const isDone = num < currentStep;
            const isActive = num === currentStep;
            const dot = `<div class="booking-progress-dot ${isDone ? 'done' : (isActive ? 'active' : '')}"></div>`;

        }).join('')}</div>`;

    // Determine delivery status from reservation data
    function getDeliveryStatus(r, fleet) {
        if (r.status === 'キャンセル' || r.status === 'cancelled') return 'cancelled';
        const now = new Date();
        const lendDT = new Date(r.lend_date + 'T' + (r.lend_time || '10:00'));
        const returnDT = new Date(r.return_date + 'T' + (r.return_time || '10:00'));
        const hasVehicle = !!(fleet && fleet.vehicle_code);

        // For demo: use demo_status if set (allows showing all statuses)
        if (r.demo_status) return r.demo_status;

        // OPシート（SPK）が設定した明示ステータスを最優先（出発/お届け完了/返却完了）
        if (r.kd_status) return r.kd_status;

        // キャンセル申請中（運営未確定）＝配車確定/利用前の表示を上書き
        if (r._cancelRequested) return 'cancel_requested';

        if (now > returnDT) return 'completed';
        if (now >= lendDT && now <= returnDT) return 'active';
        if (!hasVehicle) return 'confirmed';
        return 'assigned';
    }

    // Progress steps for delivery flow
    const PROGRESS_STEPS = [
        { key: 'confirmed', icon: '📋', label: '予約' },
        { key: 'assigned', icon: '🔑', label: '配車' },
        { key: 'preparing', icon: '🔧', label: '準備' },
        { key: 'delivering', icon: '🚗', label: 'お届け' },
        { key: 'active', icon: '✅', label: '利用中' },
        { key: 'completed', icon: '🏁', label: '完了' },
    ];

    function getProgressIndex(status) {
        const idx = PROGRESS_STEPS.findIndex(s => s.key === status);
        return idx >= 0 ? idx : 0;
    }

    function renderMypageDetail() {
        const r = mypageState.reservation;
        if (!r) return '';
        const cls = VEHICLE_CLASSES[r.vehicle] || {};
        const f = mypageState.fleet;
        const status = getDeliveryStatus(r, f);
        const ds = DELIVERY_STATUSES[status] || { icon:'📋', label:'予約確定', sub:'', heroClass:'' };
        const progressIdx = getProgressIndex(status);
        const isCancelled = status === 'cancelled';
        const isCompleted = status === 'completed';
        const isDelivering = status === 'delivering';
        const isActive = status === 'active';
        const isCancelRequested = status === 'cancel_requested';
        const hasVehicle = !!(f && f.vehicle_code);

        // 決済状況ラベル
        const rawSt = (r.status || '');
        let payLabel, payColor;
        if (/cancel|キャンセル/i.test(rawSt)) { payLabel = t('payCancelled'); payColor = '#dc2626'; }
        else if (rawSt === 'pending_payment') { payLabel = t('payPending'); payColor = '#d97706'; }
        else { payLabel = t('payPaid'); payColor = '#16a34a'; }

        let html = '';

        // ── ステータス Hero（残す）──
        html += `
            <div class="mp-status-hero ${ds.heroClass}">
                <div class="mp-status-icon">${ds.icon}</div>
                <div class="mp-status-label">${dsLabel(status)}</div>
                <div class="mp-status-sub">${dsSub(status) || ''}</div>
            </div>
        `;

        // ── ステータスバー（残す・OPシートからのトリガーで進行）。キャンセル申請中は進行バーを出さない ──
        if (!isCancelled && !isCancelRequested) {
            html += `<div class="mp-progress">`;
            PROGRESS_STEPS.forEach((step, i) => {
                const isDone = i < progressIdx;
                const isNow = i === progressIdx;
                const dotClass = isDone ? 'done' : (isNow ? 'now' : '');
                html += `

    // 変更可否：出発(お届け)24時間前まで・確定/支払待ちのみ（配車後・出発済みは不可）
    function canEditMypage(r) {
        const f = mypageState.fleet;
        const status = getDeliveryStatus(r, f);
        if (status === 'cancelled') return { editable: false, reason: 'この予約はキャンセルされています。' };
        if (status === 'completed' || status === 'active' || status === 'delivering') {
            return { editable: false, reason: '配車が開始されているため、マイページからは変更できません。お手数ですが公式LINEへご連絡ください。' };
        }
        if (mpWithin24h(r)) {
            return { editable: false, reason: '出発24時間前を過ぎているため、マイページからの変更はできません。お手数ですが公式LINEへご連絡ください。' };
        }
        return { editable: true, reason: '' };
    }
    // 出発(お届け日時)の24時間前を過ぎているか（JST基準）。Edge Functionと同一判定。
    function mpWithin24h(r) {
        const t = /^\d{2}:\d{2}$/.test(r.lend_time || '') ? r.lend_time : '10:00';
        const dep = new Date(`${r.lend_date}T${t}:00+09:00`).getTime();
        return Date.now() >= dep - 24 * 3600 * 1000;
    }
    // お届け(貸出)変更の受付可否＝出発48時間前まで（Edge Functionと同一）
    function mpDelEligible(r) {
        const t = /^\d{2}:\d{2}$/.test(r.lend_time || '') ? r.lend_time : '10:00';
        const dep = new Date(`${r.lend_date}T${t}:00+09:00`).getTime();
        return (dep - Date.now()) / 3600000 >= 48;
    }
    // 回収(返却)変更の受付可否＝返却2時間前まで
    function mpColEligible(r) {
        const t = /^\d{2}:\d{2}$/.test(r.return_time || '') ? r.return_time : '10:00';
        const ret = new Date(`${r.return_date}T${t}:00+09:00`).getTime();
        return (ret - Date.now()) / 3600000 >= 2;
    }

    function mpEditPickGoogle(placeId) {
        if (!gPlaces) return;
        gPlaces.getDetails({ placeId: placeId, fields: ['geometry', 'name', 'formatted_address'], sessionToken: gToken, language: 'ja' }, function (place, status) {
            try { gToken = new google.maps.places.AutocompleteSessionToken(); } catch (e) {}
            if (status !== google.maps.places.PlacesServiceStatus.OK || !place || !place.geometry) return;
            const lat = place.geometry.location.lat(), lng = place.geometry.location.lng();
            let addr = (place.formatted_address || '').replace(/^日本[、,]\s*/, '').replace(/〒?\s*\d{3}-?\d{4}\s*/, '').trim();
            const name = place.name ? (place.name + (addr ? ' ' + addr : '')) : addr;

        });

    function mpEditPhotonSearch(q) {
        const box = document.getElementById('mpEditSuggest'); if (!box) return;

                const d = await res.json();
                const feats = ((d && d.features) || []).filter(f => { const p = (f && f.properties) || {}; return (!p.countrycode || p.countrycode === 'JP') && f.geometry && f.geometry.coordinates; });
                if (!feats.length) { box.innerHTML = '<div style="padding:10px;font-size:12px;color:#999;">該当する場所が見つかりません</div>'; box.style.display = 'block'; return; }
                box.innerHTML = feats.slice(0, 7).map(f => {
                    const p = f.properties || {}, c = f.geometry.coordinates;
                    const adr = [p.state, p.city, p.district, p.street, p.housenumber].filter(Boolean).join(' ').replace(/\s+/g, ' ').trim();
                    const label = (p.name && adr) ? (p.name + '（' + adr + '）') : (p.name || adr || '(名称不明)');
                    const lab = label.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
                    return '<div style="padding:9px 11px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:12px;" onmouseover="this.style.background=\'#f5f8ff\'" onmouseout="this.style.background=\'#fff\'" onclick="mpEditPickResult(' + c[1] + ',' + c[0] + ',\'' + lab + '\')">📍 ' + label + '</div>';

    async function geocodeJP(q) {
        if (!q) return null;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&accept-language=ja&countrycodes=jp&limit=1`);
            const d = await res.json();
            if (d && d[0]) return [parseFloat(d[0].lat), parseFloat(d[0].lon)];
        } catch (e) {}
        return null;
    }

            setTimeout(function () {

                if (pts.length >= 2 && !same) {
                    const b = new google.maps.LatLngBounds();
                    pts.forEach(function (p) { b.extend({ lat: p[0], lng: p[1] }); });

            }, 200);
        });

    function getCancelFee(lendDate, basePrice) {
        const now = new Date();
        const lend = new Date(lendDate + 'T00:00:00');
        const diffDays = Math.ceil((lend - now) / (1000 * 60 * 60 * 24));

        if (diffDays >= 7) return { rate: 0, fee: 0, label: '無料（7日前以上）' };
        if (diffDays >= 3) return { rate: 20, fee: Math.ceil(basePrice * 0.2), label: '基本料金の20%（6〜3日前）' };
        if (diffDays >= 1) return { rate: 30, fee: Math.ceil(basePrice * 0.3), label: '基本料金の30%（2〜1日前）' };
        return { rate: 50, fee: Math.ceil(basePrice * 0.5), label: '基本料金の50%（当日以降）' };
    }

    function closeCancelModal() {
        const modal = document.getElementById('cancelModal');
        if (modal) modal.style.display = 'none';
    }

    // キャンセル「リクエスト」：即キャンセルせず運営へ依頼（運営に自動でキャンセルメールが届く）。
    // マイページ「❌ キャンセルについて」セクションの送信（ポリシー同意チェック＋送信）
    async function submitCancelRequestInline(resId) {
        const agree = document.getElementById('kdCancelAgree');
        if (!agree || !agree.checked) { alert('キャンセルポリシーへの同意が必要です'); return; }
        const reasonEl = document.getElementById('kdCancelReason');
        const reason = reasonEl ? reasonEl.value.trim().slice(0, 500) : '';
        if (!window.confirm('キャンセルリクエストを送信します。よろしいですか？\n※この場では確定されません。運営が返金可否・キャンセル料をご案内します。')) return;
        const btn = document.getElementById('kdCancelBtn');
        if (btn) { btn.disabled = true; btn.textContent = t('procSending'); }
        try {
            const email = mypageState.email || localStorage.getItem('hdm_mypage_email') || '';
            if (email !== MOCK_EMAIL) {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/keydrop-mypage`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'cancel_request', store: KD_API_STORE(), mail: email, resId, reason }),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    alert((data && data.error) || t('errCancelFail'));
                    if (btn) { btn.disabled = false; btn.textContent = 'キャンセルリクエストを送信'; }
                    return;
                }
                if (data.alreadyCancelled) {
                    if (mypageState.reservation) { mypageState.reservation.status = 'キャンセル'; mypageState.reservation.demo_status = null; }
                    render(); return;
                }
            }
            if (mypageState.reservation) mypageState.reservation._cancelRequested = true;
            if (mypageState.reservations) {
                const li = mypageState.reservations.findIndex(r => r.id === resId);
                if (li >= 0) mypageState.reservations[li]._cancelRequested = true;
            }
            render();
        } catch (e) {
            alert(t('errCancelFailLine'));
            if (btn) { btn.disabled = false; btn.textContent = 'キャンセルリクエストを送信'; }
        }
    }

    async function requestCancellation(resId) {
        const reasonEl = document.getElementById('cancelReason');
        const reason = reasonEl ? reasonEl.value.trim().slice(0, 500) : '';
        closeCancelModal();
        try {
            const email = mypageState.email || localStorage.getItem('hdm_mypage_email') || '';
            // 本番はEdge Function（service_role・本人確認）で依頼受付＋運営へメール/Slack。デモ(mock)はローカルのみ。
            if (email !== MOCK_EMAIL) {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/keydrop-mypage`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'cancel_request', store: KD_API_STORE(), mail: email, resId, reason }),
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    mypageState.error = data.error || t('errCancelFail');
                    render();
                    return;
                }
                if (data.alreadyCancelled) {
                    if (mypageState.reservation) { mypageState.reservation.status = 'キャンセル'; mypageState.reservation.demo_status = null; }
                    render();
                    return;
                }
            }
            // 依頼受付（ステータスは変えない＝運営が返金判断後に確定）。受付バナーを表示。
            if (mypageState.reservation) mypageState.reservation._cancelRequested = true;
            if (mypageState.reservations) {
                const li = mypageState.reservations.findIndex(r => r.id === resId);
                if (li >= 0) mypageState.reservations[li]._cancelRequested = true;
            }
            render();
        } catch (e) {
            alert(t('errCancelFailLine'));
        }
    }

    // Save reservation to LocalStorage after booking
    function saveReservationToLocal(resId) {
        const saved = JSON.parse(localStorage.getItem('hdm_reservations') || '[]');
        saved.unshift({
            id: resId,
            vehicle: state.selectedVehicle?.type || '',
            lend_date: state.datetime.startDate,
            lend_time: state.datetime.startTime,
            return_date: state.datetime.endDate,
            return_time: state.datetime.endTime,
            status: '確定',
            del_place: state.deliveryAddr,
        });
        // Keep max 10
        if (saved.length > 10) saved.length = 10;
        localStorage.setItem('hdm_reservations', JSON.stringify(saved));
    }

    function t(key) { return LANG[state.lang]?.[key] || LANG.ja[key] || key; }
    // 車両クラス名を選択言語で返す（cls_<type>）。無ければVEHICLE_CLASSESのJP名→type。
    function clsName(type) { if (!type) return ''; const L = LANG[state.lang] || {}; return L['cls_' + type] || LANG.ja['cls_' + type] || (VEHICLE_CLASSES[type] || {}).name || type; }
    // 車種名（メーカー・モデル）を非日本語時に国際表記へ。座標/予約には無関係＝表示のみ。
    const KD_MODEL_MAP = {'トヨタ':'Toyota','日産':'Nissan','三菱':'Mitsubishi','スズキ':'Suzuki','マツダ':'Mazda','ダイハツ':'Daihatsu','ホンダ':'Honda','アルファード':'Alphard','ヴェルファイア':'Vellfire','ベルファイア':'Vellfire','ノア':'Noah','ヴォクシー':'Voxy','セレナ':'Serena','エスクァイア':'Esquire','デリカD5':'Delica D5','デリカ':'Delica','ライズ':'Raize','ヤリスクロス':'Yaris Cross','ロッキー':'Rocky','ハリアー':'Harrier','アクア':'Aqua','ヴィッツ':'Vitz','ノート':'Note','プリウスα':'Prius α','プリウス':'Prius','ソリオ':'Solio','ルーミー':'Roomy','カローラフィールダー':'Corolla Fielder','アクセラ':'Axela','カローラ':'Corolla'};
    function locModel(s) { if (!s || state.lang === 'ja') return s; Object.keys(KD_MODEL_MAP).sort(function(a,b){return b.length-a.length;}).forEach(function(k){ s = s.split(k).join(KD_MODEL_MAP[k]); }); return s; }
    // 保険値（フル/免責/なし/NOC）を選択言語へ
    function locIns(v) { if (!v || state.lang === 'ja') return v; const m = { 'フル': 'ins_full', '免責': 'ins_cdw', 'なし': 'ins_none', 'NOC': 'ins_noc' }; return m[v] ? t(m[v]) : v; }
    // 配送ステータス／進捗ステップのラベルを選択言語で返す
    function dsLabel(st) { const L = LANG[state.lang] || {}; return L['st_' + st + '_l'] || LANG.ja['st_' + st + '_l'] || (DELIVERY_STATUSES[st] || {}).label || ''; }
    function dsSub(st) { const L = LANG[state.lang] || {}; return L['st_' + st + '_s'] || LANG.ja['st_' + st + '_s'] || (DELIVERY_STATUSES[st] || {}).sub || ''; }
    function stepLabel(k) { const L = LANG[state.lang] || {}; return L['step_' + k] || LANG.ja['step_' + k] || k; }

    // 言語切替時、地図JS APIがまだ完全ロードされていなければ、保留中スクリプトを破棄して
    // 次回の地図生成で新言語ラベルを読み込ませる（ロード後は言語固定＝再読込まで旧言語のまま）。
    function kdResetGmapsLangIfPending(lang) {
        try {
            var loaded = window.google && window.google.maps && window.google.maps.places;
            if (loaded) return; // 既に確定ロード済み→言語固定（再読込でのみ変更可）
            if (window.__gmapsLang && window.__gmapsLang !== lang) {
                var el = document.getElementById('gmapsScript');
                if (el && el.parentNode) el.parentNode.removeChild(el);
                window.__gmapsLang = null; window.__gmapsReady = null;
            }
        } catch (e) {}
    }
    function switchLang(lang) {
        // 地図ロード後の言語切替＝Google Maps JSは言語が読込時固定のため、地図ラベルを新言語に合わせるにはページ再読込が必須。
        // 予約の日程を保存して再読込（エリア・言語はlocalStorageで維持／Pinは再タップ）。地図未ロード時は通常の即時切替。
        var _mapLoaded = !!(window.google && window.google.maps && window.google.maps.places);
        var _mapLangDiff = window.__gmapsLang && window.__gmapsLang !== lang;
        state.lang = lang;
        try{localStorage.setItem('kd_lang',lang);}catch(e){}
        if (_mapLoaded && _mapLangDiff) {
            try { localStorage.setItem('kd_resume', JSON.stringify({ ts: Date.now(), store: (typeof KD_STORE !== 'undefined' ? KD_STORE : ''), datetime: state.datetime })); } catch (e) {}
            // location.reload()はbfcache/既存window.google再利用で地図言語が変わらないことがある→
            // URLを変える新規ナビゲーションで必ず新言語で地図JSを読み直す（?area維持＝ゲート再表示なし）。
            var _sp = new URLSearchParams(location.search);
            if (typeof KD_STORE !== 'undefined' && KD_STORE) _sp.set('area', KD_STORE);
            _sp.set('_l', lang);
            location.search = _sp.toString(); return;
        }
        kdResetGmapsLangIfPending(lang);
        // Update menu lang buttons
        document.querySelectorAll('.menu-lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.trim() === ({ja:'日本語',en:'English',zh:'繁體中文',ko:'한국어'}[lang]));
        });
        // Update menu text
        updateMenuText();
        // Re-render app content
        render();
        setTimeout(function () { try { applyStepFocus(); } catch (e) {} }, 60);
    }

    function updateMenuText() {
        const menu = document.getElementById('slideMenu');
        if (!menu) return;
        const userBtn = menu.querySelector('.menu-user-btn');
        if (userBtn) userBtn.textContent = t('menuMypage');
        const sections = menu.querySelectorAll('.menu-section-title');
        if (sections[0]) sections[0].textContent = t('menuService');
        if (sections[1]) sections[1].textContent = t('menuSupport');
        if (sections[2]) sections[2].textContent = t('menuLegalSection');
        // ⚠️ インデックス順依存は禁止（先頭に「エリアを選び直す」リンク等があると1個ずれて
        //    ラベルとリンク先が食い違う＝「ご利用方法」を押すとTOPへ等の事故になる）。
        //    data-mk 属性で確実にキー対応させ、該当項目のhref/onclickは触らない。
        menu.querySelectorAll('.menu-item[data-mk]').forEach(function (item) {
            const k = item.getAttribute('data-mk');
            if (!k) return;
            const icon = item.querySelector('.menu-item-icon');
            const arrow = item.querySelector('.menu-item-arrow');
            const iconText = icon ? icon.textContent : '';
            const arrowText = arrow ? arrow.outerHTML : '';
            item.innerHTML = `<span class="menu-item-icon">${iconText}</span>${t(k)}${arrowText}`;
        });
    }

    // ════════════════════════════════════════════
    // ── Slide Menu ──
    // ════════════════════════════════════════════
    function openMenu() {
        // メニューを開くたびに選択言語へ同期（ボタンactive＋項目テキスト）＝選択と表示の不一致防止
        try {
            const _names = { ja: '日本語', en: 'English', zh: '繁體中文', ko: '한국어' };
            document.querySelectorAll('.menu-lang-btn').forEach(function (btn) { btn.classList.toggle('active', btn.textContent.trim() === _names[state.lang]); });
            if (typeof updateMenuText === 'function') updateMenuText();
        } catch (e) {}
        document.getElementById('menuOverlay')?.classList.add('open');
        document.getElementById('slideMenu')?.classList.add('open');
        document.body.classList.add('menu-open');
    }
    function closeMenu() {
        document.getElementById('menuOverlay')?.classList.remove('open');
        document.getElementById('slideMenu')?.classList.remove('open');
        document.body.classList.remove('menu-open');
    }

    // ════════════════════════════════════════════
    // ── Hero Slider ──
    // ════════════════════════════════════════════
    let heroIndex = 0;
    let heroTimer = null;

    function goSlide(i) {
        heroIndex = i;
        const track = document.getElementById('heroTrack');
        if (track) track.style.transform = `translateX(-${i * 100}%)`;
        document.querySelectorAll('.hero-dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
        resetHeroTimer();
    }

    function nextSlide() {
        const total = document.querySelectorAll('.hero-slide').length;
        if (total === 0) return;
        goSlide((heroIndex + 1) % total);
    }

    function resetHeroTimer() {
        clearInterval(heroTimer);
        heroTimer = setInterval(nextSlide, 4000);
    }

    // Touch swipe support
    let heroTouchStartX = 0;
    document.addEventListener('touchstart', (e) => {
        const slider = document.getElementById('heroSlider');
        if (slider && slider.contains(e.target)) heroTouchStartX = e.touches[0].clientX;
    });
    document.addEventListener('touchend', (e) => {
        const slider = document.getElementById('heroSlider');
        if (!slider || !slider.contains(e.target)) return;
        const diff = heroTouchStartX - e.changedTouches[0].clientX;
        const total = document.querySelectorAll('.hero-slide').length;
        if (Math.abs(diff) > 40) {
            if (diff > 0) goSlide(Math.min(heroIndex + 1, total - 1));
            else goSlide(Math.max(heroIndex - 1, 0));
        }
    });

    // ════════════════════════════════════════════
    // ── Init ──
    // ════════════════════════════════════════════
    // Square決済から戻った直後（?paid=<予約番号>）→ 完了画面を表示
    (function handlePaymentReturn() {
        try {
            const sp = new URLSearchParams(window.location.search);
            const paid = sp.get('paid');
            if (paid) {
                state._lastResId = paid;
                saveReservationToLocal(paid);
                // GA4 予約コンバージョン（purchase=広告連携用 / booking_complete=カスタム）
                try {
                    var _cv = JSON.parse(localStorage.getItem('kd_conv') || 'null');
                    var _ev = {
                        transaction_id: paid,
                        currency: 'JPY',
                        value: (_cv && _cv.id === paid && Number(_cv.amount)) ? Number(_cv.amount) : 0,
                        store: (_cv && _cv.store) || '',
                        vehicle_class: (_cv && _cv.cls) || ''
                    };
                    if (typeof gtag === 'function') {
                        gtag('event', 'purchase', _ev);
                        gtag('event', 'booking_complete', _ev);
                    }
                } catch (e) {}
                try { localStorage.removeItem('kd_conv'); } catch (e) {}
                state.screen = 'complete';
                // クエリを消してリロード時に再表示しない
                if (window.history && window.history.replaceState) {
                    window.history.replaceState({}, '', window.location.pathname);
                }
            } else if (sp.get('mypage')) {
                // メール内リンク（?mypage=1）→ マイページを開く
                state.screen = 'mypage';
                // 直リンク：予約番号＋メールが付いていれば自動ログイン（タイピング不要）
                const _did = sp.get('id') || sp.get('resId');
                const _dmail = sp.get('mail');
                if (_did && _dmail) {
                    mypageState.email = _dmail;
                    try { localStorage.setItem('hdm_mypage_email', _dmail); } catch (e) {}
                    mypageState._autoLookup = { id: _did, mail: _dmail };
                    setTimeout(() => { if (mypageState._autoLookup && mypageState.view !== 'detail') lookupMypage(); }, 350);
                }
                if (window.history && window.history.replaceState) {
                    window.history.replaceState({}, '', window.location.pathname);
                }
            }
        } catch (e) { /* noop */ }
    })();
    // エリア未選択（ゲート表示中）は予約アプリの重い初期化を行わない＝立ち上がり高速化。
    // エリア選択後は ?area= 付きで再読込されるので、その時に初期化される。
    if (window.__kdAppCtx) {
        // 言語切替によるページ再読込時、保存した日程を復元（30分以内・同エリア）
        try {
            var _r = JSON.parse(localStorage.getItem('kd_resume') || 'null');
            localStorage.removeItem('kd_resume');
            if (_r && _r.ts && (Date.now() - _r.ts < 1800000) && _r.datetime && _r.store === (typeof KD_STORE !== 'undefined' ? KD_STORE : '')) {
                state.datetime = _r.datetime;
            }
        } catch (e) {}
        render();
        resetHeroTimer();
        setTimeout(function () { try { applyStepFocus(); } catch (e) {} }, 80); // 初回描画後にステップ誘導を反映
        loadGooglePlaces(); // 検索用Google Placesを非同期ロード（失敗時はNominatim）
    }
    </script>
