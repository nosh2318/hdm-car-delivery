<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><style>html,body{margin:0;background:#000;overflow:hidden}canvas{display:block}</style></head>
<body><canvas id="c" width="1080" height="1920"></canvas>
<script>
const W=1080,H=1920,Y='#fabe00',BLUE='#38aef5',CORAL='#ff685c',INK='#111827',WHITE='#fff';
const c=document.getElementById('c'),ctx=c.getContext('2d');
const src={phone:'assets/youth/01_phone_friends.png',handover:'assets/youth/02_key_handover.png',drive:'assets/youth/03_city_drive.png',trip:'assets/youth/04_roadtrip.png',logo:'../images/logo_header.png',m1:'assets/mobile_map.png',m2:'assets/mobile_cars.png',m3:'assets/mobile_confirm.png'};
const im={},clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v)),ease=x=>{x=clamp(x);return 1-Math.pow(1-x,3)},smooth=x=>{x=clamp(x);return x*x*(3-2*x)},alpha=(t,a,b,f=.35)=>clamp((t-a)/f)*clamp((b-t)/f);
function load(){return Promise.all(Object.entries(src).map(([k,s])=>new Promise((ok,fail)=>{const x=new Image;x.onload=()=>{im[k]=x;ok()};x.onerror=fail;x.src=s})))}
function cover(x,dx,dy,dw,dh,z=1,ox=.5,oy=.5){const r=Math.max(dw/x.width,dh/x.height)*z,sw=dw/r,sh=dh/r;ctx.drawImage(x,(x.width-sw)*ox,(x.height-sh)*oy,sw,sh,dx,dy,dw,dh)}
function rr(x,y,w,h,r,fill,stroke=null,lw=3){ctx.beginPath();ctx.roundRect(x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke()}}
function txt(s,x,y,n,w='800',col=WHITE,align='left',fam='-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif'){ctx.save();ctx.font=`${w} ${n}px ${fam}`;ctx.fillStyle=col;ctx.textAlign=align;ctx.textBaseline='alphabetic';ctx.fillText(s,x,y);ctx.restore()}
function topShade(){const g=ctx.createLinearGradient(0,0,0,860);g.addColorStop(0,'rgba(8,18,32,.88)');g.addColorStop(.72,'rgba(8,18,32,.22)');g.addColorStop(1,'rgba(8,18,32,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,900)}
function pill(s,x,y,w,col=Y,ink=INK,rot=0){ctx.save();ctx.translate(x+w/2,y+37);ctx.rotate(rot);rr(-w/2,-37,w,74,37,col);txt(s,0,14,29,'900',ink,'center');ctx.restore()}
function confetti(t){for(let i=0;i<18;i++){const x=(i*173+93)%W,y=(i*257+120+t*95)%H,a=(i%4)*Math.PI/4;ctx.save();ctx.translate(x,y);ctx.rotate(a+t*.5);ctx.fillStyle=[Y,BLUE,CORAL,WHITE][i%4];ctx.globalAlpha=.8;ctx.fillRect(-8,-22,16,44);ctx.restore()}}
function photoScene(img,t,a,b,title,sub,accent=Y,ox=.5,oy=.5){const A=alpha(t,a,b),p=smooth((t-a)/(b-a));ctx.globalAlpha=A;cover(img,-35*p,0,W+70,H,1.04+.05*p,ox,oy);topShade();ctx.globalAlpha=A*ease((t-a)/.55);txt(title,64,235,75,'900');txt(sub,67,318,35,'800',accent);ctx.fillStyle=accent;ctx.fillRect(67,357,250*ease((t-a-.25)/.7),11);ctx.globalAlpha=1}
function intro(t){const A=alpha(t,0,3.3);ctx.globalAlpha=A;ctx.fillStyle='#eefaff';ctx.fillRect(0,0,W,H);confetti(t);ctx.save();ctx.translate(W/2,H/2);ctx.rotate(-.035);ctx.globalAlpha=A*ease(t/.55);rr(-460,-330,920,245,55,INK);txt('クルマ、取りに行く？',0,-174,63,'900',WHITE,'center');ctx.globalAlpha=A*ease((t-.65)/.55);rr(-405,10,810,245,55,Y);txt('届けてもらお。',0,166,79,'900',INK,'center');ctx.restore();ctx.globalAlpha=A*ease((t-1.45)/.55);pill('CAR DELIVERY',330,1260,420,BLUE,WHITE,.025);ctx.globalAlpha=1}
function phone(t){photoScene(im.phone,t,2.7,6.8,'集合場所をタップ。','ホテルでも、街でも。',Y,.52,.55);const A=alpha(t,2.7,6.8);ctx.globalAlpha=A*ease((t-3.2)/.5);pill('01  PLACE',65,420,240,Y,INK,-.025);ctx.globalAlpha=1}
function handover(t){photoScene(im.handover,t,6.2,10.8,'クルマが来る。','受け取ったら、即スタート。',Y,.56,.55);const A=alpha(t,6.2,10.8);ctx.globalAlpha=A*ease((t-6.8)/.5);pill('02  KEY',65,420,210,CORAL,WHITE,.025);ctx.globalAlpha=1}
function drive(t){photoScene(im.drive,t,10.2,14.9,'予定より、自由。','街から旅が始まる。',Y,.58,.52);const A=alpha(t,10.2,14.9);ctx.globalAlpha=A*ease((t-10.8)/.5);pill('03  DRIVE',65,420,250,BLUE,WHITE,-.02);ctx.globalAlpha=1}
function trip(t){photoScene(im.trip,t,14.3,19.0,'行きたい場所が、','今日の目的地。',Y,.5,.55);const A=alpha(t,14.3,19);ctx.globalAlpha=A*ease((t-15)/.5);pill('GOOD DAY!',65,420,260,Y,INK,.025);ctx.globalAlpha=1}
function mobile(t){const A=alpha(t,18.4,25.3);ctx.globalAlpha=A;ctx.fillStyle='#eaf8ff';ctx.fillRect(0,0,W,H);confetti(t*.35);txt('スマホで、サクッと。',W/2,165,62,'900',INK,'center');txt('場所 → 車 → 予約',W/2,225,33,'900',BLUE,'center');const list=[{i:im.m1,d:18.6,l:'場所を選ぶ'},{i:im.m2,d:20.45,l:'車を選ぶ'},{i:im.m3,d:22.3,l:'予約を確認'}];for(let j=0;j<list.length;j++){const q=list[j],show=alpha(t,q.d,q.d+2.55,.35),p=ease((t-q.d)/.5),w=690,h=1490,x=(W-w)/2,y=300+90*(1-p);ctx.save();ctx.globalAlpha=A*show;ctx.shadowColor='rgba(20,70,100,.25)';ctx.shadowBlur=45;rr(x,y,w,h,55,WHITE);ctx.shadowBlur=0;ctx.beginPath();ctx.roundRect(x,y,w,h,55);ctx.clip();cover(q.i,x,y,w,h,1,.5,.06);ctx.restore();ctx.save();ctx.globalAlpha=A*show;rr(300,340,480,82,41,INK);txt(`${j+1}  ${q.l}`,W/2,396,31,'900',WHITE,'center');ctx.restore()}ctx.globalAlpha=1}
function end(t){const A=alpha(t,24.7,30,.6),p=ease((t-25)/.7);ctx.globalAlpha=A;ctx.fillStyle=WHITE;ctx.fillRect(0,0,W,H);ctx.fillStyle=Y;ctx.fillRect(0,0,W,24);ctx.fillStyle=BLUE;ctx.fillRect(0,H-24,W,24);confetti(t*.6);ctx.globalAlpha=A*p;const lw=800,lh=109;ctx.drawImage(im.logo,(W-lw)/2,440+45*(1-p),lw,lh);txt('スマートに借りて、',W/2,815,69,'900',INK,'center');txt('自由に走ろう',W/2,915,78,'900',INK,'center');pill('YOUR TRIP. YOUR WAY.',270,1055,540,Y,INK,-.018);txt('SAPPORO CAR DELIVERY SERVICE',W/2,1270,23,'900','#64748b','center','Arial');ctx.globalAlpha=1}
function renderAt(t){ctx.clearRect(0,0,W,H);ctx.fillStyle=INK;ctx.fillRect(0,0,W,H);intro(t);phone(t);handover(t);drive(t);trip(t);mobile(t);end(t);ctx.globalAlpha=1}
window.ready=load().then(()=>renderAt(0));window.renderAt=renderAt;
</script></body></html>
