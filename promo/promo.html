<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>KEYDROP Promotion</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050505}
    canvas{display:block;width:1280px;height:720px}
  </style>
</head>
<body>
<canvas id="c" width="1280" height="720"></canvas>
<script>
const W=1280,H=720,Y='#fabe00',BLACK='#111111',WHITE='#ffffff';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const assets={
  logo:'../images/logo_header.png',
  arrival:'assets/generated/01_hotel_arrival.png',
  handover:'assets/generated/02_key_handover.png',
  drive:'assets/generated/03_city_drive.png',
  phone:'assets/generated/04_phone_map.png',
  mobileMap:'assets/mobile_map.png',
  mobileCars:'assets/mobile_cars.png',
  mobileConfirm:'assets/mobile_confirm.png'
};
const imgs={};
const clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
const ease=x=>{x=clamp(x);return 1-Math.pow(1-x,3)};
const smooth=x=>{x=clamp(x);return x*x*(3-2*x)};
const alpha=(t,a,b,fo=.45)=>clamp((t-a)/fo)*clamp((b-t)/fo);
function load(){return Promise.all(Object.entries(assets).map(([k,s])=>new Promise((ok,fail)=>{const im=new Image();im.onload=()=>{imgs[k]=im;ok()};im.onerror=fail;im.src=s})));}
function cover(im,x,y,w,h,zoom=1,ox=.5,oy=.5){
  const r=Math.max(w/im.width,h/im.height)*zoom,sw=w/r,sh=h/r;
  const sx=(im.width-sw)*ox,sy=(im.height-sh)*oy;
  ctx.drawImage(im,sx,sy,sw,sh,x,y,w,h);
}
function roundRect(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.roundRect(x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}
function text(s,x,y,size,weight='700',color=WHITE,align='left',family='-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif'){
  ctx.save();ctx.font=`${weight} ${size}px ${family}`;ctx.textAlign=align;ctx.textBaseline='alphabetic';ctx.fillStyle=color;ctx.fillText(s,x,y);ctx.restore();
}
function trackingText(s,x,y,size,spacing,color=WHITE,weight='800'){
  ctx.save();ctx.font=`${weight} ${size}px Arial,sans-serif`;ctx.fillStyle=color;ctx.textBaseline='alphabetic';
  let px=x;for(const ch of s){ctx.fillText(ch,px,y);px+=ctx.measureText(ch).width+spacing}ctx.restore();
}
function shade(a=.45){ctx.fillStyle=`rgba(0,0,0,${a})`;ctx.fillRect(0,0,W,H)}
function yellowRule(x,y,w){ctx.fillStyle=Y;ctx.fillRect(x,y,w,6)}
function vignette(a=.55){const g=ctx.createRadialGradient(W/2,H/2,120,W/2,H/2,760);g.addColorStop(.45,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${a})`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}
function speedLines(t){ctx.save();ctx.globalCompositeOperation='screen';for(let i=0;i<8;i++){const y=120+i*70+Math.sin(t*2+i)*10;const x=((t*250+i*173)%1500)-180;const g=ctx.createLinearGradient(x,y,x+250,y);g.addColorStop(0,'rgba(250,190,0,0)');g.addColorStop(.5,'rgba(250,190,0,.32)');g.addColorStop(1,'rgba(250,190,0,0)');ctx.fillStyle=g;ctx.fillRect(x,y,250,2)}ctx.restore()}
function sceneIntro(t){
  const a=alpha(t,0,3.6);ctx.globalAlpha=a;ctx.fillStyle=BLACK;ctx.fillRect(0,0,W,H);
  const p=ease((t-.25)/1.1);ctx.fillStyle=Y;ctx.fillRect(0,0,W*p,9);
  text('クルマを借りるために、',92,272,38,'700','#bdbdbd');
  text('移動する。',92,354,72,'900',WHITE);
  const q=ease((t-1.25)/.8);ctx.globalAlpha=a*q;text('その常識を、終わらせる。',96,424,27,'800',Y);
  ctx.globalAlpha=1;
}
function scenePhone(t){
  const a=alpha(t,3,7.8);ctx.globalAlpha=a;const p=smooth((t-3)/4.8);
  cover(imgs.phone,-20*p,0,W+40,H,1+.055*p,.48,.5);vignette(.45);
  ctx.fillStyle='rgba(0,0,0,.68)';ctx.fillRect(0,0,510,H);
  text('01',62,145,22,'900',Y,'left','Arial');text('場所を選ぶ。',62,225,58,'900',WHITE);
  text('ホテルでも、街でも。',64,285,28,'700','#e4e4e4');
  text('地図で指定したその場所へ。',64,327,25,'600','#cfcfcf');
  yellowRule(64,377,165*ease((t-3.6)/.8));speedLines(t);ctx.globalAlpha=1;
}
function sceneArrival(t){
  const a=alpha(t,7.1,12.2);ctx.globalAlpha=a;const p=smooth((t-7.1)/5.1);
  cover(imgs.arrival,-80+100*p,0,W,H,1.12-.04*p,.46,.53);vignette(.4);speedLines(t);
  const grad=ctx.createLinearGradient(0,0,720,0);grad.addColorStop(0,'rgba(0,0,0,.82)');grad.addColorStop(.65,'rgba(0,0,0,.25)');grad.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grad;ctx.fillRect(0,0,760,H);
  trackingText('YOUR CAR.',62,252,63,1.5,WHITE,'900');trackingText('IS COMING.',62,330,63,1.5,Y,'900');
  text('クルマが、あなたのもとへ走ってくる。',65,391,25,'700',WHITE);ctx.globalAlpha=1;
}
function sceneHandover(t){
  const a=alpha(t,11.5,16.5);ctx.globalAlpha=a;const p=smooth((t-11.5)/5);
  cover(imgs.handover,0,0,W,H,1.06+.03*p,.58,.5);vignette(.35);
  ctx.fillStyle='rgba(0,0,0,.64)';ctx.fillRect(0,0,470,H);
  text('02',62,145,22,'900',Y,'left','Arial');text('鍵を受け取る。',62,228,52,'900',WHITE);
  text('店舗へ行かない。',64,296,27,'700','#dddddd');text('待ち時間も、移動もいらない。',64,337,25,'600','#cfcfcf');
  const pulse=.5+.5*Math.sin((t-11.5)*5);ctx.fillStyle=`rgba(250,190,0,${.22*pulse})`;ctx.beginPath();ctx.arc(865,353,32+12*pulse,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
}
function sceneDrive(t){
  const a=alpha(t,15.8,21.2);ctx.globalAlpha=a;const p=smooth((t-15.8)/5.4);
  cover(imgs.drive,-35*p,0,W+70,H,1.04+.04*p,.54,.5);vignette(.46);speedLines(t*1.8);
  ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(0,0,520,H);
  trackingText('RENT SMART.',58,270,55,1.2,WHITE,'900');trackingText('DRIVE FREE.',58,342,55,1.2,Y,'900');
  text('届いた瞬間から、旅が始まる。',61,402,26,'700',WHITE);ctx.globalAlpha=1;
}
function sceneService(t){
  const a=alpha(t,20.5,25.6);ctx.globalAlpha=a;ctx.fillStyle='#101010';ctx.fillRect(0,0,W,H);speedLines(t*.7);
  text('スマホで、すべて完結。',62,94,38,'900',WHITE);text('場所指定から予約確認まで。',64,134,23,'700',Y);
  const cards=[
    {im:imgs.mobileMap,x:166,delay:20.55,label:'01  場所を指定'},
    {im:imgs.mobileCars,x:488,delay:20.95,label:'02  車両を選択'},
    {im:imgs.mobileConfirm,x:810,delay:21.35,label:'03  内容を確認'}
  ];
  for(const c of cards){
    const p=ease((t-c.delay)/.65), y=178+70*(1-p), w=260,h=565;
    ctx.save();ctx.globalAlpha=a*p;ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=26;roundRect(c.x,y,w,h,25,'#fff');ctx.shadowBlur=0;
    ctx.beginPath();ctx.roundRect(c.x,y,w,h,25);ctx.clip();cover(c.im,c.x,y,w,h,1,.5,.12);ctx.restore();
    ctx.save();ctx.globalAlpha=a*p;roundRect(c.x+12,y+14,w-24,42,21,'rgba(17,17,17,.9)');text(c.label,c.x+w/2,y+42,16,'800',WHITE,'center');ctx.restore();
  }
  ctx.globalAlpha=1;
}
function sceneEnd(t){
  const a=alpha(t,24.9,30,.7);ctx.globalAlpha=a;ctx.fillStyle=WHITE;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=BLACK;ctx.fillRect(0,0,W,14);ctx.fillStyle=Y;ctx.fillRect(0,H-14,W,14);
  const p=ease((t-25.3)/.9);const lw=656*.72,lh=89*.72;ctx.drawImage(imgs.logo,(W-lw)/2,138+(1-p)*30,lw,lh);
  text('CAR DELIVERY PLATFORM',640,295,24,'900',BLACK,'center','Arial');
  text('スマートに借りて、自由に走ろう',640,410,43,'900',BLACK,'center');
  roundRect(430,488,420,64,32,Y);text('移動を、もっと自由に。',640,531,23,'900',BLACK,'center');
  text('SAPPORO  /  JAPAN',640,611,15,'800','#777','center','Arial');ctx.globalAlpha=1;
}
function renderAt(t){
  ctx.clearRect(0,0,W,H);ctx.globalAlpha=1;ctx.fillStyle=BLACK;ctx.fillRect(0,0,W,H);
  sceneIntro(t);scenePhone(t);sceneArrival(t);sceneHandover(t);sceneDrive(t);sceneService(t);sceneEnd(t);
  ctx.globalAlpha=1;
}
window.ready=load().then(()=>renderAt(0));window.renderAt=renderAt;
</script>
</body>
</html>
