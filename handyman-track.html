  html,body{height:100%}

  a{color:#0369a1}

  /* header */
  .hd{background:#0F1F45;color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px 8px;flex-wrap:wrap;position:sticky;top:0;z-index:30;flex:none}
  .hd .mark{width:20px;height:15px;display:flex;flex-direction:column;justify-content:space-between}
  .hd .mark i{height:3px;background:#FABE00;border-radius:2px;display:block}
  .hd b{font-size:18px;font-weight:900;letter-spacing:.04em;color:#fff}.hd .y{color:#FABE00}
  .langbar{margin-left:auto;display:flex;gap:4px}
  .langbar button{border:1px solid #3a4668;background:#16234a;color:#cbd5e1;font-size:11px;font-weight:800;padding:4px 8px;border-radius:8px;cursor:pointer;line-height:1}
  .langbar button.on{background:#FABE00;color:#0F1F45;border-color:#FABE00}
  .langrow{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;padding:12px 16px 0}
  .langrow button{border:1px solid #d0d5dd;background:#fff;color:#334155;font-size:12px;font-weight:800;padding:7px 13px;border-radius:10px;cursor:pointer;line-height:1;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .langrow button.on{background:#FABE00;color:#0F1F45;border-color:#FABE00}

  /* status banner */
  .status{padding:16px;flex:none}
  .status .pill{background:#fff;border:1px solid #eceef1;border-radius:16px;padding:16px 18px;box-shadow:0 8px 24px rgba(14,17,22,.06)}
  .status .st-line{font-size:17px;font-weight:900;display:flex;align-items:center;gap:8px;line-height:1.4}
  .status .st-sub{font-size:13px;color:#666;margin-top:6px}
  .status.delivering .pill{border-color:#FABE00;background:#fffbf0}
  .status.collecting .pill{border-color:#0369a1;background:#f0f8ff}
  .status.offhours .pill{background:#f7f7f7}

  /* meeting address */
  .addr{margin:0 16px 12px;background:#fff;border:1px solid #eceef1;border-radius:14px;padding:14px 16px;box-shadow:0 4px 14px rgba(14,17,22,.05);flex:none}
  .addr .lbl{font-size:11px;font-weight:800;letter-spacing:.04em;color:#a07c00;background:#fffbf0;border:1px solid #FABE00;border-radius:999px;padding:3px 10px;display:inline-block}
  .addr .val{font-size:15px;font-weight:700;margin-top:8px;word-break:break-word}
  .addr .map-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:13px;font-weight:800;color:#0369a1;text-decoration:none;background:#eef6fc;border:1px solid #cfe5f5;border-radius:10px;padding:8px 12px}

  /* map */
  #map{flex:1;min-height:280px;width:100%;background:#e7ebef}
  .map-wrap{flex:1;display:flex;flex-direction:column;min-height:300px;position:relative}
  .map-fallback{display:none;padding:20px 16px;text-align:center;color:#666;font-size:14px}
  .map-fallback.show{display:block}
  .dist-chip{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(14,17,22,.86);color:#fff;font-size:13px;font-weight:800;padding:7px 14px;border-radius:999px;z-index:5;display:none;box-shadow:0 4px 12px rgba(0,0,0,.3)}
  .dist-chip.show{display:block}
  .stale-chip{position:absolute;top:50px;left:50%;transform:translateX(-50%);background:rgba(180,90,0,.92);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;z-index:5;display:none}
  .stale-chip.show{display:block}

  /* share button */
  .share-bar{padding:14px 16px calc(14px + env(safe-area-inset-bottom));flex:none;background:#fff;border-top:1px solid #eceef1}
  .btn-share{display:block;width:100%;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:900;color:#1a1a1a;background:#FABE00;cursor:pointer;box-shadow:0 6px 18px rgba(250,190,0,.35)}
  .btn-share:active{transform:translateY(1px)}
  .btn-share:disabled{opacity:.6}
  .share-msg{text-align:center;font-size:12.5px;color:#666;margin-top:10px;min-height:16px}
  .share-msg.ok{color:#127a3e;font-weight:700}
  .share-msg.err{color:#c0392b}
  .share-guide{font-size:12.5px;font-weight:800;color:#1a1a1a;margin-bottom:10px;text-align:center;line-height:1.5}
  .share-safe{font-size:11px;color:#8a8f96;margin-top:10px;text-align:center;line-height:1.65}

  .loading{padding:40px 16px;text-align:center;color:#888;font-size:14px}
</style>

  function detectLang() {
    try { const s = localStorage.getItem('kd_lang'); if (s && I18N[s]) return s; } catch (e) {}
    const n = (navigator.language || 'ja').toLowerCase();
    if (n.indexOf('zh') === 0) return 'zh';
    if (n.indexOf('ko') === 0) return 'ko';
    if (n.indexOf('ja') === 0) return 'ja';
    if (n.indexOf('en') === 0) return 'en';
    return 'ja';
  }
  let LANG = detectLang();
  function t(key, vars) {
    let s = (I18N[LANG] && I18N[LANG][key] != null) ? I18N[LANG][key] : (I18N.ja[key] || '');
    if (vars) Object.keys(vars).forEach(k => { s = s.replace('{' + k + '}', vars[k]); });
    return s;
  }
  function setTxt(id, val) { const e = document.getElementById(id); if (e) e.textContent = val; }

    const html = LANGS.map(l => '<button data-l="' + l[0] + '"' + (l[0] === LANG ? ' class="on"' : '') + '>' + l[1] + '</button>').join('');
    ['langbar', 'langrow'].forEach(id => {
      const bar = document.getElementById(id); if (!bar) return;
      bar.innerHTML = html;
      bar.querySelectorAll('button').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.l)));
    });
  }
  function applyLang(lang) {
    if (!I18N[lang]) return;
    LANG = lang;
    try { localStorage.setItem('kd_lang', lang); } catch (e) {}
    document.documentElement.lang = lang;
    document.title = t('title');

    setTxt('shareSafe', t('safe'));
    setTxt('addrLbl', t('meetLbl'));

      body: JSON.stringify(body)
    }).then(r => r.ok ? r.json() : Promise.reject(r.status)).catch(() => null);
  }

    if (window.google && window.google.maps) { gmapReady = true; return; }

    const s = document.createElement('script');
    s.id = 'gmScript'; s.async = true;
    s.src = 'https://maps.googleapis.com/maps/api/js?key=' + GMAPS_KEY + '&language=ja&region=JP&loading=async&callback=__trackMapReady';
    s.onerror = function () { gmapReady = false; showMapFallback(); };
    document.head.appendChild(s);
  }

  function showMapFallback() {
    const fb = document.getElementById('mapFallback');
    if (fb) fb.classList.add('show');
  }

  // ===== UI scaffold =====
  function buildScaffold() {
    const root = document.getElementById('root');
    root.innerHTML = `
      <div class="langrow" id="langrow"></div>
      <div class="status offhours" id="statusBox">
        <div class="pill">
          <div class="st-line" id="stLine">${t('checking')}</div>
          <div class="st-sub" id="stSub"></div>
        </div>
      </div>
      <div class="addr" id="addrBox" style="display:none">
        <span class="lbl" id="addrLbl">${t('meetLbl')}</span>
        <div class="val" id="addrVal"></div>
      </div>
      <div class="map-wrap">
        <div class="dist-chip" id="distChip"></div>
        <div class="stale-chip" id="staleChip">${t('stale')}</div>
        <div id="map"></div>
        <div class="map-fallback" id="mapFallback">${t('mapFail')}</div>
      </div>
      <div class="share-bar">
        <div class="share-guide" id="shareGuide">${t('shareGuide')}</div>
        <button class="btn-share" id="shareBtn">${t('shareBtn')}</button>
        <div class="share-msg" id="shareMsg"></div>
        <div class="share-safe" id="shareSafe">${t('safe')}</div>
      </div>
    `;
    document.getElementById('shareBtn').addEventListener('click', shareLocation);
  }

  // ===== status text by kd_status =====
  function applyStatus(d) {
    const box = document.getElementById('statusBox');
    const line = document.getElementById('stLine');
    const sub = document.getElementById('stSub');
    if (!box || !line || !sub) return;
    box.className = 'status offhours';
    if (!d) {
      line.textContent = t('offLine');
      sub.textContent = t('offSub');
      return;
    }
    if (d.kd_status === 'delivering') {
      box.className = 'status delivering';
      line.textContent = t('delLine');
      sub.innerHTML = t('delSub');
    } else if (d.kd_status === 'collecting') {
      box.className = 'status collecting';
      const em = MODE_EMOJI[driverMode];
      line.textContent = em ? (t('colLine') + '｜' + em + ' ' + t('mode_' + driverMode)) : (t('colLine') + '｜' + t('colWait'));
      sub.innerHTML = t('colSub');
    } else if (d.kd_status === 'returning') {
      box.className = 'status collecting';
      line.textContent = t('retLine');
      sub.innerHTML = t('retSub');
    } else {
      line.textContent = t('offLine');
      sub.textContent = t('offSub');
    }
    const sb = document.getElementById('shareBtn');
    if (sb) sb.textContent = custShared ? t('shared') : (d.kd_status === 'returning' ? t('retBtn') : t('shareBtnEmph'));
  }

  // ===== meeting address =====
  function applyAddr(d) {
    const box = document.getElementById('addrBox');
    if (!box) return;
    if (d && d.del_place) {
      box.style.display = 'block';
      document.getElementById('addrVal').textContent = d.del_place;
    } else {
      box.style.display = 'none';
    }
  }

  // ===== map =====
  function renderMap() {
    if (!gmapReady || !lastData) return;
    const d = lastData;
    const hasDriver = (d.driver_lat != null && d.driver_lng != null);
    const hasCust = (d.cust_lat != null && d.cust_lng != null);
    if (!hasDriver && !hasCust) { geocodeMeet(d.del_place); return; }

    if (!map) {
      const center = hasDriver ? { lat: +d.driver_lat, lng: +d.driver_lng } : { lat: +d.cust_lat, lng: +d.cust_lng };
      map = new google.maps.Map(document.getElementById('map'), {
        center, zoom: 15, disableDefaultUI: true, zoomControl: true,
        gestureHandling: 'greedy'
      });
    }

    // 回収/返却時はアイコンを入替：車はお客様側、動くスタッフは移動手段に応じて 🚶/🛴/🚲/🚗（お届け時は🚗＝スタッフ/🧍＝お客様）
    const collecting = (d.kd_status === 'collecting' || d.kd_status === 'returning');
    const driverEmoji = collecting ? (MODE_EMOJI[driverMode] || '🚶') : '🚗';
    const driverLabel = collecting ? (t('staff') + (MODE_EMOJI[driverMode] ? '（' + t('mode_' + driverMode) + '）' : '')) : t('staff');
    const custEmoji = collecting ? '🚗' : '🧍';

    if (hasDriver) {
      const pos = { lat: +d.driver_lat, lng: +d.driver_lng };
      if (!driverMarker) {
        driverMarker = new google.maps.Marker({
          map, position: pos, title: t('staff'),
          label: { text: driverEmoji, fontSize: '22px' },
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: '#FABE00', fillOpacity: 1, strokeColor: '#0F1F45', strokeWeight: 2 }
        });
      } else {
        smoothMove(driverMarker, pos);
        driverMarker.setLabel({ text: driverEmoji, fontSize: '22px' });
      }
    }

    if (hasCust) {
      const pos = { lat: +d.cust_lat, lng: +d.cust_lng };
      if (!custMarker) {
        custMarker = new google.maps.Marker({
          map, position: pos, title: t('youCust'),
          label: { text: custEmoji, fontSize: '20px' },
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor: '#0369a1', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
        });
      } else {
        custMarker.setPosition(pos);
        custMarker.setLabel({ text: custEmoji, fontSize: '20px' });
      }
    }

    if (hasDriver) {
      if (!driverIW) { driverIW = new google.maps.InfoWindow({ disableAutoPan: true }); driverIW.open(map, driverMarker); }
      driverIW.setContent('<div style="font-weight:800;font-size:12px;white-space:nowrap;color:#92400e">' + driverEmoji + ' ' + driverLabel + '</div>');
    }
    if (hasCust) {
      if (!custIW) { custIW = new google.maps.InfoWindow({ disableAutoPan: true }); custIW.open(map, custMarker); }
      custIW.setContent('<div style="font-weight:800;font-size:12px;white-space:nowrap;color:#0369a1">' + custEmoji + ' ' + t('youCust') + '</div>');
    }

    geocodeMeet(d.del_place);  // 待ち合わせ住所を📍ピンに（お客様が未共有でも目的地が見える）

    const chip = document.getElementById('distChip');
    if (hasDriver && hasCust) {
      const dist = haversine(+d.driver_lat, +d.driver_lng, +d.cust_lat, +d.cust_lng);
      chip.textContent = t('dist', { d: fmtDist(dist) });
      chip.classList.add('show');
    } else { chip.classList.remove('show'); }
    fitAll();
  }

  function fitAll() {
    if (!map) return;
    const pts = [];
    if (driverMarker && driverMarker.getPosition()) pts.push(driverMarker.getPosition());
    if (custMarker && custMarker.getPosition()) pts.push(custMarker.getPosition());
    if (meetMarker && meetMarker.getPosition()) pts.push(meetMarker.getPosition());
    if (pts.length >= 2) { const b = new google.maps.LatLngBounds(); pts.forEach(p => b.extend(p)); map.fitBounds(b, 70); }
    else if (pts.length === 1) { map.panTo(pts[0]); }
  }

  function refreshMeetIW() {
    if (meetMarker && meetIW && meetCleanAddr) {
      meetIW.setContent('<div style="font-weight:800;font-size:13px;white-space:nowrap;color:#6d28d9">🎯 ' + t('destPin') + '：' + meetCleanAddr + '</div>');
    }
  }
  // 目的地ピンを配置（座標が既知なら即置く・取りこぼし防止＝冪等）
  function placeMeet(loc, label) {
    if (!map || !loc) return;
    meetCleanAddr = label || meetCleanAddr;
    if (!meetMarker) {
      meetMarker = new google.maps.Marker({
        map, position: loc, title: '🎯 ' + t('destPin'), zIndex: 999,
        label: { text: '🎯', fontSize: '26px' },
        icon: { path: google.maps.SymbolPath.CIRCLE, scale: 20, fillColor: '#7c3aed', fillOpacity: 0.95, strokeColor: '#fff', strokeWeight: 3 },
        animation: google.maps.Animation.DROP
      });
    } else meetMarker.setPosition(loc);
    if (!meetIW) meetIW = new google.maps.InfoWindow({ disableAutoPan: true });
    refreshMeetIW();
    meetIW.open(map, meetMarker);
    fitAll();
  }

  let _geocoder = null, meetLoc = null;
  // 住所→座標：リファラ制限キーはGeocoding RESTで弾かれるため地図JSのGeocoderを使用
  function geocodeMeet(addr) {
    if (!gmapReady || !addr) return;
    const clean = String(addr).replace(/[（(][^）)]*[）)]/g, '').trim();
    if (!clean) return;
    if (meetLoc && clean === meetAddrDone) { placeMeet(meetLoc, clean); return; }
    if (clean === meetAddrTrying) return;
    meetAddrTrying = clean;
    if (!_geocoder) _geocoder = new google.maps.Geocoder();
    // フォールバック候補：番地付き → 丁目 → 町名（Googleが番地を解決できない条丁目住所対策）
    const cands = [clean];
    const c2 = clean.replace(/[0-9０-９]+\s*[-ー－]\s*[0-9０-９]+.*$/, '').trim();
    if (c2 && cands.indexOf(c2) < 0) cands.push(c2);
    const mi = clean.indexOf('丁目');
    if (mi > 0) { const c3 = clean.slice(0, mi + 2); if (cands.indexOf(c3) < 0) cands.push(c3); }
    let idx = 0;
    const tryNext = function () {
      if (idx >= cands.length) { meetAddrTrying = ''; return; }
      const qy = cands[idx++];
      const _req = { address: qy, region: 'jp', language: 'ja' };
      const _blat = lastData ? +(lastData.cust_lat != null ? lastData.cust_lat : lastData.driver_lat) : NaN;
      const _blng = lastData ? +(lastData.cust_lng != null ? lastData.cust_lng : lastData.driver_lng) : NaN;
      if (!isNaN(_blat) && !isNaN(_blng)) {
        _req.bounds = new google.maps.LatLngBounds({ lat: _blat - 0.5, lng: _blng - 0.5 }, { lat: _blat + 0.5, lng: _blng + 0.5 });
      }
      _geocoder.geocode(_req, function (results, status) {
        if (status === 'OK' && results && results[0]) {
          meetLoc = results[0].geometry.location; meetAddrDone = clean; meetAddrTrying = '';
          if (!map) { renderMap(); return; }
          placeMeet(meetLoc, clean);
        } else { tryNext(); }
      });
    };
    tryNext();
  }

  function smoothMove(marker, target) {
    const start = marker.getPosition();
    if (!start) { marker.setPosition(target); return; }
    const sLat = start.lat(), sLng = start.lng();
    const steps = 20; let i = 0;
    const tick = () => {
      i++;
      const f = i / steps;
      marker.setPosition({ lat: sLat + (target.lat - sLat) * f, lng: sLng + (target.lng - sLng) * f });
      if (i < steps) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  function haversine(la1, lo1, la2, lo2) {
    const R = 6371000, toR = x => x * Math.PI / 180;
    const dLa = toR(la2 - la1), dLo = toR(lo2 - lo1);
    const a = Math.sin(dLa / 2) ** 2 + Math.cos(toR(la1)) * Math.cos(toR(la2)) * Math.sin(dLo / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(a));
  }
  function fmtDist(m) { return m >= 1000 ? (m / 1000).toFixed(1) + 'km' : Math.round(m / 10) * 10 + 'm'; }

  // ===== stale check =====
  function applyStale(d) {
    const chip = document.getElementById('staleChip');
    if (d && d.driver_at && (d.driver_lat != null)) {
      const ageMs = Date.now() - new Date(d.driver_at).getTime();
      if (ageMs > 90000) chip.classList.add('show'); else chip.classList.remove('show');
    } else {
      chip.classList.remove('show');
    }
  }

  // ===== share my location =====
  function shareLocation() {
    const btn = document.getElementById('shareBtn');
    const msg = document.getElementById('shareMsg');
    if (!navigator.geolocation) {
      msg.className = 'share-msg err'; msg.textContent = t('noGeo');
      return;
    }
    msg.className = 'share-msg'; msg.textContent = t('getting');
    btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        const ok = await rpc('keydrop_track_set_cust', { p_res: R, p_token: T, p_lat: lat, p_lng: lng });
        btn.disabled = false;
        if (ok === true || ok === false) {
          if (ok === true) {
            custShared = true;
            msg.className = 'share-msg ok'; msg.textContent = t('sharedOk');
            poll();
          } else {
            msg.className = 'share-msg err'; msg.textContent = t('shareFail');
          }
        } else {
          msg.className = 'share-msg err'; msg.textContent = t('commFail');
        }
      },
      (err) => {
        btn.disabled = false;
        msg.className = 'share-msg err';
        if (err.code === 1) msg.textContent = t('denied');
        else msg.textContent = t('getFail');
      },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  }

  // ===== poll =====
  async function poll() {
    if (!R || !T) return;
    const arr = await rpc('keydrop_track_get', { p_res: R, p_token: T });
    let d = (Array.isArray(arr) && arr.length) ? arr[0] : null;
    if(d && d.kd_status_at){ const _age=(Date.now()-new Date(d.kd_status_at).getTime())/3600000; if(_age>6){ d=null; } }  // 6時間で自動オフ(放置・完了忘れ対策)
    lastData = d;
    if (d && d.kd_status === 'collecting') {
      try { const m = await rpc('keydrop_track_get_mode', { p_res: R, p_token: T }); if (typeof m === 'string') driverMode = m; }
      catch (e) { /* 未デプロイ時は無視＝🚶 */ }
    } else { driverMode = ''; }
    applyStatus(d);
    applyAddr(d);
    applyStale(d);
    if (d && (d.driver_lat != null || d.cust_lat != null)) {
      if (!gmapReady) loadMaps(); else renderMap();
    }
  }

  // ===== init =====
  (function init() {
    document.getElementById('initLoading') && (document.getElementById('initLoading').remove());
    document.documentElement.lang = LANG;
    document.title = t('title');
    buildScaffold();
    buildLangBar();
    if (!R || !T) {
      applyStatus(null);
      document.getElementById('stSub').textContent = t('badLink');
      return;
    }
    loadMaps();
    poll();
    setInterval(poll, 15000);
  })();
</script>
</body>
</html>
