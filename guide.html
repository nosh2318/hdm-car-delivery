function buildCarousel(mountId, slides){
  var root=document.getElementById(mountId);
  var h='<div class="kc"><div class="kc-track">';
  slides.forEach(function(s,i){
    h+='<div class="kc-slide"><div class="kc-card">'
      +'<div class="kc-chrome"><i></i><i></i><i></i></div>'
      +'<div class="kc-shot"><img src="'+s.img+'" alt="" loading="lazy"></div>'
      +'<div class="kc-cap"><span class="kc-badge">STEP '+(i+1)+'</span>'
      +'<h3 data-k="'+s.k+'-t"></h3><p data-k="'+s.k+'-d"></p></div>'
      +'</div></div>';
  });
  h+='</div><button class="kc-prev" aria-label="prev">‹</button><button class="kc-next" aria-label="next">›</button></div>'
    +'<div class="kc-bar"><i></i></div><div class="kc-dots"></div>';
  root.innerHTML=h;
  var kc=root.querySelector('.kc'), track=root.querySelector('.kc-track');
  var dots=root.querySelector('.kc-dots'), bar=root.querySelector('.kc-bar i');
  var idx=0, n=slides.length;
  for(var i=0;i<n;i++){ (function(j){ var b=document.createElement('b'); b.onclick=function(){go(j);}; dots.appendChild(b); })(i); }
  function go(i){ idx=Math.max(0,Math.min(n-1,i)); track.style.transform='translateX(-'+(idx*100)+'%)';
    var bs=dots.querySelectorAll('b'); for(var j=0;j<bs.length;j++) bs[j].classList.toggle('on',j===idx);
    bar.style.width=((idx+1)/n*100)+'%'; }
  root.querySelector('.kc-prev').onclick=function(){go(idx-1);};
  root.querySelector('.kc-next').onclick=function(){go(idx+1);};
  var sx=null;
  kc.addEventListener('pointerdown',function(e){sx=e.clientX;});
  kc.addEventListener('pointerup',function(e){ if(sx==null)return; var dx=e.clientX-sx; if(Math.abs(dx)>40) go(idx+(dx<0?1:-1)); sx=null; });
  kc.addEventListener('pointercancel',function(){sx=null;});
  go(0);
}

(function(){
  var KEY='kd_lang', LS=['ja','en','zh','ko'];
  function detect(){ try{var s=localStorage.getItem(KEY); if(s&&LS.indexOf(s)>=0)return s;}catch(e){} var n=(navigator.language||'ja').toLowerCase(); return n.indexOf('ko')===0?'ko':n.indexOf('zh')===0?'zh':n.indexOf('en')===0?'en':'ja'; }
  function setLang(l){ if(LS.indexOf(l)<0)l='ja'; var D=L[l]||L.ja;
    document.documentElement.lang=l; document.title=D.title;
    document.querySelectorAll('[data-i18n]').forEach(function(el){ var k=el.getAttribute('data-i18n'); if(D[k]!=null) el.innerHTML=D[k]; });
    document.querySelectorAll('[data-k]').forEach(function(el){ var k=el.getAttribute('data-k'); var base=k.slice(0,-2), fld=k.slice(-1); var o=D.s[base]; if(o) el.textContent=(fld==='t'?o.t:o.d); });
    document.querySelectorAll('#langsw button').forEach(function(b){ b.classList.toggle('active',b.getAttribute('data-l')===l); });
    try{localStorage.setItem(KEY,l);}catch(e){}
  }
  buildCarousel('carBook', SLIDES.book);
  buildCarousel('carMy', SLIDES.my);
  document.querySelectorAll('#langsw button').forEach(function(b){ b.onclick=function(){ setLang(b.getAttribute('data-l')); }; });
  setLang(detect());
})();
</script>
