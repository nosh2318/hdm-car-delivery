<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>KEYDROP гӮҜгғјгғқгғіз®ЎзҗҶ</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Helvetica Neue',sans-serif;background:#f5f6f8;color:#1a1a1a;line-height:1.6;padding-bottom:60px}
  .hd{background:#0e1116;color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  .hd b{font-size:16px;font-weight:900;letter-spacing:.03em}.hd .y{color:#FABE00}
  .hd .who{margin-left:auto;font-size:11px;color:#9aa0a8}
  .wrap{max-width:760px;margin:0 auto;padding:18px 14px}
  .card{background:#fff;border-radius:14px;box-shadow:0 1px 8px rgba(0,0,0,.06);padding:16px;margin-bottom:14px;border:1px solid #eee}
  label{display:block;font-size:12px;font-weight:800;color:#555;margin:10px 0 4px}
  input,select,textarea{width:100%;border:1.5px solid #e2e2e8;border-radius:9px;padding:10px 11px;font-size:14px;font-family:inherit;color:#1a1a1a;background:#fff}
  textarea{resize:vertical;min-height:54px}
  .row{display:flex;gap:10px}.row>div{flex:1}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:900;cursor:pointer;font-family:inherit}
  .btn.p{background:#FABE00;color:#1a1a1a}.btn.d{background:#dc2626;color:#fff}.btn.s{background:#fff;color:#1a1a1a;border:1.5px solid #ddd}
  .btn.full{width:100%}
  .err{color:#dc2626;font-size:12.5px;font-weight:700;margin-top:8px}
  .ok{color:#059669;font-size:12.5px;font-weight:700;margin-top:8px}
  .cp{border:1px solid #eee;border-radius:12px;padding:12px 13px;margin-bottom:10px;background:#fff}
  .cp.off{opacity:.55}
  .cp .top{display:flex;align-items:center;gap:8px}
  .cp .code{font-size:16px;font-weight:900;letter-spacing:.04em;background:#0e1116;color:#FABE00;padding:3px 10px;border-radius:8px}
  .cp .disc{font-size:14px;font-weight:900;color:#1a1a1a}
  .cp .meta{font-size:11.5px;color:#777;margin-top:6px;line-height:1.7}
  .cp .meta b{color:#444}
  .cp .acts{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .cp .acts button{font-size:12px;font-weight:800;border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-family:inherit}
  .badge{font-size:10px;font-weight:900;padding:3px 8px;border-radius:999px;margin-left:auto}
  .badge.on{background:#dcfce7;color:#166534}.badge.no{background:#fee2e2;color:#991b1b}
  .muted{color:#9aa0a8;font-size:12px;text-align:center;padding:20px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .modal.on{display:flex}
  .sheet{background:#fff;width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:18px 16px 26px;max-height:92vh;overflow:auto}
  @media(min-width:560px){.modal{align-items:center}.sheet{border-radius:18px}}
  .sheet h2{font-size:17px;font-weight:900;margin-bottom:4px}
</style>
</head>
<body>
<div class="hd"><b>KEY<span class="y">DROP</span> гӮҜгғјгғқгғіз®ЎзҗҶ</b><span class="who" id="who"></span></div>
<div class="wrap" id="app"></div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script>
var SB_URL='https://ckrxttbnawkclshczsia.supabase.co';
var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrcnh0dGJuYXdrY2xzaGN6c2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4Nzg1NTAsImV4cCI6MjA4NzQ1NDU1MH0.kDC_UDVWvcrS97wzqQ3NXP79ewjgYwF4vSFdV7y06S8';
var TOKEN=null, EMAIL=null, COUPONS=[], REDEMPTIONS=[], KPIRANGE='all', KPISTORE='all';
var app=document.getElementById('app'), modal=document.getElementById('modal'), sheet=document.getElementById('sheet'), who=document.getElementById('who');
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function hdrs(){return {apikey:ANON, Authorization:'Bearer '+(TOKEN||ANON), 'content-type':'application/json'};}

// ---- гғӯгӮ°гӮӨгғі ----
function renderLogin(msg){
  TOKEN=null; who.textContent='';
  app.innerHTML='<div class="card"><h2 style="font-size:17px;font-weight:900;margin-bottom:4px;">гӮ№гӮҝгғғгғ•гғӯгӮ°гӮӨгғі</h2>'
    +'<div style="font-size:12px;color:#777;margin-bottom:8px;">гӮҜгғјгғқгғігҒ®зҷәиЎҢгғ»з®ЎзҗҶгҒ«гҒҜгғӯгӮ°гӮӨгғігҒҢеҝ…иҰҒгҒ§гҒҷгҖӮ</div>'
    +'<label>гғЎгғјгғ«гӮўгғүгғ¬гӮ№</label><input id="email" type="email" autocomplete="username" placeholder="staff@g-lines.jp">'
    +'<label>гғ‘гӮ№гғҜгғјгғү</label><input id="pw" type="password" autocomplete="current-password">'
    +(msg?'<div class="err">'+esc(msg)+'</div>':'')
    +'<button class="btn p full" style="margin-top:14px;" onclick="doLogin()">гғӯгӮ°гӮӨгғі</button></div>';
}
async function doLogin(){
  var email=document.getElementById('email').value.trim(), pw=document.getElementById('pw').value;
  if(!email||!pw){renderLogin('гғЎгғјгғ«гҒЁгғ‘гӮ№гғҜгғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„');return;}
  try{
    var r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{apikey:ANON,'content-type':'application/json'},body:JSON.stringify({email:email,password:pw})});
    var j=await r.json();
    if(!r.ok||!j.access_token){renderLogin('гғӯгӮ°гӮӨгғігҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹпјҲгғЎгғјгғ«/гғ‘гӮ№гғҜгғјгғүгӮ’гҒ”зўәиӘҚгҒҸгҒ гҒ•гҒ„пјү');return;}
    TOKEN=j.access_token; EMAIL=email; who.textContent=email;
    try{localStorage.setItem('kdc_tok',TOKEN);localStorage.setItem('kdc_email',email);}catch(e){}
    loadCoupons();
  }catch(e){renderLogin('йҖҡдҝЎгӮЁгғ©гғјпјҡ'+e.message);}
}
function logout(){TOKEN=null;try{localStorage.removeItem('kdc_tok');localStorage.removeItem('kdc_email');}catch(e){}renderLogin();}

// ---- дёҖиҰ§ ----
async function loadCoupons(){
  app.innerHTML='<div class="muted">иӘӯгҒҝиҫјгҒҝдёӯвҖҰ</div>';
  try{
    var r=await fetch(SB_URL+'/rest/v1/keydrop_coupons?select=*&order=created_at.desc',{headers:hdrs()});
    if(r.status===401){return renderLogin('гӮ»гғғгӮ·гғ§гғігҒҢеҲҮгӮҢгҒҫгҒ—гҒҹгҖӮеҶҚеәҰгғӯгӮ°гӮӨгғігҒ—гҒҰгҒҸгҒ гҒ•гҒ„');}
    COUPONS=await r.json(); if(!Array.isArray(COUPONS))COUPONS=[];
    try{ var r2=await fetch(SB_URL+'/rest/v1/keydrop_coupon_redemptions?select=*&order=redeemed_at.desc&limit=5000',{headers:hdrs()}); REDEMPTIONS=r2.ok?await r2.json():[]; if(!Array.isArray(REDEMPTIONS))REDEMPTIONS=[]; }catch(e){ REDEMPTIONS=[]; }
    renderList();
  }catch(e){app.innerHTML='<div class="err">иӘӯгҒҝиҫјгҒҝеӨұж•—пјҡ'+esc(e.message)+'</div>';}
}
function discLabel(c){return c.discount_type==='percent'?(Number(c.discount_value)+'% OFF'+(c.max_discount_yen?'пјҲдёҠйҷҗВҘ'+Number(c.max_discount_yen).toLocaleString()+'пјү':'')):('ВҘ'+Number(c.discount_value).toLocaleString()+' OFF');}
function storeLabel(s){return s==='all'?'е…Ёеә—':s==='spk'?'жңӯе№Ң':s==='nha'?'йӮЈиҰҮ':s;}
function fmtD(s){return s?String(s).slice(0,10):'вҖ”';}
function yen(n){return 'ВҘ'+(Number(n)||0).toLocaleString();}
function maskMail(m){m=String(m||'');var i=m.indexOf('@');if(i<1)return m?'***':'вҖ”';return m.slice(0,2)+'***'+m.slice(i);}
function renderDash(){
  var now=new Date(); var ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  var rs = REDEMPTIONS.filter(function(x){
    if(KPISTORE!=='all' && (x.store||'spk')!==KPISTORE) return false;
    if(KPIRANGE==='month' && (x.redeemed_at||'').slice(0,7)!==ym) return false;
    return true;
  });
  var cnt=rs.length;
  var discSum=rs.reduce(function(a,x){return a+(Number(x.discount_amount)||0);},0);
  var finalSum=rs.reduce(function(a,x){return a+(Number(x.final_amount)||0);},0);
  var baseSum=rs.reduce(function(a,x){return a+(Number(x.base_amount)||0);},0);
  var avg=cnt?Math.round(discSum/cnt):0;
  var totalC=COUPONS.length, activeC=COUPONS.filter(function(c){return c.active;}).length;
  // гӮҜгғјгғқгғіеҲҘйӣҶиЁҲпјҲйҒёжҠһжңҹй–“пјү
  var byCode={}; rs.forEach(function(x){var k=(x.code||'').toUpperCase(); if(!byCode[k])byCode[k]={cnt:0,disc:0}; byCode[k].cnt++; byCode[k].disc+=Number(x.discount_amount)||0;});
  var rows=Object.keys(byCode).map(function(k){return {code:k,cnt:byCode[k].cnt,disc:byCode[k].disc};}).sort(function(a,b){return b.cnt-a.cnt;});
  var card=function(lbl,val,sub){return '<div style="flex:1;min-width:120px;background:#fff;border:1px solid #eee;border-radius:12px;padding:12px 13px;"><div style="font-size:10.5px;font-weight:800;color:#888;">'+lbl+'</div><div style="font-size:19px;font-weight:900;color:#1a1a1a;margin-top:3px;">'+val+'</div>'+(sub?'<div style="font-size:10px;color:#aaa;margin-top:1px;">'+sub+'</div>':'')+'</div>';};
  var h='<div class="card" style="padding:14px;"><div style="display:flex;align-items:center;margin-bottom:10px;"><div style="font-size:14px;font-weight:900;">рҹ“Ҡ гӮҜгғјгғқгғіKPI</div>'
    +'<div style="margin-left:auto;display:flex;gap:6px;">'
    +'<button onclick="setRange(\'all\')" style="font-size:11px;font-weight:800;border:1px solid '+(KPIRANGE==='all'?'#1a1a1a':'#ddd')+';background:'+(KPIRANGE==='all'?'#1a1a1a':'#fff')+';color:'+(KPIRANGE==='all'?'#fff':'#666')+';border-radius:999px;padding:5px 11px;cursor:pointer;">е…Ёжңҹй–“</button>'
    +'<button onclick="setRange(\'month\')" style="font-size:11px;font-weight:800;border:1px solid '+(KPIRANGE==='month'?'#1a1a1a':'#ddd')+';background:'+(KPIRANGE==='month'?'#1a1a1a':'#fff')+';color:'+(KPIRANGE==='month'?'#fff':'#666')+';border-radius:999px;padding:5px 11px;cursor:pointer;">д»ҠжңҲ</button>'
    +'</div></div>'
    +'<div style="display:flex;gap:6px;margin-bottom:10px;">'
    +['all','spk','nha'].map(function(st){var lbl=st==='all'?'е…Ёеә—':st==='spk'?'жңӯе№Ң':'йӮЈиҰҮ';return '<button onclick="setStore(\''+st+'\')" style="font-size:11px;font-weight:800;border:1px solid '+(KPISTORE===st?'#FABE00':'#ddd')+';background:'+(KPISTORE===st?'#FABE00':'#fff')+';color:'+(KPISTORE===st?'#1a1a1a':'#666')+';border-radius:999px;padding:5px 13px;cursor:pointer;">'+lbl+'</button>';}).join('')
    +'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;">'
    +card('еҲ©з”Ёд»¶ж•°', cnt+'д»¶', KPIRANGE==='month'?ym:'зҙҜиЁҲ')
    +card('еүІеј•з·ҸйЎҚ', yen(discSum), 'дјҡзӨҫиІ жӢ…еҲҶ')
    +card('еүІеј•еҫҢгҒ®еЈІдёҠ', yen(finalSum), 'еүІеј•еүҚ '+yen(baseSum))
    +card('е№іеқҮеүІеј•/д»¶', yen(avg), '')
    +'</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">'
    +card('зҷәиЎҢгӮҜгғјгғқгғіж•°', totalC+'зЁ®', 'жңүеҠ№ '+activeC+' / еҒңжӯў '+(totalC-activeC))
    +'</div>';
  if(rows.length){
    h+='<div style="margin-top:12px;font-size:12px;font-weight:800;color:#555;">гӮігғјгғүеҲҘ еҲ©з”Ё</div>'
      +'<table style="width:100%;border-collapse:collapse;margin-top:6px;font-size:12px;">'
      +'<tr style="color:#999;text-align:left;"><th style="padding:5px 4px;">гӮігғјгғү</th><th style="padding:5px 4px;text-align:right;">еҲ©з”Ё</th><th style="padding:5px 4px;text-align:right;">еүІеј•йЎҚ</th><th style="padding:5px 4px;text-align:right;">ж¶ҲеҢ–зҺҮ</th></tr>';
    rows.forEach(function(r){
      var c=COUPONS.find(function(x){return (x.code||'').toUpperCase()===r.code;});
      var rate=(c&&c.max_uses)?Math.round((c.used_count||0)/c.max_uses*100)+'%':'вҖ”';
      h+='<tr style="border-top:1px solid #f1f1f1;"><td style="padding:6px 4px;font-weight:800;">'+r.code+'</td><td style="padding:6px 4px;text-align:right;">'+r.cnt+'д»¶</td><td style="padding:6px 4px;text-align:right;">'+yen(r.disc)+'</td><td style="padding:6px 4px;text-align:right;">'+rate+'</td></tr>';
    });
    h+='</table>';
  }
  h+='</div>';
  return h;
}
function setRange(r){KPIRANGE=r;renderList();}
function setStore(st){KPISTORE=st;renderList();}
function renderList(){
  // гӮігғјгғүеҲҘ еүІеј•зҙҜиЁҲпјҲе…Ёжңҹй–“пјүпјқеҗ„гӮ«гғјгғүгҒ«иЎЁзӨә
  var discAll={}; REDEMPTIONS.forEach(function(x){var k=(x.code||'').toUpperCase(); discAll[k]=(discAll[k]||0)+(Number(x.discount_amount)||0);});
  var html=renderDash()+'<button class="btn p full" style="margin-bottom:14px;" onclick="openForm(null)">пјӢ ж–°гҒ—гҒ„гӮҜгғјгғқгғігӮ’зҷәиЎҢ</button>';
  if(!COUPONS.length){html+='<div class="muted">гҒҫгҒ гӮҜгғјгғқгғігҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>';}
  COUPONS.forEach(function(c){
    var uses=(c.used_count||0)+(c.max_uses?(' / '+c.max_uses):' / вҲһ');
    html+='<div class="cp'+(c.active?'':' off')+'">'
      +'<div class="top"><span class="code">'+esc(c.code)+'</span><span class="disc">'+esc(discLabel(c))+'</span>'
      +'<span class="badge '+(c.active?'on':'no')+'">'+(c.active?'жңүеҠ№':'еҒңжӯў')+'</span></div>'
      +'<div class="meta">еә—иҲ—пјҡ<b>'+storeLabel(c.store)+'</b>гҖҖдҪҝз”Ёпјҡ<b>'+uses+'</b>'
      +(c.per_email_once?'гҖҖ<b>1дәә1еӣһ</b>':'')
      +(c.min_amount_yen?'гҖҖжңҖдҪҺВҘ'+Number(c.min_amount_yen).toLocaleString():'')
      +'гҖҖеүІеј•зҙҜиЁҲпјҡ<b>'+yen(discAll[(c.code||'').toUpperCase()]||0)+'</b>'
      +'<br>жңҹй–“пјҡ'+fmtD(c.valid_from)+' гҖң '+fmtD(c.valid_until)
      +(c.memo?('<br>гғЎгғўпјҡ'+esc(c.memo)):'')+'</div>'
      +'<div class="acts">'
      +'<button style="background:#1a1a1a;color:#fff;" onclick="toggleActive('+c.id+','+(c.active?'false':'true')+')">'+(c.active?'еҒңжӯўгҒҷгӮӢ':'жңүеҠ№еҢ–')+'</button>'
      +'<button style="background:#f1f1f1;color:#1a1a1a;" onclick="openForm('+c.id+')">з·ЁйӣҶ</button>'
      +'<button style="background:#fee2e2;color:#991b1b;" onclick="delCoupon('+c.id+",'"+esc(c.code)+"')\">еүҠйҷӨ</button>"
      +'</div></div>';
  });
  // рҹ§ҫ еҲ©з”ЁеұҘжӯҙпјҲеҮәеҸЈпјү
  var rlog=REDEMPTIONS.filter(function(x){return KPISTORE==='all'||(x.store||'spk')===KPISTORE;});
  if(rlog.length){
    var stLbl=KPISTORE==='all'?'е…Ёеә—':KPISTORE==='spk'?'жңӯе№Ң':'йӮЈиҰҮ';
    html+='<div class="card"><div style="font-size:14px;font-weight:900;margin-bottom:8px;">рҹ§ҫ еҲ©з”ЁеұҘжӯҙпјҲ'+stLbl+'гғ»жңҖж–°50д»¶гғ»иЁҲ'+rlog.length+'д»¶пјү</div>'
      +'<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:11.5px;white-space:nowrap;">'
      +'<tr style="color:#999;text-align:left;"><th style="padding:5px 6px;">ж—ҘжҷӮ</th><th style="padding:5px 6px;">гӮігғјгғү</th><th style="padding:5px 6px;">еә—иҲ—</th><th style="padding:5px 6px;">дәҲзҙ„з•ӘеҸ·</th><th style="padding:5px 6px;">гғЎгғјгғ«</th><th style="padding:5px 6px;text-align:right;">еүІеј•</th><th style="padding:5px 6px;text-align:right;">ж”Ҝжү•</th></tr>';
    rlog.slice(0,50).forEach(function(x){
      html+='<tr style="border-top:1px solid #f1f1f1;"><td style="padding:6px;">'+esc(String(x.redeemed_at||'').slice(0,16).replace('T',' '))+'</td>'
        +'<td style="padding:6px;font-weight:800;">'+esc(x.code||'')+'</td>'
        +'<td style="padding:6px;">'+(((x.store||'spk')==='nha')?'йӮЈиҰҮ':'жңӯе№Ң')+'</td>'
        +'<td style="padding:6px;">'+esc(x.reservation_id||'вҖ”')+'</td>'
        +'<td style="padding:6px;">'+esc(maskMail(x.email))+'</td>'
        +'<td style="padding:6px;text-align:right;color:#dc2626;font-weight:800;">-'+yen(x.discount_amount)+'</td>'
        +'<td style="padding:6px;text-align:right;">'+yen(x.final_amount)+'</td></tr>';
    });
    html+='</table></div></div>';
  }
  html+='<div style="text-align:center;margin-top:8px;"><button class="btn s" onclick="logout()">гғӯгӮ°гӮўгӮҰгғҲ</button></div>';
  app.innerHTML=html;
}

// ---- дҪңжҲҗ/з·ЁйӣҶ ----
function openForm(id){
  var c=id?COUPONS.find(function(x){return x.id===id;}):null;
  c=c||{discount_type:'percent',discount_value:10,store:'all',active:true,per_email_once:false,min_amount_yen:0,applies_to:'total'};
  sheet.innerHTML='<h2>'+(id?'гӮҜгғјгғқгғігӮ’з·ЁйӣҶ':'гӮҜгғјгғқгғігӮ’зҷәиЎҢ')+'</h2>'
    +'<label>гӮігғјгғүпјҲгҒҠе®ўж§ҳгҒҢе…ҘеҠӣпјү</label><input id="f_code" value="'+esc(c.code||'')+'" placeholder="WELCOME10" '+(id?'readonly style="background:#f3f4f6;"':'')+'>'
    +'<div class="row"><div><label>еүІеј•гӮҝгӮӨгғ—</label><select id="f_type"><option value="percent"'+(c.discount_type==='percent'?' selected':'')+'>пј…пјҲгғ‘гғјгӮ»гғігғҲпјү</option><option value="fixed"'+(c.discount_type==='fixed'?' selected':'')+'>еӣәе®ҡпјҲеҶҶпјү</option></select></div>'
    +'<div><label>еҖӨпјҲпј… гҒҫгҒҹгҒҜ еҶҶпјү</label><input id="f_val" type="number" value="'+(c.discount_value||0)+'"></div></div>'
    +'<div class="row"><div><label>пј…гҒ®еүІеј•дёҠйҷҗпјҲеҶҶгғ»д»»ж„Ҹпјү</label><input id="f_max" type="number" value="'+(c.max_discount_yen||'')+'" placeholder="з„ЎеҲ¶йҷҗ"></div>'
    +'<div><label>жңҖдҪҺеҲ©з”ЁйЎҚпјҲеҶҶпјү</label><input id="f_min" type="number" value="'+(c.min_amount_yen||0)+'"></div></div>'
    +'<div class="row"><div><label>еҜҫиұЎеә—иҲ—</label><select id="f_store"><option value="all"'+(c.store==='all'?' selected':'')+'>е…Ёеә—</option><option value="spk"'+(c.store==='spk'?' selected':'')+'>жңӯе№Ң</option><option value="nha"'+(c.store==='nha'?' selected':'')+'>йӮЈиҰҮ</option></select></div>'
    +'<div><label>дҪҝз”Ёеӣһж•°гҒ®дёҠйҷҗпјҲд»»ж„Ҹпјү</label><input id="f_maxuses" type="number" value="'+(c.max_uses||'')+'" placeholder="з„ЎеҲ¶йҷҗ"></div></div>'
    +'<div class="row"><div><label>й–Ӣе§Ӣж—ҘпјҲд»»ж„Ҹпјү</label><input id="f_from" type="date" value="'+fmtD(c.valid_from===undefined?'':c.valid_from).replace('вҖ”','')+'"></div>'
    +'<div><label>зөӮдәҶж—ҘпјҲд»»ж„Ҹпјү</label><input id="f_until" type="date" value="'+fmtD(c.valid_until===undefined?'':c.valid_until).replace('вҖ”','')+'"></div></div>'
    +'<label style="display:flex;align-items:center;gap:8px;margin-top:12px;"><input id="f_once" type="checkbox" style="width:18px;height:18px;" '+(c.per_email_once?'checked':'')+'> 1гғЎгғјгғ«гӮўгғүгғ¬гӮ№гҒ«гҒӨгҒҚ1еӣһгҒҫгҒ§</label>'
    +'<label style="display:flex;align-items:center;gap:8px;margin-top:8px;"><input id="f_active" type="checkbox" style="width:18px;height:18px;" '+(c.active?'checked':'')+'> жңүеҠ№гҒ«гҒҷгӮӢ</label>'
    +'<label>гғЎгғўпјҲзӨҫеҶ…з”Ёгғ»д»»ж„Ҹпјү</label><textarea id="f_memo">'+esc(c.memo||'')+'</textarea>'
    +'<div id="f_msg"></div>'
    +'<button class="btn p full" style="margin-top:14px;" onclick="saveForm('+(id||'null')+')">дҝқеӯҳгҒҷгӮӢ</button>'
    +'<button class="btn s full" style="margin-top:8px;" onclick="closeModal()">й–үгҒҳгӮӢ</button>';
  modal.classList.add('on');
}
function closeModal(){modal.classList.remove('on');}
function val(id){return document.getElementById(id).value;}
async function saveForm(id){
  var code=val('f_code').trim().toUpperCase();
  if(!code){document.getElementById('f_msg').innerHTML='<div class="err">гӮігғјгғүгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</div>';return;}
  var body={
    discount_type:val('f_type'), discount_value:Number(val('f_val'))||0,
    max_discount_yen:val('f_max')?Number(val('f_max')):null,
    min_amount_yen:Number(val('f_min'))||0,
    store:val('f_store'),
    max_uses:val('f_maxuses')?Number(val('f_maxuses')):null,
    valid_from:val('f_from')?val('f_from')+'T00:00:00+09:00':null,
    valid_until:val('f_until')?val('f_until')+'T23:59:59+09:00':null,
    per_email_once:document.getElementById('f_once').checked,
    active:document.getElementById('f_active').checked,
    memo:val('f_memo').trim()||null
  };
  try{
    var r;
    if(id){ r=await fetch(SB_URL+'/rest/v1/keydrop_coupons?id=eq.'+id,{method:'PATCH',headers:Object.assign(hdrs(),{Prefer:'return=minimal'}),body:JSON.stringify(body)}); }
    else { body.code=code; r=await fetch(SB_URL+'/rest/v1/keydrop_coupons',{method:'POST',headers:Object.assign(hdrs(),{Prefer:'return=minimal'}),body:JSON.stringify(body)}); }
    if(!r.ok){var t=await r.text(); document.getElementById('f_msg').innerHTML='<div class="err">дҝқеӯҳеӨұж•—пјҡ'+esc(t.indexOf('duplicate')>=0?'еҗҢгҒҳгӮігғјгғүгҒҢж—ўгҒ«гҒӮгӮҠгҒҫгҒҷ':t.slice(0,160))+'</div>';return;}
    closeModal(); loadCoupons();
  }catch(e){document.getElementById('f_msg').innerHTML='<div class="err">йҖҡдҝЎгӮЁгғ©гғјпјҡ'+esc(e.message)+'</div>';}
}
async function toggleActive(id,to){
  try{ await fetch(SB_URL+'/rest/v1/keydrop_coupons?id=eq.'+id,{method:'PATCH',headers:Object.assign(hdrs(),{Prefer:'return=minimal'}),body:JSON.stringify({active:to==='true'||to===true})}); loadCoupons(); }catch(e){alert('еӨұж•—пјҡ'+e.message);}
}
async function delCoupon(id,code){
  if(!confirm('гӮҜгғјгғқгғігҖҢ'+code+'гҖҚгӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ\\nпјҲеҲ©з”ЁеұҘжӯҙгҒҜж®ӢгӮҠгҒҫгҒҷпјү'))return;
  try{ var r=await fetch(SB_URL+'/rest/v1/keydrop_coupons?id=eq.'+id,{method:'DELETE',headers:hdrs()}); if(!r.ok){alert('еүҠйҷӨеӨұж•—пјҡ'+(await r.text()).slice(0,160));return;} loadCoupons(); }catch(e){alert('еӨұж•—пјҡ'+e.message);}
}

// ---- иө·еӢ•пјҡдҝқеӯҳжёҲгҒҝгғҲгғјгӮҜгғігҒҢгҒӮгӮҢгҒ°иҮӘеӢ•гғӯгӮ°гӮӨгғі ----
(function(){
  try{ var t=localStorage.getItem('kdc_tok'); var e=localStorage.getItem('kdc_email'); if(t){TOKEN=t;EMAIL=e;who.textContent=e||'';loadCoupons();return;} }catch(e){}
  renderLogin();
})();
