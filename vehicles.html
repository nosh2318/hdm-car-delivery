<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<title>車両と料金｜KEYDROP 札幌カーデリバリー</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f6f8;color:#1a1a1a;line-height:1.7;padding-bottom:60px}
  .hd{background:#1a1a1a;color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  .hd a.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
  .hd .mark{width:20px;height:15px;display:flex;flex-direction:column;justify-content:space-between}
  .hd .mark i{height:3px;background:#FABE00;border-radius:2px;display:block}
  .hd b{font-size:18px;font-weight:900;letter-spacing:.04em;color:#fff}.hd .y{color:#FABE00}
  .hd .back{margin-left:auto;font-size:12px;color:#FABE00;text-decoration:none;font-weight:700}
  .hero{background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:#fff;padding:28px 20px 24px;text-align:center}
  .hero h1{font-size:22px;font-weight:900}.hero h1 .y{color:#FABE00}
  .hero p{font-size:12.5px;opacity:.85;margin-top:6px}
  .wrap{max-width:840px;margin:0 auto;padding:18px 16px}
  .grid{display:grid;grid-template-columns:1fr;gap:14px}
  @media(min-width:680px){.grid{grid-template-columns:1fr 1fr}}
  .card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden;display:flex;flex-direction:column}
  .card .img{height:150px;background:#fff;display:flex;align-items:center;justify-content:center;position:relative}
  .card .img img{width:100%;height:100%;object-fit:contain;padding:6px 12px;box-sizing:border-box}
  .card .tag{position:absolute;top:10px;left:10px;font-size:11px;font-weight:900;color:#fff;border-radius:8px;padding:3px 9px}
  .card .body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
  .card h2{font-size:16px;font-weight:900}
  .card .veh{font-size:12.5px;color:#555;margin-top:2px}
  .card .meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .card .meta span{font-size:11px;font-weight:700;color:#444;background:#f4f4f4;border-radius:8px;padding:3px 9px}
  .card .feat{font-size:12px;color:#777;margin-top:8px;flex:1}
  .card .price{margin-top:10px;border-top:1px dashed #eee;padding-top:10px}
  .card .price .main{display:flex;align-items:baseline;gap:6px}
  .card .price .num{font-size:22px;font-weight:900;color:#1a1a1a}
  .card .price .unit{font-size:11px;color:#888;font-weight:700}
  .card .price .range{font-size:11px;color:#999;margin-top:2px}
  .common{background:#fff;border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.05);padding:15px 18px;margin-top:18px;font-size:12.5px;color:#444;line-height:1.9}
  .common b{color:#1a1a1a}
  .loading{text-align:center;color:#999;padding:40px 0;font-size:13px}
  .cta{display:block;text-align:center;background:#FABE00;color:#1a1a1a;font-weight:900;font-size:15px;padding:15px;border-radius:12px;text-decoration:none;margin-top:18px;box-shadow:0 3px 12px rgba(250,190,0,.4)}
</style>
</head>
<body>
<div class="hd">
  <a class="logo" href="./"><span class="mark"><i></i><i></i><i></i></span><b>KEY<span class="y">DROP</span></b></a>
  <a class="back" href="./">← TOPへ</a>
</div>
<div class="hero"><h1>車両と<span class="y">料金</span></h1><p>クラス別の車種・料金一覧（1日あたり・税込）</p></div>

<div class="wrap">
  <div id="grid" class="grid"><div class="loading">読み込み中...</div></div>
  <div id="common"></div>
  <a class="cta" href="./">🚗 レンタカーを予約する</a>
</div>

<script>
const SU='https://ckrxttbnawkclshczsia.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrcnh0dGJuYXdrY2xzaGN6c2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4Nzg1NTAsImV4cCI6MjA4NzQ1NDU1MH0.kDC_UDVWvcrS97wzqQ3NXP79ewjgYwF4vSFdV7y06S8';
const COLORS={A:'#7c3aed',A2:'#6d28d9',B:'#0284c7',B2:'#0369a1',C:'#059669',S:'#d97706',F:'#db2777',H:'#64748b'};
const IMG={A:'class_A',A2:'class_A',B:'class_B',B2:'class_B2',C:'class_C',S:'class_S',F:'class_F',H:'class_H'};
const TIERS=['閑散','通常','繁忙'];
async function get(path){try{const r=await fetch(SU+'/rest/v1/'+path,{headers:{apikey:SK,Authorization:'Bearer '+SK}});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
function pv(v){if(v==null)return null;if(typeof v==='string'){try{return JSON.parse(v);}catch(e){return null;}}return v;}
function yen(n){return '¥'+Number(n||0).toLocaleString();}
async function load(){
  const clsRows=await get('public_keydrop_classes_v?select=value');
  const cls=pv(clsRows&&clsRows[0]&&clsRows[0].value)||{order:[],items:{}};
  const order=cls.order||Object.keys(cls.items||{});
  const equip=cls.equipment||[];
  const equipTags=equip.map(function(e){return '<span>'+e+'</span>';}).join('');
  let html='';
  order.forEach(function(k){
    const it=(cls.items||{})[k]; if(!it||it.show===false)return;
    const img='images/'+(IMG[k]||'class_C')+'.png';
    html+='<div class="card">'
      +'<div class="img"><span class="tag" style="background:'+(COLORS[k]||'#1a1a1a')+'">'+k+'</span><img src="'+img+'" alt="'+(it.label||'')+'" loading="lazy"></div>'
      +'<div class="body">'
      +'<h2>'+(it.label||k)+'</h2>'
      +'<div class="veh">'+(it.vehicles||'')+'</div>'
      +'<div class="meta"><span>👥 '+(it.seats||'')+'</span>'+equipTags+'</div>'
      +(it.price?('<div class="price"><div class="main"><span class="unit" style="margin-right:4px">基本料金</span><span class="num">'+yen(it.price)+'</span><span class="unit">/ 1日（税込）</span></div></div>'):'')
      +'</div></div>';
  });
  document.getElementById('grid').innerHTML=html||'<div class="loading">車両情報がありません</div>';
  document.getElementById('common').innerHTML='<div class="common"><b>標準装備：</b>'+equip.join('／')+'<br><span style="color:#999">'+(cls.note||'')+'</span></div>';
}
load();
</script>
</body>
</html>
