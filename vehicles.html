<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<title>車両と料金｜KEYDROP カーデリバリー</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f6f8;color:#1a1a1a;line-height:1.7;padding-bottom:60px}
  .hd{background:#1a1a1a;color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  .hd a.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
  .hd .mark{width:20px;height:15px;display:flex;flex-direction:column;justify-content:space-between}
  .hd .mark i{height:3px;background:#FABE00;border-radius:2px;display:block}
  .hd b{font-size:18px;font-weight:900;letter-spacing:.04em;color:#fff}.hd .y{color:#FABE00}
  .hd .back{font-size:12px;color:#FABE00;text-decoration:none;font-weight:700;margin-left:10px;flex:none}
  .langsw{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
  .langsw button{font-size:11px;font-weight:800;color:#ccc;background:transparent;border:1px solid #555;border-radius:999px;padding:4px 9px;cursor:pointer}
  .langsw button.active{color:#1a1a1a;background:#FABE00;border-color:#FABE00}
  .hero{background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:#fff;padding:28px 20px 24px;text-align:center}
  .hero h1{font-size:22px;font-weight:900}.hero h1 .y{color:#FABE00}
  .hero p{font-size:12.5px;opacity:.85;margin-top:6px}
  .wrap{max-width:840px;margin:0 auto;padding:18px 16px}
  .grid{display:grid;grid-template-columns:1fr;gap:14px}
  @media(min-width:680px){.grid{grid-template-columns:1fr 1fr}}
  .card{background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden;display:flex;flex-direction:column}
  .card .img{height:150px;background:#fff;display:flex;align-items:center;justify-content:center;position:relative}
  .card .img img{width:100%;height:100%;object-fit:contain;padding:6px 12px;box-sizing:border-box}
  .card .tag{position:absolute;top:10px;left:10px;font-size:11px;font-weight:900;color:#fff;border-radius:8px;padding:3px 9px}
  .card .body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
  .card h2{font-size:16px;font-weight:900}
  .card .veh{font-size:12.5px;color:#555;margin-top:2px}
  .card .meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .card .meta span{font-size:11px;font-weight:700;color:#444;background:#f4f4f4;border-radius:8px;padding:3px 9px}
  .card .price{margin-top:10px;border-top:1px dashed #eee;padding-top:10px}
  .card .price .main{display:flex;align-items:baseline;gap:6px}
  .card .price .num{font-size:22px;font-weight:900;color:#1a1a1a}
  .card .price .unit{font-size:11px;color:#888;font-weight:700}
  .common{background:#fff;border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.05);padding:15px 18px;margin-top:18px;font-size:12.5px;color:#444;line-height:1.9}
  .common b{color:#1a1a1a}
  .loading{text-align:center;color:#999;padding:40px 0;font-size:13px}
  .cta{display:block;text-align:center;background:#FABE00;color:#1a1a1a;font-weight:900;font-size:15px;padding:15px;border-radius:12px;text-decoration:none;margin-top:18px;box-shadow:0 3px 12px rgba(250,190,0,.4)}
</style>
</head>
<body>
<div class="hd">
  <a class="logo" href="./"><span class="mark"><i></i><i></i><i></i></span><b>KEY<span class="y">DROP</span></b></a>
  <div class="langsw" id="langsw">
    <button data-l="ja">日本語</button><button data-l="en">EN</button><button data-l="zh">繁中</button><button data-l="ko">한국어</button>
  </div>
  <a class="back" href="./">← TOP</a>
</div>
<div class="hero"><h1 id="h1"></h1><p id="heroP"></p></div>

<div class="wrap">
  <div id="grid" class="grid"><div class="loading">…</div></div>
  <div id="common"></div>
  <a class="cta" id="cta" href="./"></a>
</div>

<script>
const SU='https://ckrxttbnawkclshczsia.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrcnh0dGJuYXdrY2xzaGN6c2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4Nzg1NTAsImV4cCI6MjA4NzQ1NDU1MH0.kDC_UDVWvcrS97wzqQ3NXP79ewjgYwF4vSFdV7y06S8';
const AREA=(function(){try{const q=new URLSearchParams(location.search).get('area');if(q)return q.toLowerCase();const s=JSON.parse(localStorage.getItem('kd_selectedArea')||'{}');return (s.area||'sapporo');}catch(e){return 'sapporo';}})();
const NHA=(AREA==='naha');
function vn(t){return NHA?t.replace(/_v(\?|$)/,'_nha_v$1'):t;}
const COLORS={A:'#7c3aed',A2:'#6d28d9',B:'#0284c7',B2:'#0369a1',C:'#059669',D:'#0ea5e9',S:'#d97706',F:'#db2777',H:'#64748b'};
const IMG={A:'class_A',A2:'class_A',B:'class_B',B2:'class_B2',C:'class_C',D:'class_D',S:'class_S',F:'class_F',H:'class_H'};

// ── i18n（静的ラベル＋クラス名。装備・車種名・noteはDB値=日本語のまま） ──
const LS=['ja','en','zh','ko'];
const I18N={
  ja:{h1a:'車両と',h1b:'料金',hero:'｜クラス別の車種・料金一覧（1日あたり・税込）',loading:'読み込み中...',noVeh:'車両情報がありません',baseFee:'基本料金',perDay:'/ 1日（税込）',equip:'標準装備：',cta:'🚗 レンタカーを予約する',area:{sapporo:'札幌',naha:'沖縄（那覇）'},cls:{}},
  en:{h1a:'Vehicles & ',h1b:'Pricing',hero:'｜Vehicles & prices by class (per day, tax incl.)',loading:'Loading...',noVeh:'No vehicle information',baseFee:'Base fee',perDay:'/ day (tax incl.)',equip:'Standard equipment: ',cta:'🚗 Book a Rental Car',area:{sapporo:'Sapporo',naha:'Okinawa (Naha)'},cls:{A:'Premium Minivan',A2:'Premium A2',B:'Minivan',B2:'Minivan B2',C:'Compact SUV',D:'Minivan',F:'Compact',H:'Sedan / Hybrid',S:'SUV'}},
  zh:{h1a:'車輛與',h1b:'價格',hero:'｜各車型車種・價格一覽（每日・含稅）',loading:'載入中...',noVeh:'無車輛資訊',baseFee:'基本費用',perDay:'/ 1天（含稅）',equip:'標準配備：',cta:'🚗 預約租車',area:{sapporo:'札幌',naha:'沖繩（那霸）'},cls:{A:'豪華廂型車',A2:'豪華 A2',B:'廂型車',B2:'廂型車 B2',C:'小型SUV',D:'廂型車',F:'小型車',H:'轎車/油電',S:'SUV'}},
  ko:{h1a:'차량 및 ',h1b:'요금',hero:'｜클래스별 차종·요금 목록 (1일당·세금 포함)',loading:'로딩 중...',noVeh:'차량 정보가 없습니다',baseFee:'기본 요금',perDay:'/ 1일 (세금 포함)',equip:'기본 장비: ',cta:'🚗 렌터카 예약하기',area:{sapporo:'삿포로',naha:'오키나와(나하)'},cls:{A:'프리미엄 미니밴',A2:'프리미엄 A2',B:'미니밴',B2:'미니밴 B2',C:'컴팩트 SUV',D:'미니밴',F:'컴팩트',H:'세단/하이브리드',S:'SUV'}}
};
const TITLES={ja:'車両と料金｜KEYDROP',en:'Vehicles & Pricing｜KEYDROP',zh:'車輛與價格｜KEYDROP',ko:'차량 및 요금｜KEYDROP'};
// 車名（DB値=日本語）→国際表記。en/zh/koは共通のラテン表記、末尾「等」のみ言語別。
const _LATIN={'アルファード':'Alphard','ヴェルファイア':'Vellfire','ベルファイア':'Vellfire','ノア':'Noah','ヴォクシー':'Voxy','セレナ':'Serena','エスクァイア':'Esquire','デリカD5':'Delica D5','デリカ':'Delica','ライズ':'Raize','ヤリスクロス':'Yaris Cross','ロッキー':'Rocky','ハリアー':'Harrier','アクア':'Aqua','ヴィッツ':'Vitz','ノート':'Note','プリウスα':'Prius α','プリウス':'Prius','ソリオ':'Solio','ルーミー':'Roomy','カローラフィールダー':'Corolla Fielder','アクセラ':'Axela','カローラ':'Corolla'};
function _mk(etc){var m={};for(var k in _LATIN)m[k]=_LATIN[k];m['等']=etc;return m;}
const MODEL={en:_mk(' etc.'),zh:_mk(' 等'),ko:_mk(' 등')};
const EQUIP={
  en:{'ナビ':'Navigation','カーナビ':'Car navigation','Bluetooth':'Bluetooth','ETC車載器':'ETC','ETC':'ETC','スタッドレスタイヤ':'Studless tires','バックカメラ':'Rear camera','ドライブレコーダー':'Dashcam'},
  zh:{'ナビ':'導航','カーナビ':'車載導航','Bluetooth':'Bluetooth','ETC車載器':'ETC','ETC':'ETC','スタッドレスタイヤ':'雪胎','バックカメラ':'倒車攝影','ドライブレコーダー':'行車記錄器'},
  ko:{'ナビ':'내비게이션','カーナビ':'내비게이션','Bluetooth':'Bluetooth','ETC車載器':'ETC','ETC':'ETC','スタッドレスタイヤ':'스터드리스 타이어','バックカメラ':'후방 카메라','ドライブレコーダー':'블랙박스'}
};
function locTokens(str,map){if(!str||LANG==='ja'||!map)return str;var keys=Object.keys(map).sort(function(a,b){return b.length-a.length;});var s=str;keys.forEach(function(k){s=s.split(k).join(map[k]);});return s;}
function locVeh(s){return locTokens(s,MODEL[LANG]);}
function locEquip(e){if(LANG==='ja')return e;var m=EQUIP[LANG];if(!m)return e;return m[e]||locTokens(e,m);}
let LANG='ja', DATA=null;
function detectLang(){try{var s=localStorage.getItem('kd_lang');if(s&&LS.indexOf(s)>=0)return s;}catch(e){}var n=(navigator.language||'ja').toLowerCase();return n.indexOf('ko')===0?'ko':n.indexOf('zh')===0?'zh':n.indexOf('en')===0?'en':'ja';}

async function get(path){try{const r=await fetch(SU+'/rest/v1/'+path,{headers:{apikey:SK,Authorization:'Bearer '+SK}});if(!r.ok)return null;return await r.json();}catch(e){return null;}}
function pv(v){if(v==null)return null;if(typeof v==='string'){try{return JSON.parse(v);}catch(e){return null;}}return v;}
function yen(n){return '¥'+Number(n||0).toLocaleString();}
function clsLabel(k,fallback){const m=I18N[LANG].cls||{};return m[k]||fallback||k;}

function render(){
  const T=I18N[LANG];
  document.documentElement.lang=LANG;
  document.title=(TITLES[LANG]||TITLES.ja)+' '+(T.area[AREA]||'');
  document.getElementById('h1').innerHTML=T.h1a+'<span class="y">'+T.h1b+'</span>';
  document.getElementById('heroP').innerHTML='📍 '+(T.area[AREA]||'')+T.hero;
  document.getElementById('cta').textContent=T.cta;
  document.querySelectorAll('#langsw button').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-l')===LANG);});
  try{localStorage.setItem('kd_lang',LANG);}catch(e){}
  if(!DATA){document.getElementById('grid').innerHTML='<div class="loading">'+T.loading+'</div>';return;}
  const cls=DATA, order=cls.order||Object.keys(cls.items||{}), equip=cls.equipment||[];
  const equipTags=equip.map(function(e){return '<span>'+locEquip(e)+'</span>';}).join('');
  let html='';
  order.forEach(function(k){
    const it=(cls.items||{})[k]; if(!it||it.show===false)return;
    const base='images/'+(IMG[k]||'class_C');
    const img=base+(NHA?'_nha':'')+'.png', imgFb=base+'.png';
    html+='<div class="card">'
      +'<div class="img"><span class="tag" style="background:'+(COLORS[k]||'#1a1a1a')+'">'+k+'</span><img src="'+img+'" onerror="this.onerror=null;this.src=\''+imgFb+'\'" alt="'+(it.label||'')+'" loading="lazy"></div>'
      +'<div class="body">'
      +'<h2>'+clsLabel(k,it.label)+'</h2>'
      +'<div class="veh">'+locVeh(it.vehicles||'')+'</div>'
      +'<div class="meta"><span>👥 '+(it.seats||'')+'</span>'+equipTags+'</div>'
      +(it.price?('<div class="price"><div class="main"><span class="unit" style="margin-right:4px">'+T.baseFee+'</span><span class="num">'+yen(it.price)+'</span><span class="unit">'+T.perDay+'</span></div></div>'):'')
      +'</div></div>';
  });
  document.getElementById('grid').innerHTML=html||'<div class="loading">'+T.noVeh+'</div>';
  document.getElementById('common').innerHTML='<div class="common"><b>'+T.equip+'</b>'+equip.join('／')+'<br><span style="color:#999">'+(cls.note||'')+'</span></div>';
}
function setLang(l){if(LS.indexOf(l)<0)l='ja';LANG=l;render();}
document.querySelectorAll('#langsw button').forEach(function(b){b.onclick=function(){setLang(b.getAttribute('data-l'));};});

async function boot(){
  LANG=detectLang(); render();
  const clsRows=await get(vn('public_keydrop_classes_v?select=value'));
  DATA=pv(clsRows&&clsRows[0]&&clsRows[0].value)||{order:[],items:{}};
  render();
}
boot();
</script>
</body>
</html>
