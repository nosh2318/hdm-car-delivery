<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>マイページ管理 | KEY-DROP</title>
<style>
:root{--bg:#eef1f5;--card:#fff;--ink:#1c2430;--sub:#6b7784;--line:#e4e8ee;--accent:#0e7a6b;
  --gold:#b45309;--danger:#b91c1c;--ok:#0e9f50;--blue:#1d4ed8;--r:12px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;font-size:13.5px;line-height:1.5}
/* header */
.hd{display:flex;align-items:center;gap:10px;padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));background:#0e7490;color:#fff;position:sticky;top:0;z-index:20}
.hd .logo{font-weight:900;font-size:16px}.hd .logo b{color:#FABE00}
.hd .t{font-weight:800;font-size:14px}
.hd .sp{margin-left:auto}
.movebar{display:flex;align-items:center;gap:10px;padding:6px 14px;background:#eef4ff;border-bottom:1px solid #d6e2f5;overflow:hidden;min-height:34px}
.movebar.has{animation:mbBlink 1.3s ease-in-out infinite}
@keyframes mbBlink{0%,100%{background:#eef4ff;box-shadow:inset 0 0 0 2px #bfdbfe}50%{background:#fff4e0;box-shadow:inset 0 0 0 2px #f59e0b}}
.movebar .mb-lbl{font-size:11px;font-weight:800;color:#1e40af;white-space:nowrap;flex:none}
.movebar .mb-empty{font-size:12px;color:#94a3b8}
.movebar .mb-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:thin;flex:1;min-width:0;-webkit-overflow-scrolling:touch}
.movebar .mb-scroll::-webkit-scrollbar{height:4px}
.movebar .mb-chip{font-size:12px;background:#fff;border:1px solid #cdddf5;border-radius:999px;padding:4px 11px;white-space:nowrap;cursor:pointer;color:#334;flex:none}
.movebar .mb-chip b{color:#0F1F45}.movebar .mb-chip i{color:#64748b;font-style:normal;font-size:11px;margin-left:3px}
.movebar .mb-chip:hover{background:#f0f6ff;border-color:#3b82f6}
@media(max-width:640px){.movebar{padding:6px 10px;gap:7px}.movebar .mb-lbl{font-size:10px}.movebar .mb-chip{font-size:11px;padding:4px 9px}}
.hd button{background:rgba(255,255,255,.14);color:#fff;border:0;border-radius:8px;padding:7px 12px;font-weight:700;font-size:12.5px;cursor:pointer}
.hd button.alert{background:var(--danger);animation:blink 1.2s infinite}
.opsel{background:#fff;color:var(--ink);border:0;border-radius:8px;padding:7px 10px;font-weight:800;font-size:12.5px;max-width:150px}
.opsel.need{background:#FABE00;color:#0F1F45;animation:blink 1.4s infinite}
.miniedit{margin-left:8px;font-size:11px;font-weight:800;color:var(--accent);background:#eafaf5;border:1px solid #b7e6da;border-radius:999px;padding:2px 9px;cursor:pointer;vertical-align:middle}
/* layout */
.main{display:grid;grid-template-columns:minmax(0,1fr) 400px;gap:12px;padding:12px;align-items:stretch;height:calc(100vh - 52px)}
@media(max-width:900px){.main{grid-template-columns:1fr;height:auto}}
.pane{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
/* カンバン */
.board{display:flex;flex-direction:column;min-width:0;height:100%}
.btoolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.bsearch{flex:1;min-width:180px;padding:9px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;background:#fff}
.todaytgl{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:var(--sub);background:#fff;border:1px solid var(--line);padding:7px 11px;border-radius:9px;cursor:pointer}
.todaytgl.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.btotal{font-size:11.5px;color:var(--sub);font-weight:700}
.bcols{display:flex;gap:14px;overflow-x:auto;flex:1;min-height:0;padding-bottom:6px}
.bcol{flex:0 0 262px;width:262px;max-width:262px;background:#f4f6f9;border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;min-height:0;box-shadow:0 1px 4px rgba(15,31,69,.06);overflow:hidden}
.bcol-h{font-size:12.5px;font-weight:900;padding:10px 12px;background:#fff;border-radius:11px 11px 0 0;display:flex;align-items:center;justify-content:space-between;gap:6px}
.bcol-n{background:var(--ink);color:#fff;font-size:11px;border-radius:999px;padding:1px 8px}
.bcol-body{overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:40px}
.bcol-empty{text-align:center;color:#b0b8c1;font-size:12px;padding:14px}
.bcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 10px;cursor:pointer;box-shadow:0 1px 3px rgba(20,30,45,.05);overflow:hidden;min-width:0}
.bcard:hover{border-color:var(--accent)}
.bcard.sel{border:2px solid var(--accent);box-shadow:0 2px 8px rgba(14,122,107,.2)}
.bc-top{display:flex;align-items:center;gap:8px}
.clsbadge.sm{width:30px;height:30px;font-size:14px;border-radius:8px}
.bc-nm{font-weight:800;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-sub{font-size:10.5px;color:var(--sub);font-family:ui-monospace,monospace;margin-top:5px;line-height:1.5}
.bc-btn{width:100%;margin-top:8px;padding:7px;border-radius:8px;font-weight:800;font-size:12px;border:0;cursor:pointer}
.bc-btn.chk{background:var(--ok);color:#fff}
.bc-btn.undo{background:#eef1f4;color:var(--sub)}
.karte-pane{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:auto;height:100%}
.karte-back{display:none}
@media(max-width:900px){
  .main{padding:8px;gap:8px}
  .bcol{flex:0 0 84%}
  .btoolbar{position:sticky;top:0}
  /* カルテはカード選択時に全画面オーバーレイ */
  .karte-pane{position:fixed;inset:0;z-index:60;border-radius:0;border:0;display:none}
  body.karte-open .karte-pane{display:block}
  body.karte-open .board{display:none}
  .karte-back{display:block;position:sticky;top:0;z-index:5;width:100%;text-align:left;
    background:#0e7490;color:#fff;border:0;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));font-weight:800;font-size:15px;cursor:pointer}
  .karte-pane{padding-bottom:env(safe-area-inset-bottom)}
}
/* ヘッダー スマホ調整 */
@media(max-width:640px){
  .hd{flex-wrap:wrap;gap:6px;padding:8px 10px}
  .hd .t{font-size:12px}
  .hd .sp{flex-basis:100%;order:5;height:0}
  .opsel{max-width:130px;font-size:11.5px;padding:6px 8px}
  .hd button{font-size:11px;padding:6px 9px}
}
/* list */
.lsearch{padding:10px;border-bottom:1px solid var(--line)}
.lsearch input{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:14px}
.chips{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding:9px 10px;border-bottom:1px solid var(--line);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;white-space:nowrap;font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--sub)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip .n{opacity:.85;margin-left:4px;font-weight:900}
.chip.on .n{opacity:1}
.list{max-height:calc(100vh - 190px);overflow:auto}
.li{display:flex;align-items:center;gap:9px;padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;position:relative}
.li:hover{background:#f6f8fa}.li.sel{background:#eafaf5}
.li.req{box-shadow:inset 4px 0 0 var(--danger)}.li.chg{box-shadow:inset 4px 0 0 var(--ok)}
.li.sel{box-shadow:inset 4px 0 0 var(--accent)}
.li .clsbadge{width:38px;height:38px;flex:none;border-radius:9px;color:#fff;font-weight:900;font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.li .m{flex:1;min-width:0}
.li .nm{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.otatag{font-size:9.5px;font-weight:800;color:#fff;border-radius:5px;padding:1px 6px;vertical-align:middle}
.li .rid2{font-family:ui-monospace,monospace;font-size:12px;color:var(--ink);font-weight:700;margin-top:2px}
.li .r2{font-size:11px;color:var(--sub);margin-top:2px}
.actline{font-size:12px;font-weight:800;margin-top:4px;padding:4px 8px;border-radius:7px;line-height:1.4;
  white-space:normal;word-break:break-word}
.actline.a-reans{background:#f3ecff;color:#6b21a8}
.actline.a-req{background:#fff7e0;color:#8a5a00}
.actline.a-chg{background:#ffeceb;color:#b91c1c}
.actline.a-miss{background:#f1f5f9;color:#475569}
.actline.a-ack{background:#e9f9ef;color:#0e7a4a}
.li .pop{position:absolute;right:8px;top:8px;font-size:10px;font-weight:800;color:#fff;background:var(--gold);border-radius:999px;padding:1px 7px;animation:pop 1.4s infinite}
.li .pop.chg{background:var(--ok);animation:none}
.li .pop.reans{background:#7c3aed}
.li .pop.chg2{background:var(--danger)}
.li .pop.miss{background:#64748b;animation:none}
.li .pop.ack{background:#0e9f50;animation:none}
.chip.reanswer.on{background:#7c3aed;border-color:#7c3aed}
.chip.noplace.on{background:#64748b;border-color:#64748b}
.li.reans{box-shadow:inset 4px 0 0 #7c3aed}.li.miss{box-shadow:inset 4px 0 0 #64748b}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
/* detail */
.detail{min-height:300px}
.dhd{padding:14px;background:linear-gradient(135deg,var(--accent),#0a5e52);color:#fff}
.dhd .dnm{font-size:18px;font-weight:900}
.dhd .dbadges{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.dhd .dbadge{background:#fff;border:1px solid rgba(255,255,255,.5);border-radius:10px;padding:6px 11px;line-height:1.2}
.dhd .dbadge .dl{display:block;font-size:9.5px;font-weight:800;color:var(--sub);letter-spacing:.5px}
.dhd .dbadge .dv{display:block;font-size:14px;font-weight:900;color:var(--ink)}
.dhd .dbadge[style*="background"] .dv{color:#fff}
.dhd .dst{display:inline-block;margin-top:10px;font-size:11.5px;font-weight:700;background:rgba(255,255,255,.2);padding:3px 11px;border-radius:999px}
.dbody{padding:14px}
.sec{margin-bottom:16px}
.sec h3{font-size:12px;font-weight:800;color:var(--sub);margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px}
.kv{display:flex;padding:6px 0;border-top:1px solid var(--line);font-size:13px}
.kv:first-of-type{border-top:0}.kv .k{width:92px;flex:none;color:var(--sub)}.kv .v{flex:1;font-weight:600}
.kv .v.chg{color:var(--gold);font-weight:800}
.grp{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
.grp-h{background:#f6f8fa;font-size:11.5px;font-weight:800;color:var(--ink);padding:6px 12px;border-bottom:1px solid var(--line)}
.grp .kv{padding:6px 12px}.grp .kv:first-of-type{border-top:0}
.cmpbox{background:#fff5f5;border:1.5px solid #f0b8b8;border-left:5px solid var(--danger);border-radius:12px;padding:12px;margin-bottom:12px}
.cmp-h{font-weight:900;font-size:13.5px;color:var(--danger);margin-bottom:8px}
.cmp-tbl{background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.cmp-row{display:grid;grid-template-columns:78px 1fr 16px 1fr;gap:6px;align-items:center;padding:7px 10px;border-top:1px solid var(--line);font-size:12.5px}
.cmp-row:first-child{border-top:0}
.cmp-head{background:#f6f8fa;font-size:10px;font-weight:800;color:var(--sub)}
.cmp-f{font-weight:800}
.cmp-b{color:var(--sub);text-decoration:line-through}
.cmp-ar{text-align:center;color:var(--danger);font-weight:900}
.cmp-a{font-weight:900;color:var(--danger)}
.cmp-c.newer{border-width:2px;box-shadow:0 0 0 2px rgba(220,38,38,.15)}
.cmp-c.newer .cmp-l{color:#dc2626}
.mm-hint{margin-top:8px;font-size:12px;font-weight:800;color:#b91c1c;background:#fff;border:1px dashed #fca5a5;border-radius:8px;padding:7px 9px}
.dft{margin:8px 0;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;background:#fff}
.dft-r{display:flex;flex-wrap:wrap;gap:2px 10px;align-items:baseline;padding:7px 10px;border-top:1px solid #f0f0f0}
.dft-r:first-child{border-top:0}
.dft-r.nw{background:#fef2f2}
.dft-l{font-size:10.5px;font-weight:800;color:var(--sub);min-width:78px}
.dft-t{font-size:11px;font-weight:800;color:#94a3b8;min-width:96px}
.dft-r.nw .dft-t{color:#dc2626}
.dft-v{font-size:13px;font-weight:700;flex:1;min-width:150px;word-break:break-all}
.verdict{font-size:12px;font-weight:800;border-radius:8px;padding:7px 9px}
.verdict.op{background:#fff7ed;color:#b45309;border:1px solid #fed7aa}
.verdict.ss{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.verdict.unk{background:#f8fafc;color:#475569;border:1px solid #e2e8f0}
.okline{font-size:12px;font-weight:800;color:#0e9f50;margin:2px 0 8px}
.vfoot{display:block;margin-top:4px;font-size:10.5px;font-weight:700;color:#7c2d12;opacity:.8}
.reanswer{background:#fff4f0;border:1.5px solid #f0b89a;border-left:5px solid var(--warn);border-radius:12px;padding:12px;margin-bottom:12px}
.reanswer .ra-h{font-weight:900;font-size:13.5px;color:var(--warn)}
.reanswer .ra-b{font-size:12.5px;margin-top:4px;line-height:1.5}
.karte{background:#fffdf5;border:1px solid #f0e3b8;border-radius:12px;padding:12px}
.karte h3{margin-bottom:8px;color:#8a6d00}
.ktags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.ktags button{font-size:11.5px;font-weight:700;border:1px solid #e6d59a;background:#fff;color:#7a5c00;border-radius:999px;padding:5px 10px;cursor:pointer}
.ktags button:hover{background:#fff6d8}
#knote{width:100%;min-height:70px;padding:10px;border:1.5px solid #e6d59a;border-radius:9px;font-size:14px;font-family:inherit;resize:vertical}
.karteflag{margin-left:5px}
.kartepeek{font-size:11px;color:#8a6d00;background:#fff8e1;border-radius:6px;padding:2px 7px;margin-top:3px;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.warn{border:1px solid #f3c9c9;background:#fff6f6;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12.5px}
.warn b{color:var(--danger)}
.mmrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:5px}
.mmrow .lab{color:var(--sub);font-size:10px}
.chg-item{border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:7px}
.chg-item.req{border-left:4px solid var(--gold);background:#fffdf7}
.chg-item.cancel{border-left:4px solid var(--danger);background:#fff7f7}
.chg-item.applied{border-left:4px solid var(--ok)}
.chg-item .ci{display:flex;align-items:center;gap:7px;font-weight:800;font-size:12.5px}
.chg-item .st{font-size:10.5px;font-weight:800;padding:1px 8px;border-radius:999px;margin-left:auto}
.st.requested{background:#fef3c7;color:var(--gold)}.st.applied{background:#dcfce7;color:var(--ok)}
.st.approved{background:#dbeafe;color:var(--blue)}.st.rejected{background:#f1f5f9;color:var(--sub)}
.chg-item .cb{font-size:12.5px;margin-top:3px}.chg-item .arrow{color:var(--gold);font-weight:800;margin:0 3px}
.chg-item .ba{font-size:9.5px;font-weight:800;color:#fff;background:var(--sub);border-radius:5px;padding:1px 5px;margin-right:2px}
.chg-item .applied .ba{}
.chg-item .meta{font-size:10.5px;color:var(--sub);margin-top:2px}
.acts{display:flex;gap:7px;margin-top:8px}
.btn{padding:8px 12px;border-radius:8px;font-weight:800;font-size:12.5px;border:0;cursor:pointer}
.btn.ok{background:var(--ok);color:#fff}.btn.dang{background:#fff;color:var(--danger);border:1.5px solid #f0c2c2}
.btn.pri{background:var(--accent);color:#fff}.btn.ghost{background:#eef1f4;color:var(--ink)}
.btn.line{background:#06c755;color:#fff}
.dactions{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px}
.empty{text-align:center;color:var(--sub);padding:40px 20px}
/* modal */
.scrim{position:fixed;inset:0;background:rgba(15,25,45,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:14px}
.scrim.show{display:flex}
.modal{background:#fff;border-radius:14px;max-width:440px;width:100%;padding:18px;max-height:88vh;overflow:auto}
.modal h3{margin:0 0 12px;font-size:16px;font-weight:800}
.cfgrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
.cfgrow:first-of-type{border-top:0}.cfgrow .cl{flex:1;font-weight:700;font-size:13px}
.cfgrow .cl small{display:block;font-weight:500;color:var(--sub);font-size:11px;margin-top:3px;line-height:1.45}
.swstate{font-size:9.5px;font-weight:800;padding:1px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
.swstate.on{background:#dcfce7;color:var(--ok)}.swstate.off{background:#f1f5f9;color:var(--sub)}
.cfghelp{font-size:12px;color:var(--ink);background:#f0f6ff;border:1px solid #cfe0f5;border-radius:9px;padding:9px 11px;margin-bottom:10px;line-height:1.5}
.cfgstat{font-size:12px;font-weight:800;border-radius:9px;padding:8px 11px;margin-bottom:6px}
.cfgstat.on{background:#eafaf5;color:var(--ok);border:1px solid #b7e6da}
.cfgstat.off{background:#f8fafc;color:var(--sub);border:1px solid var(--line)}
.cfgdiv{text-align:center;font-size:10.5px;color:var(--sub);margin:12px 0 4px;letter-spacing:1px}
.sw{width:44px;height:25px;border-radius:999px;background:#cbd5e1;position:relative;cursor:pointer;flex:none;transition:.2s}
.sw.on{background:var(--ok)}.sw::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s}.sw.on::after{left:22px}
.inp{padding:7px 9px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;width:80px}
.inp.wide{width:200px}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#1c2430;color:#fff;padding:11px 18px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:.25s;z-index:99}
.toast.show{opacity:1}
.spin{width:24px;height:24px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}
.login{max-width:340px;margin:60px auto;text-align:center;background:#fff;padding:24px;border-radius:14px}
.login input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:10px;font-size:16px}
.backbtn{display:none!important}
.fresh{font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap;margin-right:2px}
.fresh .auto{font-size:9.5px;background:#eef2f7;color:#64748b;border-radius:6px;padding:1px 5px;margin-left:2px}
</style>
</head>
<body>
<div id="app"><div class="spin"></div></div>
<div id="errbar" style="display:none;position:fixed;left:0;right:0;bottom:0;background:#b91c1c;color:#fff;padding:10px 14px;font-size:12px;z-index:999;font-family:monospace"></div>
<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>
const SB="https://ckrxttbnawkclshczsia.supabase.co";

function csOf(r){return CHG[(typeof r==="string"?r:r.id)]||[]}
// 場所の全ソースを収集：form(SS/エルメ)・resv(予約情報)・op(OPタスクの実体・_ssPlace優先)。区分で要否も返す。
function placeSources(r){
  const id=(typeof r==="string"?r:r.id);const rr=(typeof r==="string"?(RES.find(x=>x.id===id)||{}):r)||{};
  const ss=SS_MAP[id]||{};const pm=PLACE_MAP[id];  // pm=OPタスクが存在すれば{del,col}(未来で未生成ならundefined)
  const vt=String(rr.visit_type||""),rtp=String(rr.return_type||"");
  return {
    form:{del:String(ss.del||"").trim(),col:String(ss.col||"").trim()},
    resv:{del:String(rr.del_place||"").trim(),col:String(rr.col_place||"").trim()},
    op:{del:pm?String(pm.del||"").trim():"",col:pm?String(pm.col||"").trim():"",exists:!!pm,delExists:!!(pm&&pm.hasDel),colExists:!!(pm&&pm.hasCol)},
    needDel:vt!=="来店"&&vt!=="PUB"&&vt!=="PUB来店",
    needCol:rtp!=="返却"
  };
}
// 場所情報なし＝【どのソース(form/予約/OP)にも場所が無い】＝真の未回答 のみ。＋時刻欠落。
// 「場所がどこかにあるのに場所なしに落ちる」事態を無くす（それは異常値で拾う）。
function stMissing(r){
  const s=placeSources(r);
  const delMiss=s.needDel&&!(s.form.del||s.resv.del||s.op.del);
  const colMiss=s.needCol&&!(s.form.col||s.resv.col||s.op.col);
  const timeOk=String(r.lend_time||"").trim()&&String(r.return_time||"").trim();
  return delMiss||colMiss||!timeOk;
}
// 場所ソース不整合＝【場所がどこか(フォーム/予約情報/OP)にあるのに"運用上の場所"が空】＝場所があるのに場所なしに落ちる異常。
//  運用値=opPlaceOf(タスク実値||予約情報)。これが空で、かつフォーム等どこかに場所がある＝反映漏れ。表記ゆれの食い違いは拾わない(誤検知回避)。
function stPlaceInconsistent(r){
  const s=placeSources(r);const op=opPlaceOf(r);
  const chk=(f,need)=>{if(!need)return false;const opv=String(op[f]||"").trim();const any=s.form[f]||s.resv[f]||s.op[f];return !opv&&!!any;};
  return chk("del",s.needDel)||chk("col",s.needCol);
}

function lastActivityAt(r){let t="";csOf(r).forEach(c=>{if((c.created_at||"")>t)t=c.created_at});const ss=SS_MAP[r.id];if(ss&&ss.ts){const ms=ssTimeMs(ss.ts);if(!isNaN(ms)){const iso=new Date(ms).toISOString();if(iso>t)t=iso}}return t}

function opPlaceOf(r){const p=PLACE_MAP[r.id]||{};return{del:String(p.del||r.del_place||"").trim(),col:String(p.col||r.col_place||"").trim()}}
// 場所の"芯"を抽出（全角/半角空白除去→時刻表記以降を落とす）。「札幌駅北口 9:50でいいです」→「札幌駅北口」
function coreP(s){return String(s||"").replace(/[\s　]/g,"").replace(/\d{1,2}[:：]\d{2}.*$/,"").trim()}

function ssTimeMs(s){if(!s)return NaN;const m=String(s).match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})(?::(\d{2}))?/);if(!m)return NaN;return Date.parse(m[1]+"-"+String(m[2]).padStart(2,"0")+"-"+String(m[3]).padStart(2,"0")+"T"+String(m[4]).padStart(2,"0")+":"+m[5]+":"+(m[6]||"00")+"+09:00")}

function mkDiff(kind,ss,op,ssMs,opAt,opSrc,opExact){const opMs=opAt?Date.parse(opAt):NaN;let newer="?";if(!isNaN(ssMs)&&!isNaN(opMs))newer=ssMs>opMs?"ss":"op";return{kind:kind,ss:ss,op:op||"(空)",ssAt:ssMs,opAt:opMs,opSrc:opSrc||"",opExact:!!opExact,newer:newer}}
// SS_MAP と PLACE_MAP を突合して情報相違を再計算（新旧＝時系列も判定）
// エルメ受付フォーム(LINK_MAP)をSS_MAPに補完＝ライブSSシートに無い予約の回答を拾う（優先はライブSS、無ければlink）
function mergeLinkIntoSS(){Object.entries(LINK_MAP).forEach(([rid,l])=>{const cur=SS_MAP[rid];if(cur&&(cur.del||cur.col))return;SS_MAP[rid]={del:l.del,col:l.col,ts:l.ts,delTs:l.ts,colTs:l.ts,prevDel:"",prevCol:"",_fromLink:true};});}
function computeMismatch(){const mm=new Set(),map={},al=new Set();RES.forEach(r=>{const ss=SS_MAP[r.id];if(!ss)return;if(ss.prevDel||ss.prevCol)al.add(r.id);const p=PLACE_MAP[r.id]||{};const op=opPlaceOf(r);const ssMs=ssTimeMs(ss.ts);const list=[];if(placeConflict(ss.del,op.del))list.push(mkDiff("お届け先",ss.del,op.del,ssMs,p.delAt,p.delSrc,p.delExact));if(placeConflict(ss.col,op.col))list.push(mkDiff("回収先",ss.col,op.col,ssMs,p.colAt,p.colSrc,p.colExact));if(list.length){mm.add(r.id);map[r.id]=list}});MISMATCH_RES=mm;MISMATCH_MAP=map;ALERT_RES=al}
// 整合の相違: 予約情報(reservations) ≠ マイページ/OP(tasks)。両方に実値があり食い違う項目を検出（patrolと同じ）。
let RESV_CONF={};
function computeResvConf(){
  RESV_CONF={};
  const norm=v=>String(v==null?"":v).trim();
  RES.forEach(r=>{
    const p=PLACE_MAP[r.id]; if(!p)return;
    const fs=[];
    const cmp=(field,a,b)=>{a=norm(a);b=norm(b);if(a&&b&&a!==b)fs.push({field,resv:a,op:b});};
    cmp("del_place",r.del_place,p.del);
    cmp("col_place",r.col_place,p.col);
    // ※時間(lend_time/return_time)は異常判定から除外：フォーム回答で予約情報(OTAデフォルト)から変わるのが正常。差=異常ではない。
    cmp("insurance",r.insurance,p.ins);
    const oc=(f,rn,tn)=>{rn=+rn||0;tn=+tn||0;if(rn>0&&tn>0&&rn!==tn)fs.push({field:f,resv:String(rn),op:String(tn)});};
    oc("opt_c",r.opt_c,p.optC);oc("opt_j",r.opt_j,p.optJ);oc("opt_b",r.opt_b,p.optB);
    if(fs.length)RESV_CONF[r.id]=fs;
  });

function parseCSV(t){const rows=[];let f="",row=[],q=false;for(let i=0;i<t.length;i++){const c=t[i];if(q){if(c==='"'){if(t[i+1]==='"'){f+='"';i++}else q=false}else f+=c}else{if(c==='"')q=true;else if(c===","){row.push(f);f=""}else if(c==="\n"){row.push(f);rows.push(row);row=[];f=""}else if(c==="\r"){}else f+=c}}if(f!==""||row.length){row.push(f);rows.push(row)}return rows}

function hDateA(iso){if(!iso)return"";const d=new Date(iso);if(isNaN(d))return"";const j=new Date(d.getTime()+9*3600*1000);return(j.getUTCMonth()+1)+"/"+j.getUTCDate();}
function histLineA(c,name){
  const FL={del_place:"お届け場所",col_place:"回収場所",lend_time:"お届け時間",return_time:"回収時間",option:"オプション",insurance:"補償",method:"受渡方法",cancel:"キャンセル"};

  const val=String(c.value!=null?c.value:(c.new_value||"")), isPlace=(c.field==="del_place"||c.field==="col_place"), src=c.source||"customer_mypage";

  let text="",pill=null;
  if(c.status==="applied"){

let AC_DONE={};
function acFldJp(f){return {del_place:"お届け場所",col_place:"回収場所",lend_time:"お届け時間",return_time:"回収時間",insurance:"補償",opt_c:"チャイルドシート",opt_j:"ジュニアシート",opt_b:"ベビーシート"}[f]||f}
// 整合の相違をカルテ(詳細)から統一（予約情報↔OP どちらの値で揃えるか）。押す前に確認・後で元に戻せる。
async function acResolve(id,fi,target){
  const st=tok(); if(!st){toast("ログインが必要");return}
  const fs=RESV_CONF[id]||[]; const it=fs[fi]; if(!it)return;
  const isTime=(it.field==="lend_time"||it.field==="return_time");
  const value=(target==="resv")?it.op:it.resv, from=(target==="resv")?it.resv:it.op;
  const q=isTime?value:("「"+value+"」"), qf=isTime?from:("「"+from+"」");
  if(!sure(`${acFldJp(it.field)}を ${q} に統一（${target==="resv"?"予約情報":"マイページ/OP"}の ${qf} → ${q}）。`))return;
  try{
    const r=await fetch(FN+"/keydrop-mypage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"resolve",staff_token:st,reservation_id:id,field:it.field,value,target,store:STORE})});
    const j=await r.json().catch(()=>({}));
    if(r.ok&&j.ok){AC_DONE[id+"|"+it.field]={target,from,value};toast("統一しました（正常化）");await loadAll(true);}
    else toast("失敗："+(j.error||r.status));
  }catch(e){toast("通信エラー")}
}
async function acUndo(id,field){
  const st=tok(); if(!st)return;
  const d=AC_DONE[id+"|"+field]; if(!d)return;
  const isTime=(field==="lend_time"||field==="return_time");
  const q=isTime?d.from:("「"+d.from+"」");
  if(!sure(`元に戻す（${acFldJp(field)}を ${q} に戻す）。`))return;
  try{
    const r=await fetch(FN+"/keydrop-mypage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"resolve",staff_token:st,reservation_id:id,field,value:d.from,target:d.target,store:STORE})});
    const j=await r.json().catch(()=>({}));
    if(r.ok&&j.ok){delete AC_DONE[id+"|"+field];toast("元に戻しました");await loadAll(true);}
    else toast("失敗："+(j.error||r.status));
  }catch(e){toast("通信エラー")}
}

// ===== 📲 マイページ利用状況（送信→開封→操作 のファネル。アクティブ/スルーが分かる）=====
function fmtDT(s){ if(!s)return"-"; const d=new Date(s); if(isNaN(d))return"-"; const p=n=>("0"+n).slice(-2); return p(d.getMonth()+1)+"/"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes()); }
function daysSince(s){const d=new Date(s);if(isNaN(d))return 0;return (Date.now()-d.getTime())/86400000;}
function usageStat(r){
  const id=r.id, v=VIEWS[id], sent=SENDS[id], reach=LINE_SET.has(id);
  const acted=(CHG[id]||[]).some(c=>c.source==="customer");
  if(v)return {k:"active",chip:acted?"🟢 アクティブ・操作あり":"🟢 アクティブ",c:"#0e7a3b",b:"#dcfce7",acted};
  if(sent&&sent.status==="sent"){
    // 送信後2日以上たっても未開封＝スルー、それ未満＝送信済(未開封・様子見)
    if(daysSince(sent.at)>=2)return {k:"through",chip:"🟡 スルー（2日以上未開封）",c:"#b45309",b:"#fef3c7"};
    return {k:"sent",chip:"🔵 送信済（未開封）",c:"#0284c7",b:"#e0f2fe"};
  }
  if(reach)return {k:"unsent",chip:"⚪ 未送信（LINE連携済）",c:"#475569",b:"#e2e8f0"};
  return {k:"noline",chip:"⚫ LINE未連携",c:"#64748b",b:"#f1f5f9"};
}
function openUsage(){
  const rows=RES.map(r=>({r,u:usageStat(r)}));
  const cnt={active:0,sent:0,through:0,unsent:0,noline:0}; rows.forEach(x=>cnt[x.u.k]++);
  const reachN=rows.filter(x=>x.u.k!=="noline").length;
  const sentN=rows.filter(x=>SENDS[x.r.id]&&SENDS[x.r.id].status==="sent").length;
  // 本日 新規に初回マイページURLを送った件数（sent_atが本日=JST）
  const isToday=s=>{if(!s)return false;const d=new Date(s);if(isNaN(d))return false;return (d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2))===today();};
  const todayNewN=rows.filter(x=>SENDS[x.r.id]&&SENDS[x.r.id].status==="sent"&&isToday(SENDS[x.r.id].at)).length;
  const openN=cnt.active;
  const issuedN=RES.filter(r=>r.mypage_token).length;   // マイページ発行済み（token付与）
  const noTok=RES.filter(r=>!r.mypage_token);
  const rate=(a,b)=>b>0?Math.round(a/b*100)+"%":"–";
  const stat=(n,l,c)=>`<div style="flex:1;min-width:74px;background:${c}12;border:1px solid ${c}44;border-radius:10px;padding:8px 6px;text-align:center"><div style="font-size:20px;font-weight:800;color:${c}">${n}</div><div style="font-size:10.5px;color:#475569;font-weight:700">${l}</div></div>`;
  const fchip=(k,l)=>`<button onclick="UFILTER='${k}';openUsage()" style="padding:5px 11px;border-radius:999px;border:1px solid ${UFILTER===k?"#0F1F45":"#cbd5e1"};background:${UFILTER===k?"#0F1F45":"#fff"};color:${UFILTER===k?"#fff":"#475569"};font-weight:700;font-size:12px;cursor:pointer">${l}</button>`;
  let list=rows.filter(x=>UFILTER==="all"||x.u.k===UFILTER);
  list.sort((a,b)=>{const o={active:0,sent:1,through:2,unsent:3,noline:4};return (o[a.u.k]-o[b.u.k])||((a.r.lend_date||"").localeCompare(b.r.lend_date||""));});
  const row=x=>{const r=x.r,u=x.u,v=VIEWS[r.id],sent=SENDS[r.id],acted=(CHG[r.id]||[]).some(c=>c.source==="customer");
    return `<div onclick="closeM();selectRes('${r.id}')" style="display:flex;gap:8px;align-items:center;padding:8px 4px;border-top:1px solid #eef2f7;font-size:12.5px;cursor:pointer">
      <div style="flex:1;min-width:0"><b>${esc(r.name||"")}</b>様 <span class="otatag" style="background:${otaColor(r.ota)}">${esc(otaLabel(r.ota))}</span> <span style="color:#94a3b8;font-size:11px">${esc(r.id)}</span><br>
        <span style="color:#64748b;font-size:11px">利用 ${esc(r.lend_date||"")}〜${esc(r.return_date||"")}</span></div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;align-items:center;min-width:0">
        <span style="font-size:10.5px;color:${r.mypage_token?"#0e7a3b":"#dc2626"}" title="マイページ発行(固有URL)">${r.mypage_token?"🪪発行済":"🪪未発行"}</span>
        <span style="font-size:10.5px;color:${LINE_SET.has(r.id)?"#0e7a3b":"#cbd5e1"}">${LINE_SET.has(r.id)?"LINE連携":"LINE無"}</span>
        <span style="font-size:10.5px;color:${sent&&sent.status==="sent"?"#334155":"#cbd5e1"}">${sent&&sent.status==="sent"?"送信"+fmtDT(sent.at):"未送信"}</span>
        <span style="font-size:10.5px;color:${v?"#0e7a3b":"#cbd5e1"}">${v?"開封"+v.count+"回・"+fmtDT(v.last):"未開封"}</span>
        ${acted?`<span style="font-size:10.5px;color:#7c3aed">✍️操作</span>`:""}
        <span style="padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:800;color:${u.c};background:${u.b};white-space:nowrap">${u.chip}</span>
      </div></div>`;};
  $("#modal").style.maxWidth="720px";
  $("#modal").innerHTML=`<h3>📲 マイページ 利用状況</h3>
    <div style="font-size:11.5px;color:var(--sub);margin-bottom:8px">現在〜未来の予約${RES.length}件。LINEでURL送信→開封→操作 のファネル。<b>🔵送信済=送った直後（未開封）</b>／<b>🟢アクティブ=開封済</b>／<b>🟡スルー=送信後2日以上たっても未開封</b>。</div>
    <div style="margin-bottom:10px;padding:10px 12px;border-radius:10px;background:${noTok.length?'#fef2f2':'#f0fdf4'};border:1.5px solid ${noTok.length?'#fecaca':'#bbf7d0'}">
      <div style="font-weight:800;font-size:13.5px;color:${noTok.length?'#b91c1c':'#0e7a3b'}">🪪 マイページ発行：${issuedN}/${RES.length}件（${rate(issuedN,RES.length)}）${noTok.length?'':' ✓ 全予約者に付与済み'}</div>
      ${noTok.length
        ?`<div style="font-size:11.5px;color:#b91c1c;margin-top:5px">未発行 ${noTok.length}件：${noTok.slice(0,6).map(r=>esc(r.id)).join("、")}${noTok.length>6?' 他':''} <button onclick="issueTokens()" style="margin-left:6px;padding:3px 12px;border-radius:8px;border:0;background:#b91c1c;color:#fff;font-weight:800;font-size:11.5px;cursor:pointer">今すぐ発行</button></div>`
        :`<div style="font-size:11px;color:#475569;margin-top:2px">全お客様に固有マイページURLが用意されています（新規予約にもDB既定で自動付与）。</div>`}
      <div style="margin-top:8px;padding-top:8px;border-top:1px dashed ${noTok.length?'#fecaca':'#bbf7d0'};font-size:13px;font-weight:800;color:#0284c7">📤 本日の新規送信（初回マイページURL）：${todayNewN}件</div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
      ${stat(cnt.active,"🟢 アクティブ","#0e9f50")}${stat(cnt.sent,"🔵 送信済(未開封)","#0284c7")}${stat(cnt.through,"🟡 スルー","#d97706")}${stat(cnt.unsent,"⚪ 未送信","#64748b")}${stat(cnt.noline,"⚫ LINE未連携","#94a3b8")}</div>
    <div style="font-size:11.5px;color:#475569;margin-bottom:10px;text-align:center">LINE連携率 <b>${rate(reachN,RES.length)}</b>（${reachN}/${RES.length}） ／ 送信済 <b>${sentN}</b> ／ 開封率 <b>${rate(openN,sentN)}</b>（開封${openN}/送信${sentN}）</div>
    <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
      ${fchip("all","すべて "+RES.length)}${fchip("active","🟢 アクティブ "+cnt.active)}${fchip("sent","🔵 送信済 "+cnt.sent)}${fchip("through","🟡 スルー "+cnt.through)}${fchip("unsent","⚪ 未送信 "+cnt.unsent)}${fchip("noline","⚫ LINE未連携 "+cnt.noline)}</div>
    <div style="max-height:60vh;overflow:auto">${list.length?list.map(row).join(""):`<div class="empty">該当なし</div>`}</div>
    <div class="acts" style="margin-top:12px"><button class="btn ghost" onclick="closeM()">閉じる</button></div>`;
  $("#scrim").classList.add("show");
}
// 未発行の予約に固有マイページtokenを発行（通常はDB既定で自動付与＝ほぼ不要。念のための手動発行）
async function issueTokens(){
  const miss=RES.filter(r=>!r.mypage_token);
  if(!miss.length){toast("全件発行済みです");return}
  if(!sure(miss.length+"件にマイページを発行しますか？"))return;
  let ok=0;
  for(const r of miss){
    const tok=(crypto&&crypto.randomUUID)?crypto.randomUUID():("t"+Date.now()+Math.round(Math.random()*1e6));
    try{await api(RTBL()+"?id=eq."+encodeURIComponent(r.id),{method:"PATCH",headers:{Prefer:"return=minimal"},body:JSON.stringify({mypage_token:tok})});r.mypage_token=tok;ok++;}catch(e){}
  }
  toast(ok+"件にマイページを発行しました");openUsage();
}

function showLogin(msg){
  // 古い/無効トークンを掃除してからログイン画面
  try{for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k&&k.indexOf("sb-")===0&&k.indexOf("auth-token")>=0)localStorage.removeItem(k);}}catch(e){}
  $("#app").innerHTML=`<div class="login"><div class="logo" style="font-size:22px;color:#0e7490;margin-bottom:4px">KEY<b style="color:#FABE00">◦</b>DROP <span style="font-size:12px;color:#64748b">マイページ管理</span></div>
    <div style="font-weight:800;margin-bottom:4px">マイページ管理 ログイン</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:14px">本体APPと同じ「名前＋番号」でログイン</div>
    <input id="le" type="text" placeholder="ID（名前・例 oshita）" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false">
    <input id="lp" type="password" placeholder="番号（パスワード）" inputmode="numeric" autocomplete="current-password" autocapitalize="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn pri" style="width:100%;padding:13px" onclick="doLogin()">ログイン</button>
    <div id="lerr" style="color:#b91c1c;font-size:12px;margin-top:8px">${msg?esc(msg):""}</div></div>`;
}

  else $("#app").innerHTML=`<div class="empty">読み込み失敗：${esc(m)}<br><button class="btn ghost" onclick="location.reload()" style="margin-top:10px">再読込</button> <button class="btn pri" onclick="showLogin()" style="margin-top:10px">ログイン画面へ</button></div>`;});
async function doLogin(){
  let id=($("#le").value||"").trim().toLowerCase();const password=($("#lp").value||"").trim();
  if(!id||!password){$("#lerr").textContent="名前と番号を入力してください";return}
  $("#lerr").textContent="ログイン中…";
  // 名前＋番号方式：@spk.hdm→@nha.hdm の順で自動試行。@付き入力ならそのまま使う。
  const cand = id.includes("@") ? [id] : [id+"@spk.hdm", id+"@nha.hdm"];
  async function tryLogin(email){
    const r=await fetch(SB+"/auth/v1/token?grant_type=password",{method:"POST",headers:{apikey:ANON,"Content-Type":"application/json"},body:JSON.stringify({email,password})});
    const d=await r.json();return (r.ok&&d.access_token)?d:null;
  }
  try{
    let d=null;for(const em of cand){d=await tryLogin(em);if(d)break;}
    if(!d){$("#lerr").textContent="ログイン失敗：名前または番号をご確認ください";return}
    localStorage.setItem("sb-ckrxttbnawkclshczsia-auth-token",JSON.stringify(d));
    $("#app").innerHTML='<div class="spin"></div>';
    loadAll().catch(e=>{const m=String(e.message||e);if(m.indexOf("401")>=0)showLogin("再ログインしてください");else showErr("読込: "+m)});
  }catch(e){$("#lerr").textContent="通信エラー："+String(e.message||e)}
}
