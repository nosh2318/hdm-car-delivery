<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">

<title>KEY-DROP マイページ</title>
<style>
:root{
  --bg:#e7ecf1; --card:#fff; --ink:#1c2430; --sub:#6b7784; --line:#e3e8ee;
  --accent:#0F1F45; --accent-d:#0a1836; --warn:#c2410c; --danger:#b91c1c; --gold:#b8860b;
  --r:16px; --shadow:0 3px 16px rgba(20,30,45,.09);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
.wrap{max-width:520px;margin:0 auto;padding:calc(10px + env(safe-area-inset-top)) 14px calc(60px + env(safe-area-inset-bottom));min-height:100vh}
.top{padding:22px 4px 12px;display:flex;align-items:center;gap:10px}
.logo{font-weight:800;letter-spacing:.5px;font-size:19px}
.logo b{color:var(--accent)}
.store{margin-left:auto;font-size:12px;color:var(--sub);border:1px solid var(--line);
  padding:3px 10px;border-radius:999px;background:#fff}
.langsw{display:flex;gap:4px;margin:0 0 10px;flex-wrap:wrap}
.langsw button{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;border:1px solid var(--line);
  background:#fff;color:var(--sub);cursor:pointer}
.langsw button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.hello{font-size:19px;font-weight:800;padding:2px 4px 12px;letter-spacing:.3px}
.hello span{font-size:13px;font-weight:700;color:var(--sub);margin-left:4px}
.hero{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;
  border-radius:var(--r);padding:18px;box-shadow:var(--shadow);margin-bottom:14px;
  display:flex;align-items:center;gap:12px;overflow:hidden}
.hero .hero-txt{flex:1;min-width:0}
.hero .rid{font-size:12px;opacity:.85;letter-spacing:1px}
.hero .car{font-size:22px;font-weight:800;margin:2px 0 8px}
.hero .st{display:inline-block;font-size:12px;font-weight:700;background:rgba(255,255,255,.2);
  padding:4px 12px;border-radius:999px}
.hero .hero-car{width:40%;max-width:180px;flex:none;object-fit:contain;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.25))}
.hero.no-img{}
.card{background:var(--card);border:1px solid #d5dce4;border-radius:var(--r);
  padding:16px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
.card h2{margin:-16px -16px 12px;font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px;
  padding:12px 16px;background:#f6f9fb;border-bottom:1px solid #e2e7ee;color:var(--accent-d)}
.card h2 .em{font-size:16px}
.row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-top:1px solid #eceff3}
.row:first-of-type{border-top:0}
.row .k{width:82px;flex:none;color:var(--sub);font-size:13px;padding-top:1px}
.row .v{flex:1;font-weight:600;word-break:break-word}
.row .v.big{font-size:16px}
.edit{margin-left:auto;flex:none;font-size:12px;font-weight:700;color:var(--accent);
  border:1px solid var(--accent);background:#f0faf7;border-radius:999px;padding:4px 12px;cursor:pointer}
.edit.req{color:var(--gold);border-color:var(--gold);background:#fff8ec}
.muted{color:var(--sub)}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;
  padding:5px 12px;border-radius:999px}
.pill.wait{background:#f1f3f5;color:var(--sub)}
.pill.on{background:#eafaf5;color:var(--accent-d)}
.bigbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:14px;border-radius:12px;font-weight:800;font-size:15px;border:0;cursor:pointer;
  background:var(--accent);color:#fff;text-decoration:none}
.bigbtn.ghost{background:#fff;color:var(--accent);border:1.5px solid var(--accent)}
.note{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.5}
.hrow{display:flex;gap:8px;align-items:baseline;padding:7px 0;border-top:1px solid var(--line);font-size:13px}
.hrow:first-of-type{border-top:0}
.hdate{color:var(--sub);font-size:11.5px;flex:0 0 auto;min-width:32px;font-weight:700}
.htx{flex:1;line-height:1.5}
.hpill{flex:0 0 auto;padding:1px 8px;border-radius:999px;font-size:10.5px;font-weight:700}
.hint{font-size:12.5px;color:var(--accent-d);background:#eafaf5;border:1px solid #b7e6da;
  border-left:4px solid var(--accent);border-radius:10px;padding:10px 12px;margin-top:10px;line-height:1.6;font-weight:600}
.hint b{color:var(--accent-d)}
.dashed{border:1.5px dashed var(--line);border-radius:12px;padding:16px;text-align:center;color:var(--sub)}
.reqbar{display:flex;gap:8px;flex-wrap:wrap}
.reqbtn{flex:1;min-width:calc(50% - 4px);text-align:center;padding:11px 8px;border-radius:12px;
  font-size:13px;font-weight:700;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink)}
.reqbtn.danger{color:var(--danger);border-color:#f3c9c9;background:#fff6f6}
.foot{text-align:center;color:var(--sub);font-size:11px;padding:18px 0 4px;line-height:1.7}
.foot a{color:var(--accent)}
/* modal */
.scrim{position:fixed;inset:0;background:rgba(20,28,38,.5);display:none;align-items:flex-end;
  justify-content:center;z-index:50}
.scrim.show{display:flex}
.sheet{background:#fff;width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));
  animation:up .25s ease}
@keyframes up{from{transform:translateY(30px);opacity:.5}to{transform:none;opacity:1}}
.sheet h3{margin:0 0 4px;font-size:17px;font-weight:800}
.sheet p.sub{margin:0 0 14px;color:var(--sub);font-size:13px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:12px;border:1.5px solid var(--line);
  border-radius:10px;font-size:16px;font-family:inherit;background:#fff}
.field textarea{min-height:80px;resize:vertical}
.sheet .acts{display:flex;gap:10px;margin-top:6px}
.sheet .acts button{flex:1;padding:13px;border-radius:11px;font-weight:800;font-size:15px;border:0;cursor:pointer}
.btn-cancel{background:#eef1f4;color:var(--ink)}
.btn-ok{background:var(--accent);color:#fff}
.btn-ok.req{background:var(--gold)}
.btn-ok.danger{background:var(--danger)}
.sheet .acts button:disabled{opacity:.4;cursor:not-allowed}
.optrow{display:grid;grid-template-columns:52px 1fr 16px 88px;gap:9px;align-items:center;
  padding:11px 0;border-top:1px solid var(--line)}
.optimg{width:52px;height:52px;object-fit:cover;border-radius:9px;border:1px solid var(--line);background:#fafbfc}
.optlbl{font-weight:700;font-size:13px}
.optprice{display:block;font-size:11px;color:var(--sub);font-weight:600;margin-top:1px}
.optprev-tot{margin-top:6px;padding-top:6px;border-top:1px dashed #e6cfa0;font-weight:800;font-size:14px;text-align:right;color:var(--gold)}
.optcur{font-size:13px;color:var(--sub);text-align:right}
.optarrow{text-align:center;color:var(--sub)}
.optsel{padding:8px;border:1.5px solid var(--line);border-radius:9px;font-size:16px;background:#fff}
.optprev{background:#fff8ec;border:1px solid #f3d9a8;border-radius:10px;padding:10px 12px;margin-top:12px}
.optprev-h{font-size:11px;font-weight:800;color:var(--gold);margin-bottom:4px}
.optprev-r{font-size:13px;font-weight:600}
.trkbtns{display:flex;gap:8px;margin-top:10px}
.trkbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;text-align:center;
  padding:13px 8px;border-radius:12px;font-weight:800;font-size:13.5px;text-decoration:none;
  background:#eef1f4;color:#0F1F45;border:1.5px solid #dfe4ea}
.trkbtn.live{background:#0F1F45;color:#fff;border-color:#0F1F45}
.trkbtn .livebadge{font-size:10px;font-weight:800;background:#0e9f50;color:#fff;border-radius:999px;padding:1px 7px;margin-left:4px}
/* 追跡プレビュー(見本・本番配色 ネイビー×ゴールド) */
.tphone{position:relative;border-radius:14px;overflow:hidden;border:1px solid #dfe4ea;
  box-shadow:0 4px 18px rgba(15,31,69,.14);background:#fff}
.tp-badge{position:absolute;top:9px;right:9px;z-index:4;background:rgba(15,31,69,.82);color:#fff;
  font-size:10px;font-weight:800;padding:3px 10px;border-radius:999px;letter-spacing:.5px}
.tp-hd{background:#0F1F45;color:#fff;padding:11px 14px;display:flex;align-items:center;gap:8px}
.tp-logo{font-weight:900;font-size:15px;letter-spacing:.5px}.tp-logo b{color:#FABE00}
.tp-hdsub{font-size:11px;opacity:.85;font-weight:700}
.tp-status{background:#0e9f50;color:#fff;font-size:12.5px;font-weight:800;padding:8px 14px;
  display:flex;align-items:center;gap:8px}
.tp-status b{font-size:15px;margin:0 1px}
.tp-dot{width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 0 0 rgba(255,255,255,.7);
  animation:tppulse 1.6s infinite}
@keyframes tppulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.7)}70%{box-shadow:0 0 0 8px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
.tp-map{position:relative;height:180px;background:linear-gradient(120deg,#e8f0e9 0%,#e3ecf4 100%)}
.tp-map::before{content:"";position:absolute;inset:0;
  background-image:linear-gradient(#d5e0ea 1px,transparent 1px),linear-gradient(90deg,#d5e0ea 1px,transparent 1px);
  background-size:32px 32px;opacity:.7}
.tp-route{position:absolute;left:20%;top:74%;width:60%;height:4px;
  background:repeating-linear-gradient(90deg,#0F1F45 0 11px,transparent 11px 20px);
  transform:rotate(-27deg);transform-origin:left center;border-radius:2px;opacity:.8}
.tp-car{position:absolute;font-size:28px;filter:drop-shadow(0 4px 5px rgba(0,0,0,.25));z-index:2;
  animation:tpmove 3.6s ease-in-out infinite}
.tp-dest{position:absolute;right:15%;top:20%;font-size:28px;filter:drop-shadow(0 4px 5px rgba(0,0,0,.25))}
.tp-destlbl{position:absolute;left:50%;top:-14px;transform:translateX(-50%);background:#0F1F45;color:#fff;
  font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap}
@keyframes tpmove{0%{left:17%;top:76%}50%{left:55%;top:48%}100%{left:17%;top:76%}}
.tp-bar{display:flex;align-items:center;gap:10px;padding:11px 12px;background:#fff;border-top:1px solid #eef1f4}
.tp-info{flex:none}
.tp-k{font-size:10px;color:var(--sub);font-weight:700}
.tp-v{font-size:15px;font-weight:900;color:#0F1F45}
.tp-share{flex:1;background:#FABE00;color:#0F1F45;border:0;border-radius:10px;padding:11px;
  font-size:13px;font-weight:900;box-shadow:0 2px 6px rgba(250,190,0,.4)}
.mpmap{width:100%;height:230px;border-radius:12px;border:1px solid var(--line);overflow:hidden;background:#eef1f4}
.mpsug{position:absolute;left:0;right:0;top:100%;z-index:5;background:#fff;border:1px solid var(--line);
  border-radius:0 0 10px 10px;box-shadow:0 8px 20px rgba(20,30,45,.12);display:none;max-height:220px;overflow:auto}
.mpsug-i{padding:10px 12px;font-size:13px;border-bottom:1px solid #f2f4f6;cursor:pointer}
.mpsug-i:hover{background:#f5f8ff}
.mppicked{margin-top:10px;font-size:13px;background:#eafaf5;border:1px solid #b7e6da;border-radius:10px;padding:9px 12px}
.mppicked b{color:var(--accent-d)}
.inscard{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#fafbfc}
.insttl{font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.insprice{color:var(--accent-d);font-size:13px}
.insdesc{font-size:11.5px;color:var(--sub);margin-top:3px;line-height:1.5}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#1c2430;color:#fff;
  padding:12px 20px;border-radius:999px;font-size:13px;font-weight:700;z-index:99;opacity:0;
  transition:opacity .25s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1}
.center{text-align:center;padding:60px 20px;color:var(--sub)}
.spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);
  border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
.banner{background:#fff8ec;border:1px solid #f3d9a8;color:var(--gold);border-radius:12px;
  padding:11px 13px;font-size:12.5px;font-weight:700;margin-bottom:12px;display:flex;gap:8px}
.setbanner{display:flex;align-items:center;gap:11px;background:linear-gradient(135deg,#fff3d6,#ffe9c2);
  border:1.5px solid #f0c46a;border-radius:14px;padding:13px;margin-bottom:12px;cursor:pointer;box-shadow:0 2px 10px rgba(180,120,10,.12)}
.setbanner .sb-ic{font-size:24px;flex:none}
.setbanner .sb-tx{flex:1;font-size:12.5px;color:#7a4d06;line-height:1.4}
.setbanner .sb-tx b{display:block;font-size:14px;color:#8a4b00;margin-bottom:1px}
.setbanner .sb-go{flex:none;font-weight:900;color:#8a4b00;background:#fff;border-radius:999px;padding:6px 12px;font-size:13px}
.unset{display:inline-block;font-size:12px;font-weight:800;color:var(--warn);background:#fff1e6;
  border:1px solid #f5c9a3;border-radius:6px;padding:2px 9px}
.edit.call{color:#fff;background:var(--warn);border-color:var(--warn);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(194,65,12,.4)}60%{box-shadow:0 0 0 6px rgba(194,65,12,0)}}
</style>
</head>

function fmtDate(d){if(!d)return"";const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(d);if(!m)return d;

let SENDING=false; // 送信系(lookup以外)の多重実行ガード（モバイルのゴーストクリック/二重タップで2回叩かれるのを防ぐ）
async function call(action, body){
  const mut = action!=="lookup";
  if(mut && RO){ toast("スタッフ確認用（閲覧のみ）のため編集できません"); return {status:0, json:{dropped:true, ro:true}}; } // 閲覧専用は書込禁止
  if(mut){ if(SENDING) return {status:0, json:{dropped:true}}; SENDING=true; }
  try{
    const auth = TOKEN ? {token:TOKEN} : {resId:LOGIN.resId, mail:LOGIN.mail}; // トークン優先／無ければ予約番号+メール
    const r = await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action,...auth,...body})});
    return {status:r.status, json: await r.json().catch(()=>({}))};
  } finally { if(mut) SENDING=false; }
}

const HFLD_L={del_place:{ja:"お届け場所",en:"delivery location",zh:"送車地點",ko:"배달 장소"},col_place:{ja:"回収場所",en:"pickup location",zh:"取車地點",ko:"회수 장소"},lend_time:{ja:"お届け時間",en:"delivery time",zh:"送車時間",ko:"배달 시간"},return_time:{ja:"回収時間",en:"pickup time",zh:"取車時間",ko:"회수 시간"},option:{ja:"オプション",en:"option",zh:"選配",ko:"옵션"},insurance:{ja:"補償",en:"insurance",zh:"保障",ko:"보장"},method:{ja:"受渡方法",en:"handover method",zh:"交車方式",ko:"인수 방법"},cancel:{ja:"キャンセル",en:"cancellation",zh:"取消",ko:"취소"}};
function fldName(f){const e=HFLD_L[f];return e?(e[L]||e.ja):f;}
function hDate(iso){if(!iso)return"";const d=new Date(iso);if(isNaN(d))return"";const j=new Date(d.getTime()+9*3600*1000);return(j.getUTCMonth()+1)+"/"+j.getUTCDate();}
function histLine(c,mode){
  const e=HFLD_L[c.field]; if(!e)return null;
  if(!["applied","requested","approved","rejected"].includes(c.status))return null;
  const val=String(c.value!=null?c.value:(c.new_value||"")), isC=c.field==="cancel";
  const oldv=String(c.old!=null?c.old:(c.old_value||"")).trim();
  // 場所・時間は「変更前→変更後」で見せる（どこからどこへ／何時から何時へ）
  const isPT=["del_place","col_place","lend_time","return_time"].includes(c.field);
  const ba=(isPT&&oldv&&oldv!==val)?`「${oldv}」→「${val}」`:`「${val}」`;
  const src=c.source||"customer_mypage", fn=fldName(c.field);
  const cust=src==="customer_form"?{ja:"お客様がフォームで",en:"You (via form)",zh:"您（透過表單）",ko:"고객님이 폼에서"}[L]
            :src==="staff"?{ja:"担当が",en:"Staff",zh:"專員",ko:"담당자가"}[L]
            :{ja:"お客様がマイページで",en:"You (via My Page)",zh:"您（透過本頁）",ko:"고객님이 마이페이지에서"}[L];
  const PILL={requested:{t:{ja:"確認中",en:"Reviewing",zh:"確認中",ko:"확인 중"}[L],c:"#b45309",b:"#fef3c7"},approved:{t:{ja:"反映済",en:"Applied",zh:"已反映",ko:"반영됨"}[L],c:"#0e7a3b",b:"#dcfce7"},rejected:{t:{ja:"見送り",en:"Declined",zh:"未受理",ko:"보류"}[L],c:"#64748b",b:"#f1f5f9"}};
  let text="",pill=null;
  if(c.status==="applied"){
    if(isC) text={ja:cust+"キャンセルしました",en:cust+" cancelled",zh:cust+"取消了",ko:cust+" 취소했습니다"}[L];
    else if(isPT&&oldv&&oldv!==val) text=cust+" "+{ja:`${fn}を${ba}に変更しました`,en:`changed ${fn} from "${oldv}" to "${val}"`,zh:`將${fn}從「${oldv}」變更為「${val}」`,ko:`${fn}을(를) "${oldv}"→"${val}"(으)로 변경했습니다`}[L];
    else text=cust+" "+{ja:`${fn}を「${val}」にしました`,en:`set ${fn} to "${val}"`,zh:`將${fn}設為「${val}」`,ko:`${fn}을(를) "${val}"(으)로 설정`}[L];
  }else if(c.status==="requested"){
    text=isC?{ja:"お客様がキャンセルを申請しました",en:"You requested cancellation",zh:"您申請了取消",ko:"고객님이 취소를 신청했습니다"}[L]:{ja:`お客様が${fn}の変更を依頼しました`,en:`You requested a ${fn} change`,zh:`您申請變更${fn}`,ko:`고객님이 ${fn} 변경을 요청했습니다`}[L]; pill=PILL.requested;
  }else if(c.status==="approved"){
    text=isC?{ja:"担当がキャンセルを承認しました",en:"Staff approved the cancellation",zh:"專員已核准取消",ko:"담당자가 취소를 승인했습니다"}[L]:(isPT&&oldv&&oldv!==val?{ja:`担当が${fn}を${ba}に変更・反映しました`,en:`Staff changed ${fn} from "${oldv}" to "${val}"`,zh:`專員將${fn}從「${oldv}」變更為「${val}」`,ko:`담당자가 ${fn}을(를) "${oldv}"→"${val}"(으)로 변경·반영했습니다`}[L]:{ja:`担当が${fn}の変更を承認・反映しました`,en:`Staff approved the ${fn} change`,zh:`專員已核准並反映${fn}變更`,ko:`담당자가 ${fn} 변경을 승인·반영했습니다`}[L]); pill=PILL.approved;
  }else{
    text=isC?{ja:"担当がキャンセル申請を見送りました",en:"Staff declined the cancellation",zh:"專員未受理取消申請",ko:"담당자가 취소 신청을 보류했습니다"}[L]:{ja:`担当が${fn}の変更を見送りました`,en:`Staff declined the ${fn} change`,zh:`專員未受理${fn}變更`,ko:`담당자가 ${fn} 변경을 보류했습니다`}[L]; pill=PILL.rejected;
  }
  return {date:hDate(c.at||c.created_at),text:esc(text),pill:pill?pill.t:null,pc:pill?pill.c:"",pb:pill?pill.b:""};
}

function editField(field){
  const r=DATA.reservation;
  const CFG={
    del_place:{title:t('edit_del_place'),label:t('lbl_del_place'),type:"text",val:r.del_place||"",ph:t('ph_del')},
    col_place:{title:t('edit_col_place'),label:t('lbl_col_place'),type:"text",val:r.col_place||"",ph:t('ph_col')},
    lend_time:{title:t('edit_lend_time'),label:t('del_dt')+"（"+fmtDate(r.lend_date)+"）",type:"time",val:r.lend_time||""},
    return_time:{title:t('edit_return_time'),label:t('col_dt')+"（"+fmtDate(r.return_date)+"）",type:"time",val:r.return_time||""},
  }[field];
  if(!CFG)return;
  const isDelF=(field==="del_place"||field==="lend_time");
  const subTxt=isDelF?t('sub_del'):t('sub_col');
  const input = CFG.type==="time" ? timeSel("fv",CFG.val)
    : `<input id="fv" value="${esc(CFG.val)}" placeholder="${esc(CFG.ph||"")}">`;
  $("#sheet").innerHTML=`
    <h3>${esc(CFG.title)}</h3>
    <p class="sub">${subTxt}</p>
    <div class="field"><label>${esc(CFG.label)}</label>${input}</div>
    <div class="acts"><button class="btn-cancel" onclick="closeSheet()">${t('cancel_btn')}</button>
      <button class="btn-ok" onclick="saveField('${field}')">${t('apply_this')}</button></div>`;
  $("#scrim").classList.add("show");
}
async function saveField(field){
  const r=DATA.reservation, cur={del_place:r.del_place,col_place:r.col_place,lend_time:r.lend_time,return_time:r.return_time}[field]||"";
  const v=$("#fv").value.trim();
  if(v===cur){toast(t('no_change'));return}
  if((field==="del_place"||field==="col_place")&&v.length<2){toast(t('min2'));return}
  if(field==="del_place"||field==="col_place"){const pe=placeErrJs(v,null,null);if(pe){toast(pe);return}}
  const _lb={del_place:t('del_place'),col_place:t('col_place'),lend_time:t('del_dt'),return_time:t('col_dt')}[field]||"";
  if(!confirm(tf('reg_confirm',_lb,v)))return;
  const {json}=await call("update",{[field]:v});
  if(json.dropped)return;
  if(json.ok){closeSheet();toast(json.pendingApproval?t('pending_appr'):t('saved'));await load()}
  else if(json.lineOnly){closeSheet();toast(json.error)}
  else toast(json.error||t('save_fail'));
}

const GMAPS_KEY="AIzaSyCoX1EyEx-N5A0r4vRzC1KmVp3T29HILbI";
const SPK_CENTER={lat:43.0621,lng:141.3544}; // 札幌中心
let _gLoaded=false,_gLoading=null,mpMap=null,mpMarker=null,mpGeocoder=null,mpAuto=null,mpPlaces=null,mpTok=null;
let mpField=null,mpPicked={place:"",lat:null,lng:null};
function gLang(){return L==="zh"?"zh-TW":L;}
function loadGoogle(){
  if(_gLoaded)return Promise.resolve();
  if(_gLoading)return _gLoading;
  _gLoading=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src=`https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&libraries=places&language=${gLang()}`;
    s.async=true;s.onload=()=>{_gLoaded=true;res()};s.onerror=rej;document.head.appendChild(s);
  });
  return _gLoading;
}

    document.getElementById("mpMap").innerHTML='<div class="center" style="padding:20px;font-size:12px">'+t('map_load_fail')+'</div>';

function initMpMap(){
  const el=document.getElementById("mpMap"); if(!el)return;
  const c=(mpPicked.lat&&mpPicked.lng)?{lat:+mpPicked.lat,lng:+mpPicked.lng}:SPK_CENTER;
  el.innerHTML="";
  mpMap=new google.maps.Map(el,{center:c,zoom:mpPicked.lat?16:13,disableDefaultUI:true,zoomControl:true,gestureHandling:"greedy",clickableIcons:false});
  mpMarker=new google.maps.Marker({position:c,map:mpMap,draggable:true});
  mpGeocoder=new google.maps.Geocoder();
  mpAuto=new google.maps.places.AutocompleteService();
  mpPlaces=new google.maps.places.PlacesService(mpMap);
  mpTok=new google.maps.places.AutocompleteSessionToken();
  mpMap.addListener("click",e=>{mpMarker.setPosition(e.latLng);mpReverse(e.latLng.lat(),e.latLng.lng())});
  mpMarker.addListener("dragend",()=>{const ll=mpMarker.getPosition();mpReverse(ll.lat(),ll.lng())});
}
function mpReverse(lat,lng){
  mpPicked.lat=lat;mpPicked.lng=lng;
  const pe=document.getElementById("mpPicked"); if(pe)pe.textContent=t('map_getting');
  mpGeocoder.geocode({location:{lat,lng},language:gLang()},(res,st)=>{
    let addr=`${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    if(st==="OK"&&res&&res[0])addr=res[0].formatted_address.replace(/^日本[、,]\s*/,"").replace(/〒?\s*\d{3}-?\d{4}\s*/,"").trim();
    mpPicked.place=addr;
    const pe=document.getElementById("mpPicked"); if(pe)pe.textContent=addr;
    const si=document.getElementById("mpSearch"); if(si)si.value=addr;
    mpStNote();
  });
}
// 札幌駅を指定した場合の停車注意（南口は停車不可→北口推奨）
function mpStNote(){
  const si=document.getElementById("mpSearch");
  const v=((si&&si.value)||mpPicked.place||"");
  const el=document.getElementById("mpStNote");
  if(el)el.style.display=/札幌駅|札幌\s*駅|sapporo\s*st(a|ation)?|札幌車站|삿포로역/i.test(v)?"block":"none";
}
let _mpDeb=null;
function mpSearchInput(){
  mpStNote();
  const q=document.getElementById("mpSearch").value.trim();
  const box=document.getElementById("mpSuggest");
  if(q.length<2){box.style.display="none";return}
  clearTimeout(_mpDeb);
  _mpDeb=setTimeout(()=>{
    if(!mpAuto){box.style.display="none";return}
    mpAuto.getPlacePredictions({input:q,sessionToken:mpTok,language:gLang(),
      locationBias:{center:SPK_CENTER,radius:60000},componentRestrictions:{country:"jp"}},(preds,st)=>{
      if(st!=="OK"||!preds||!preds.length){box.innerHTML='<div class="mpsug-i" style="color:#999">'+t('map_no_hit')+'</div>';box.style.display="block";return}
      box.innerHTML=preds.slice(0,6).map(p=>`<div class="mpsug-i" onclick="mpPick('${p.place_id}')">📍 ${esc(p.description)}</div>`).join("");
      box.style.display="block";
    });
  },350);
}
function mpPick(placeId){
  document.getElementById("mpSuggest").style.display="none";
  mpPlaces.getDetails({placeId,fields:["geometry","name","formatted_address"],sessionToken:mpTok,language:gLang()},(pl,st)=>{
    mpTok=new google.maps.places.AutocompleteSessionToken();
    if(st!=="OK"||!pl||!pl.geometry)return;
    const lat=pl.geometry.location.lat(),lng=pl.geometry.location.lng();
    let addr=(pl.formatted_address||"").replace(/^日本[、,]\s*/,"").replace(/〒?\s*\d{3}-?\d{4}\s*/,"").trim();
    const name=pl.name?(pl.name+(addr?" "+addr:"")):addr;
    mpPicked={place:name,lat,lng};
    document.getElementById("mpPicked").textContent=name;
    document.getElementById("mpSearch").value=name;
    if(mpMap){mpMap.setCenter({lat,lng});mpMap.setZoom(16);mpMarker.setPosition({lat,lng})}
    mpStNote();
  });
}

}

    label:{ja:"基本プラン（保険付き）",en:"Basic plan (insured)",zh:"基本方案（含保險）",ko:"기본 플랜(보험 포함)"},
    desc:{ja:"基本保証のみ適用されるプランです。<br>・対人／対物 無制限（免責保証なし）<br>・車両保証 車両時価総額まで（免責負担額15万円）<br>・人身損害補償 3000万円まで",en:"Basic coverage only.<br>・Bodily/property: unlimited (no deductible waiver)<br>・Vehicle: up to market value (¥150,000 deductible)<br>・Personal injury: up to ¥30 million",zh:"僅適用基本保障。<br>・對人／對物 無上限（無免責保障）<br>・車輛保障 至車輛時價（免責自付額15萬日圓）<br>・人身損害 至3000萬日圓",ko:"기본 보장만 적용.<br>・대인/대물 무제한(면책 보장 없음)<br>・차량 보장 시가까지(면책 부담 15만엔)<br>・인신 손해 3000만엔까지"}},
  {v:"免責",price:1100,unit:"/24h",
    label:{ja:"基本プラン＋免責補償",en:"Basic + CDW",zh:"基本方案＋免責保障",ko:"기본 플랜＋면책 보장"},
    desc:{ja:"事故時に、お客様が自己負担する費用（免責額）を免除する制度です。<br>基本補償ではカバーできない車両補償の自己負担額15万円が免除されます。",en:"Waives your out-of-pocket deductible in an accident.<br>The ¥150,000 vehicle deductible not covered by basic is waived.",zh:"事故時免除您的自付免責額。<br>基本方案未涵蓋的車輛自付額15萬日圓可免除。",ko:"사고 시 자기부담(면책액)을 면제합니다.<br>기본에서 커버되지 않는 차량 자기부담 15만엔이 면제됩니다."}},
  {v:"NOC",price:1650,unit:"/24h",
    label:{ja:"基本＋免責＋NOC補償（安心ワイドパック）",en:"Basic + CDW + NOC (Full Pack)",zh:"基本＋免責＋NOC（安心全包）",ko:"기본＋면책＋NOC(안심 와이드팩)"},
    desc:{ja:"免責補償もノンオペレーションチャージの心配もなくしたい方へ、すべての補償をひとまとめにした安心ワイドパック。<br>損傷タイヤの修理代・ホイールキャップ紛失の補償も付きます。",en:"All-in-one pack: no deductible and no non-operation charge worries.<br>Also covers damaged tire repair and hubcap loss.",zh:"將所有保障整合的安心全包，免除免責與NOC的擔憂。<br>另含輪胎損傷修理與輪圈蓋遺失保障。",ko:"면책도 NOC 걱정도 없는 올인원 안심 와이드팩.<br>손상 타이어 수리·휠캡 분실 보장도 포함."}},
];
function insLabel(v){const p=INS_PLANS.find(x=>x.v===v);return p?(p.label[L]||p.label.ja):(v||"—");}
function insDesc(p){return p.desc[L]||p.desc.ja;}
function yen(n){return "¥"+Number(n||0).toLocaleString()}
function reqOption(){
  const r=DATA.reservation;
  const uq=t('unit_qty');
  const rows=OPTDEF.map(o=>{
    const cur=+(r[o.key]||0), lb=optLabel(o);
    let opts="";
    for(let i=0;i<=o.max;i++)opts+=`<option value="${i}" ${i===cur?"selected":""}>${i}${uq}</option>`;
    return `<div class="optrow">
      <img class="optimg" src="${o.img}" alt="${lb}" onerror="this.style.visibility='hidden'">
      <div class="optlbl">${lb}<span class="optprice">${yen(o.price)}${t('per_car')}</span></div>
      <div class="optarrow">→</div>
      <select class="optsel" data-key="${o.key}" data-cur="${cur}" data-price="${o.price}" onchange="optPreview()">${opts}</select>
    </div>`;
  }).join("");
  $("#sheet").innerHTML=`
    <h3>${t('opt_title')}</h3>
    <p class="sub">${t('opt_sub')}</p>
    ${rows}
    <div id="optprev" class="optprev" style="display:none"></div>
    <div class="note" style="margin-top:8px">${t('opt_note')}</div>
    <div class="acts" style="margin-top:10px"><button class="btn-cancel" onclick="closeSheet()">${t('cancel_btn')}</button>
      <button class="btn-ok req" id="optbtn" disabled onclick="sendOption()">${t('req_this')}</button></div>`;
  $("#scrim").classList.add("show");
}
function optDiffs(){
  const diffs=[];
  document.querySelectorAll(".optsel").forEach(s=>{
    const cur=+s.dataset.cur, nv=+s.value; if(cur===nv)return;
    const def=OPTDEF.find(o=>o.key===s.dataset.key);
    diffs.push({label:optLabel(def),from:cur,to:nv,price:+s.dataset.price,diff:(nv-cur)*(+s.dataset.price)});
  });
  return diffs;
}
function optPreview(){
  const d=optDiffs(), box=$("#optprev"), btn=$("#optbtn"), uq=t('unit_qty');
  if(!d.length){box.style.display="none";btn.disabled=true;return}
  const total=d.reduce((s,x)=>s+x.diff,0);
  const sign=total>=0?"＋":"−";
  box.style.display="block";
  box.innerHTML="<div class='optprev-h'>"+t('change_content')+"</div>"+
    d.map(x=>`<div class="optprev-r">${x.label}：<b>${x.from}${uq}</b> → <b style="color:var(--gold)">${x.to}${uq}</b>
      <span style="color:var(--sub)">（${x.diff>=0?"＋":"−"}${yen(Math.abs(x.diff))}）</span></div>`).join("")+
    `<div class="optprev-tot">${t('approx')} ${sign}${yen(Math.abs(total))}</div>`;
  btn.disabled=false;
}
async function sendOption(){
  const d=optDiffs(); if(!d.length){toast(t('no_change'));return}
  const total=d.reduce((s,x)=>s+x.diff,0), uq=t('unit_qty');
  const detail=d.map(x=>`${x.label} ${x.from}${uq}→${x.to}${uq}`).join(" / ")+`（${t('approx')}${total>=0?"＋":"−"}${yen(Math.abs(total))}）`;
  const target={}; document.querySelectorAll(".optsel").forEach(s=>{target[s.dataset.key]=+s.value});
  if(!confirm(t('opt_confirm')+"\n"+detail+"\n"+t('confirm_ok')))return;
  const {json}=await call("request",{req_type:"option",detail,target});
  if(json.dropped)return;
  if(json.ok){closeSheet();toast(json.alreadyRequested?t('already_req'):t('received'));await load()}
  else toast(json.error||t('send_fail'));
}
/* ---- 補償 変更依頼（プルダウンで選択・金額表示）---- */
function insCur(){const ins=String(DATA.reservation.insurance||"");
  if(/フル|NOC|安心/.test(ins))return"NOC"; if(/免責|CDW/.test(ins))return"免責"; return"なし"}
function reqInsurance(){
  const cur=insCur();
  const curLabel=insLabel(cur);
  const nowTag={ja:"✓ 現在のプラン",en:"✓ Current plan",zh:"✓ 目前方案",ko:"✓ 현재 플랜"}[L];
  const opts=INS_PLANS.map(p=>`<option value="${p.v}" ${p.v===cur?"selected":""}>${insLabel(p.v)}（${p.price?yen(p.price)+(p.unit||""):t('free')}）${p.v===cur?" ★"+nowTag.replace("✓ ",""):""}</option>`).join("");
  const planCards=INS_PLANS.map(p=>{const isCur=p.v===cur;return `<div class="inscard" style="${isCur?'border:2px solid var(--gold);background:#fffdf5':''}">
      <div class="insttl">${esc(insLabel(p.v))} <span class="insprice">${p.price?yen(p.price)+(p.unit||""):t('free')}</span>${isCur?` <span style="background:var(--gold);color:#3a2f00;font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;margin-left:4px;white-space:nowrap">${nowTag}</span>`:''}</div>
      <div class="insdesc">${insDesc(p)}</div></div>`;}).join("");
  $("#sheet").innerHTML=`
    <h3>${t('ins_title')}</h3>
    <p class="sub">${t('ins_sub')}</p>
    <div class="row" style="border:0;padding:8px 10px;margin-bottom:8px;background:#fffdf5;border:1.5px solid var(--gold);border-radius:10px"><div class="k" style="font-weight:700">${t('current')}</div><div class="v" style="font-weight:800;color:#3a2f00">${esc(curLabel)}</div></div>
    ${planCards}
    <div class="field"><label>${t('new_plan')}</label>
      <select id="insel" onchange="insPreview()">${opts}</select></div>
    <div id="insprev" class="optprev" style="display:none"></div>
    <div class="note" style="margin-top:6px">${t('ins_note')}</div>
    <div class="acts" style="margin-top:10px"><button class="btn-cancel" onclick="closeSheet()">${t('cancel_btn')}</button>
      <button class="btn-ok req" id="insbtn" disabled onclick="sendInsurance()">${t('req_this')}</button></div>`;
  $("#scrim").classList.add("show");
}
function insPreview(){
  const cur=insCur(), sel=$("#insel").value, box=$("#insprev"), btn=$("#insbtn");
  if(sel===cur){box.style.display="none";btn.disabled=true;return}
  const a=INS_PLANS.find(p=>p.v===cur)||{price:0}, b=INS_PLANS.find(p=>p.v===sel)||{price:0};
  const diff=(b.price||0)-(a.price||0);
  box.style.display="block";
  box.innerHTML=`<div class='optprev-h'>${t('change_content')}</div>
    <div class="optprev-r"><b>${esc(insLabel(cur))}</b> → <b style="color:var(--gold)">${esc(insLabel(sel))}</b></div>
    <div class="optprev-tot">${t('approx')} ${diff>=0?"＋":"−"}${yen(Math.abs(diff))}/${{ja:"日",en:"day",zh:"日",ko:"일"}[L]}</div>`;
  btn.disabled=false;
}
async function sendInsurance(){
  const cur=insCur(), sel=$("#insel").value;
  if(sel===cur){toast(t('no_change'));return}
  const detail=`補償を「${insLabel(sel)}」に変更希望（現在:${insLabel(cur)}）`;
  if(!confirm(t('ins_confirm')+"\n"+insLabel(sel)+"\n"+t('confirm_ok')))return;
  const {json}=await call("request",{req_type:"insurance",detail,target:{insurance:sel}});
  if(json.dropped)return;
  if(json.ok){closeSheet();toast(json.alreadyRequested?t('already_req'):t('received'));await load()}
  else toast(json.error||t('send_fail'));
}
async function sendReq(kind){
  const detail=$("#rq").value.trim();
  if(detail.length<1){toast(t('enter_content'));return}
  if(!confirm(detail+"\n"+t('confirm_ok')))return;
  const {json}=await call("request",{req_type:kind,detail});
  if(json.dropped)return;
  if(json.ok){closeSheet();toast(json.alreadyRequested?t('already_req'):t('received'));await load()}
  else toast(json.error||t('send_fail'));
}

/* ---- キャンセル申請（規定・料金を提示 → 同意して申請）---- */
const CANCEL_POLICY=[  // 予約取消料（正式）※借受予約日基準
  {when:{ja:"借受日の7日前まで",en:"Up to 7 days before",zh:"租車日7天前",ko:"대여일 7일 전까지"},fee:{ja:"無料",en:"Free",zh:"免費",ko:"무료"}},
  {when:{ja:"6日〜3日前",en:"6–3 days before",zh:"6～3天前",ko:"6~3일 전"},fee:{ja:"料金総額の 20%",en:"20% of total",zh:"總額20%",ko:"총액의 20%"}},
  {when:{ja:"2日前・前日",en:"2 days / 1 day before",zh:"2天前・前一天",ko:"2일 전・전날"},fee:{ja:"料金総額の 30%",en:"30% of total",zh:"總額30%",ko:"총액의 30%"}},
  {when:{ja:"当日以降",en:"On the day or later",zh:"當天以後",ko:"당일 이후"},fee:{ja:"料金総額の 50%",en:"50% of total",zh:"總額50%",ko:"총액의 50%"}},
];
function askCancel(){
  const rows=CANCEL_POLICY.map(p=>`<tr><td style="padding:8px 6px;border-top:1px solid var(--line)">${p.when[L]||p.when.ja}</td>
    <td style="padding:8px 6px;border-top:1px solid var(--line);text-align:right;font-weight:700">${p.fee[L]||p.fee.ja}</td></tr>`).join("");
  $("#sheet").innerHTML=`
    <h3>${t('cancel_title')}</h3>
    <p class="sub">${t('cancel_sub')}</p>
    <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:10px">
      <thead><tr><th style="text-align:left;padding:6px;color:var(--sub);font-size:12px">${t('cancel_when')}</th>
      <th style="text-align:right;padding:6px;color:var(--sub);font-size:12px">${t('cancel_fee')}</th></tr></thead>
      <tbody>${rows}</tbody></table>
    <div class="note" style="margin:0 0 12px">${t('cancel_policy_note')}</div>
    <div class="field"><label>${t('reason_opt')}</label>
      <textarea id="cr" placeholder="${t('reason_ph')}"></textarea></div>
    <label style="display:flex;gap:8px;align-items:flex-start;font-size:13px;margin-bottom:12px;cursor:pointer">
      <input type="checkbox" id="agree" style="width:18px;height:18px;margin-top:2px" onchange="document.getElementById('cbtn').disabled=!this.checked">
      <span>${t('agree_policy')}</span></label>
    <div class="acts"><button class="btn-cancel" onclick="closeSheet()">${t('cancel_btn')}</button>
      <button class="btn-ok danger" id="cbtn" disabled onclick="sendCancel()">${t('cancel_apply')}</button></div>`;
  $("#scrim").classList.add("show");
}
function openReady(){
  const r=DATA.reservation;
  $("#sheet").innerHTML=`
    <h3>🟢 ${t('ready_time_title')}</h3>
    <p class="sub">${t('ready_time_sub')}</p>
    <div class="field"><label>${t('ready_time_label')}（${fmtDate(r.return_date)}）</label>${timeSel("rdyt",r.return_time||"")}</div>
    <div class="acts"><button class="btn-cancel" onclick="closeSheet()">${t('cancel_btn')}</button>
      <button class="btn-ok" style="background:#0e9f50" onclick="confirmReady()">${t('ready_send')}</button></div>`;
  $("#scrim").classList.add("show");
}
async function confirmReady(){
  const time=$("#rdyt").value.trim();
  if(!time){toast(t('ready_time_req'));return}
  const {json}=await call("ready",{time});
  if(json.dropped)return;
  if(json.ok){closeSheet();toast(json.alreadyRequested?t('already_req'):t('ready_received'));await load()}
  else toast(json.error||t('send_fail'));
}
async function sendCancel(){
  const reason=$("#cr").value.trim();
  if(!confirm(t('cancel_confirm')+"\n"+t('confirm_contact')))return;
  const {json}=await call("cancel_request",{reason});
  if(json.dropped)return;
  if(json.ok){closeSheet();toast(json.alreadyRequested?t('applied_already'):t('cancel_req_done'));await load()}
  else toast(json.error||t('send_fail'));
}

function showLoginForm(msg){
  $("#app").innerHTML=`<div style="max-width:420px;margin:0 auto;padding:26px 18px">
    <div style="text-align:center;font-size:20px;font-weight:900;color:#0F1F45;margin-bottom:4px">KEY<span style="color:#FABE00">◦</span>DROP</div>
    <div style="text-align:center;font-size:15px;font-weight:800;margin-bottom:6px">${t('login_title')}</div>
    <div style="font-size:12.5px;color:#64748b;text-align:center;margin-bottom:16px">${t('login_sub')}</div>
    <label style="font-size:12px;font-weight:700;color:#475569">${t('rid')}</label>
    <input id="mpResId" value="${esc(LOGIN.resId||"")}" placeholder="KDN-XXXX-XXXX-XXX / KD-XXXX-XXXX-XXX" autocapitalize="characters" spellcheck="false" style="width:100%;font-size:16px;padding:11px;border:1.5px solid #cbd5e1;border-radius:10px;margin:5px 0 12px">
    <label style="font-size:12px;font-weight:700;color:#475569">${t('login_mail')}</label>
    <input id="mpMail" type="email" inputmode="email" placeholder="example@email.com" autocapitalize="off" spellcheck="false" onkeydown="if(event.key==='Enter')doMypageLogin()" style="width:100%;font-size:16px;padding:11px;border:1.5px solid #cbd5e1;border-radius:10px;margin:5px 0 14px">
    <button onclick="doMypageLogin()" style="width:100%;font-size:15px;font-weight:900;color:#0F1F45;background:#FABE00;border:0;border-radius:11px;padding:13px;cursor:pointer">${t('login_btn')}</button>
    <div id="mpLerr" style="color:#b91c1c;font-size:12.5px;margin-top:10px;min-height:16px">${msg?esc(msg):""}</div>
    <div style="font-size:11.5px;color:#94a3b8;margin-top:8px;line-height:1.6">${t('login_hint')}</div>
  </div>`;
}
async function doMypageLogin(){
  const rid=($("#mpResId").value||"").trim().toUpperCase(); const ml=($("#mpMail").value||"").trim();
  if(!rid||!ml){$("#mpLerr").textContent=t('login_need');return}
  const btn=document.querySelector("#app button"); if(btn){btn.disabled=true;btn.textContent="…";}
  LOGIN.resId=rid; LOGIN.mail=ml;
  const {json}=await call("lookup",{});
  if(!json||!json.ok){LOGIN.resId="";LOGIN.mail="";showLoginForm((json&&json.error)||t('login_fail'));return}
  DATA=json;
  try{document.title=(json.reservation.name||t('guest'))+" | HANDYMAN "+json.label}catch(e){}
  render();
}
async function load(){
  if(!TOKEN && !(LOGIN.resId && LOGIN.mail)){ showLoginForm(); return; } // トークンURL以外＝ログインフォーム
  const {status,json}=await call("lookup",{});
  if(!json.ok){ if(!TOKEN){LOGIN.resId="";LOGIN.mail="";showLoginForm(json.error||t('login_fail'));return;} $("#app").innerHTML=`<div class="center">${esc(json.error||t('not_found'))}</div>`;return}
  DATA=json;
  try{document.title=(json.reservation.name||t('guest'))+" | HANDYMAN "+json.label}catch(e){}
  render();
}
load();
</script>
