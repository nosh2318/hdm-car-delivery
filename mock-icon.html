<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>KEYDROP アイコン差し替え プレビュー</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;background:#eef1f4;color:#1a1a1a;padding-bottom:40px}
  .note{background:#1a1a1a;color:#FABE00;font-size:11px;font-weight:800;text-align:center;padding:6px 10px}
  .vlabel{max-width:430px;margin:14px auto 4px;padding:0 16px;font-size:11px;font-weight:900;color:#888;letter-spacing:.05em}
  .phone{max-width:430px;margin:0 auto;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.08);position:relative}
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f0f0f0}
  .hdr .lg{display:flex;align-items:center;gap:8px}
  .hdr .lg img{height:22px}
  .hdr .menu{font-size:18px;color:#999}

  /* ブランドマーク（ロボット→ ◯ 案で切替） */
  .brand{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:#FABE00;box-shadow:0 2px 6px rgba(250,190,0,.5)}

  .map{margin:14px 16px;height:240px;border-radius:14px;background:linear-gradient(135deg,#dfe7ee,#eef2f6);border:1px solid #e2e8ee;position:relative;overflow:hidden}
  .map .grid{position:absolute;inset:0;background-image:linear-gradient(#fff6 1px,transparent 1px),linear-gradient(90deg,#fff6 1px,transparent 1px);background-size:34px 34px;opacity:.5}
  /* お届けマーカー（ロボット→車 のティアドロップピン） */
  .pin{position:absolute;left:50%;top:46%;transform:translate(-50%,-100%);text-align:center}
  .pin .bub{width:46px;height:46px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:#FABE00;box-shadow:0 5px 12px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;border:2.5px solid #fff}
  .pin .bub span{transform:rotate(45deg);font-size:22px}
  .pin .lbl{margin-top:9px;font-size:11px;font-weight:900;color:#1a1a1a;background:#fff;border-radius:8px;padding:3px 9px;box-shadow:0 2px 6px rgba(0,0,0,.12);display:inline-block}
  .maptag{position:absolute;left:12px;top:12px;font-size:11px;font-weight:800;color:#9aa6b2}

  /* 右下に浮くキャラ（ロボット→ ◯ 案で切替） */
  .corner{position:absolute;right:12px;bottom:14px;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;background:#fff;box-shadow:0 6px 16px rgba(0,0,0,.18);border:2px solid #FABE00}

  .cap{max-width:430px;margin:6px auto 0;padding:0 18px;font-size:10.5px;color:#9aa6b2;text-align:center;line-height:1.5}
</style>
</head>
<body>
  <div class="note">📱 アイコン差し替え プレビュー（仮アイコン・実画像は後で差し替え）</div>

  <!-- 推し案：マーカー=🚗車 / ブランド=🔑鍵 -->
  <div class="vlabel">推し案 ── 地図マーカー=🚗車 ／ ヘッダー・浮きキャラ=🔑鍵</div>
  <div class="phone">
    <div class="hdr"><div class="lg"><img src="images/logo_header.png" alt="KEYDROP"><div class="brand">🔑</div></div><span class="menu">☰</span></div>
    <div class="map">
      <div class="grid"></div><div class="maptag">お届け場所</div>
      <div class="pin"><div class="bub"><span>🚗</span></div><div class="lbl">ここに車をお届け</div></div>
      <div class="corner">🔑</div>
    </div>
  </div>
  <div class="cap">地図のピンは「🚗 車がここに来る」が一目で伝わる。ヘッダー＆浮きキャラは🔑＝ブランド名 KEYDROP と直結。</div>

  <!-- 比較：全部🚗 -->
  <div class="vlabel">比較B ── 全部 🚗 車</div>
  <div class="phone">
    <div class="hdr"><div class="lg"><img src="images/logo_header.png" alt="KEYDROP"><div class="brand">🚗</div></div><span class="menu">☰</span></div>
    <div class="map">
      <div class="grid"></div><div class="maptag">お届け場所</div>
      <div class="pin"><div class="bub"><span>🚗</span></div><div class="lbl">ここに車をお届け</div></div>
      <div class="corner">🚗</div>
    </div>
  </div>

  <!-- 比較：全部🔑 -->
  <div class="vlabel">比較C ── 全部 🔑 鍵</div>
  <div class="phone">
    <div class="hdr"><div class="lg"><img src="images/logo_header.png" alt="KEYDROP"><div class="brand">🔑</div></div><span class="menu">☰</span></div>
    <div class="map">
      <div class="grid"></div><div class="maptag">お届け場所</div>
      <div class="pin"><div class="bub"><span>🔑</span></div><div class="lbl">ここでお渡し</div></div>
      <div class="corner">🔑</div>
    </div>
  </div>

  <div class="cap">※ いずれも仮の絵文字。方向が決まったら、ロボットと同テイストの作り込んだ車／鍵グラフィックに差し替えます。</div>
</body>
</html>
