<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>KEYDROP アイコン差し替え プレビュー（B採用・車SVG）</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;background:#eef1f4;color:#1a1a1a;padding-bottom:40px}
  .note{background:#1a1a1a;color:#FABE00;font-size:11px;font-weight:800;text-align:center;padding:6px 10px}
  .vlabel{max-width:430px;margin:14px auto 4px;padding:0 16px;font-size:11px;font-weight:900;color:#888;letter-spacing:.05em}
  .phone{max-width:430px;margin:0 auto;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.08);position:relative}
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f0f0f0}
  .hdr .lg{display:flex;align-items:center;gap:9px}
  .hdr .lg img.logo{height:22px}
  .hdr .menu{font-size:18px;color:#999}
  .brand{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid #FABE00;box-shadow:0 2px 6px rgba(250,190,0,.35)}
  .brand img{width:24px}

  .map{margin:14px 16px;height:250px;border-radius:14px;background:linear-gradient(135deg,#dfe7ee,#eef2f6);border:1px solid #e2e8ee;position:relative;overflow:hidden}
  .map .grid{position:absolute;inset:0;background-image:linear-gradient(#fff6 1px,transparent 1px),linear-gradient(90deg,#fff6 1px,transparent 1px);background-size:34px 34px;opacity:.5}
  .maptag{position:absolute;left:12px;top:12px;font-size:11px;font-weight:800;color:#9aa6b2}
  /* お届けマーカー（車SVG入りティアドロップ） */
  .pin{position:absolute;left:50%;top:48%;transform:translate(-50%,-100%);text-align:center}
  .pin .bub{width:54px;height:54px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:#FABE00;box-shadow:0 6px 14px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;border:3px solid #fff}
  .pin .bub img{transform:rotate(45deg);width:34px}
  .pin .lbl{margin-top:11px;font-size:11.5px;font-weight:900;color:#1a1a1a;background:#fff;border-radius:8px;padding:3px 10px;box-shadow:0 2px 6px rgba(0,0,0,.12);display:inline-block}
  /* 右下に浮く（車SVGバッジ） */
  .corner{position:absolute;right:12px;bottom:14px;width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;box-shadow:0 6px 16px rgba(0,0,0,.2);border:2px solid #FABE00}
  .corner img{width:44px}
  .cap{max-width:430px;margin:8px auto 0;padding:0 18px;font-size:10.5px;color:#9aa6b2;text-align:center;line-height:1.5}

  .cmp{display:flex;gap:14px;max-width:430px;margin:8px auto 0;padding:0 16px;align-items:center;justify-content:center}
  .cmp figure{text-align:center}
  .cmp img{height:54px}
  .cmp figcaption{font-size:10px;font-weight:800;color:#888;margin-top:4px}
  .cmp .arrow{font-size:20px;color:#FABE00;font-weight:900}
</style>
</head>
<body>
  <div class="note">📱 B採用版（全部🚗車・作り込んだ車SVG）｜実画像の代わりにベクター車アイコンを使用</div>

  <div class="vlabel">Before → After（マスコット差し替え）</div>
  <div class="cmp">
    <figure><img src="images/mascot_head.png" alt="robot"><figcaption>現状（ロボット）</figcaption></figure>
    <div class="arrow">→</div>
    <figure><img src="images/icon_car.svg" alt="car"><figcaption>変更後（車SVG）</figcaption></figure>
  </div>

  <div class="vlabel" style="margin-top:18px">本番イメージ（B＝全部 車）</div>
  <div class="phone">
    <div class="hdr"><div class="lg"><img class="logo" src="images/logo_header.png" alt="KEYDROP"><div class="brand"><img src="images/icon_car.svg" alt="car"></div></div><span class="menu">☰</span></div>
    <div class="map">
      <div class="grid"></div><div class="maptag">お届け場所</div>
      <div class="pin"><div class="bub"><img src="images/icon_car.svg" alt="car"></div><div class="lbl">ここに車をお届け</div></div>
      <div class="corner"><img src="images/icon_car.svg" alt="car"></div>
    </div>
  </div>
  <div class="cap">①ヘッダーのブランドマーク ②地図のお届けマーカー ③右下に浮くキャラ ── 3か所すべて車に。<br>絵文字でなくブランド黄色の作り込んだベクター車なので、拡大してもくっきり・ロボットと並ぶ品質。</div>
</body>
</html>
